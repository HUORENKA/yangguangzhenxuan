<!DOCTYPE html>
<html lang="zh-CN">

  <style>
    :root {
      --brand: #2f6bff;
      --brand-dark: #1d4ed8;
      --mall-red: #E2231A;
      --primary: var(--brand);
      --primary-dark: var(--brand-dark);
      --text-main: #0f172a;
      --text-sub: #64748b;
      --border: rgba(148, 163, 184, 0.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;

    .five-dim-item-score {

    .price-axis-panel { padding: 4px 0 0; }
    .price-axis-track {
      position: relative;
      height: 228px;
      margin: 8px 8px 0;
      padding-top: 108px;
    }
    .price-axis-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 162px;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, #dbeafe, #e2e8f0, #fee2e2);
    }
    .price-axis-band {
      position: absolute;
      top: 154px;
      height: 20px;
      border-radius: 999px;
      transition: left 0.2s ease, width 0.2s ease, opacity 0.2s ease;
      pointer-events: none;
    }
    .price-axis-band--ref {
      background: rgba(37, 99, 235, 0.18);
      border: 1px solid rgba(37, 99, 235, 0.35);
      z-index: 1;
    }
    .price-axis-band--active {
      background: rgba(234, 88, 12, 0.16);
      border: 1px solid rgba(234, 88, 12, 0.45);
      z-index: 2;
      opacity: 0;
    }
    .price-axis-marker {
      position: absolute;
      top: 146px;
      transform: translateX(-50%);
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      z-index: 3;
      outline: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .price-axis-marker:focus-visible .price-axis-dot,
    .price-axis-marker:focus-visible .price-axis-star {
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25);
      border-radius: 999px;
    }
    .price-axis-dot {
      display: block;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 2px solid #fff;
      background: var(--marker-color, #64748b);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.18);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .price-axis-marker:hover .price-axis-dot,
    .price-axis-marker.is-active .price-axis-dot {
      transform: scale(1.15);
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.22);
    }
    .price-axis-star {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #f59e0b;
      font-size: 22px;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(15, 23, 42, 0.15));
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .price-axis-marker.is-source:hover .price-axis-star,
    .price-axis-marker.is-source.is-active .price-axis-star {
      transform: scale(1.12);
      filter: drop-shadow(0 4px 8px rgba(245, 158, 11, 0.35));
    }
    .price-axis-price-label {
      margin-top: 5px;
      font-size: 11px;
      font-weight: 800;
      color: #334155;
      white-space: nowrap;
      line-height: 1.2;
    }
    .price-axis-marker.is-source .price-axis-price-label { color: var(--marker-color, #1d4ed8); }
    .price-axis-marker.is-active .price-axis-price-label { color: #ea580c; }
    .price-axis-ticks {
      position: absolute;
      left: 0;
      right: 0;
      top: 180px;
      height: 44px;
      pointer-events: none;
    }
    .price-axis-tick {
      position: absolute;
      top: 0;
      transform: translateX(-50%);
      text-align: center;
      min-width: 0;
    }
    .price-axis-tick-mark {
      display: block;
      width: 1px;
      height: 8px;
      margin: 0 auto 4px;
      background: #cbd5e1;
    }
    .price-axis-tick-label {
      display: block;
      font-size: 10px;
      color: #94a3b8;
      font-weight: 700;
      white-space: nowrap;
    }
    .price-axis-tooltip {
      position: absolute;
      top: 0;
      left: 0;
      transform: translateX(-50%);
      min-width: 180px;
      max-width: 240px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      background: #fff;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      z-index: 6;
      text-align: left;
      pointer-events: none;
      white-space: normal;
    }
    .price-axis-tooltip::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: -6px;
      width: 10px;
      height: 10px;
      background: #fff;
      border-right: 1px solid #e2e8f0;
      border-bottom: 1px solid #e2e8f0;
      transform: translateX(-50%) rotate(45deg);
    }
    .price-axis-tooltip-name {
      display: flex;
      align-items: flex-start;

    }
    .price-axis-tooltip-name-text { flex: 1; min-width: 0; }
    .price-axis-tooltip-row {
      font-size: 12px;
      color: #64748b;
      line-height: 1.6;
    }
    .price-axis-tooltip-row strong { color: #0f172a; }
    .price-axis-tooltip-score {
      margin-top: 6px;
      font-size: 12px;
      color: #ea580c;
      font-weight: 800;
    }
    .price-axis-hint {
      margin: 12px 0 0;
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.6;
    }
    .trend-chip {

    .trend-meta {

    .stability-chart-layout {

  <script src="../assets/compare_payload_bridge.js"></script>
  <script>
    var PORTRAIT_DIM_META = {
      priceReason: { label: '价格合理性', icon: 'fa-scale-balanced' },

    };

    var SUPPLIER_DIM_KEYS = [
      { key: 'qualification', label: '资质合规', icon: 'fa-shield-halved' },
      { key: 'fulfillment', label: '合同履约能力', icon: 'fa-file-contract' },
      { key: 'quality', label: '商品质量', icon: 'fa-medal' },
      { key: 'price', label: '价格竞争力', icon: 'fa-tags' },
      { key: 'service', label: '商家服务', icon: 'fa-headset' },
      { key: 'credit', label: '物流服务', icon: 'fa-truck' }

    var SUPPLIER_RADAR_COLORS = ['#2563eb', '#E2231A', '#10b981', '#f97316', '#8b5cf6', '#0891b2', '#db2777'];
    var SUPPLIER_MOCK_SCORE_MATRIX = [
      [98, 95, 93, 90, 92, 96],
      [72, 68, 81, 88, 65, 70],
      [58, 86, 62, 55, 78, 52],
      [84, 50, 74, 82, 60, 58],
      [45, 72, 48, 68, 55, 42]
    ];

    var comparePayload = null;
    var supplierRadarEntries = [];
    var supplierSelectedIds = [];
    var stabilitySelectedIndices = [];
    var dealSelectedIndices = [];
    var reputationSortKey = '';
    var reputationSortDir = 'desc';
    var reputationTableProducts = [];
    var activeSpecAiKey = null;

    var STABILITY_CHART = {
      width: 640,
      height: 300,
      pad: { top: 30, right: 96, bottom: 44, left: 54 }
    };

    var DEAL_CHART = {
      width: 640,
      height: 300,
      pad: { top: 24, right: 24, bottom: 78, left: 58 }
    };

    var SPEC_PARAM_ATTR_HINTS = {
      '品牌': '品牌体现产品质量稳定性、售后保障及合规供应能力，政企采购需关注是否在平台合格供应商名录内。',
      '型号': '型号是识别同品同规的核心标识，型号不一致通常意味着配置或代际存在差异。',
      '规格': '规格决定商品是否满足实际用量与使用场景，是同品同规比对的关键依据。',
      '颜色': '颜色影响使用场景适配性，批量采购时需与现有办公用品色系或标识规范保持一致。',
      '包装方式': '包装方式关系到仓储、分发及领用效率，整箱/盒装适合不同采购批量。',
      '双面打印': '双面打印能力影响纸张利用率与办公成本，批复印印场景尤为关键。',
      '适用场景': '适用场景描述商品最佳使用边界，可据此判断是否匹配本部门实际需求。',
      '供货周期': '供货周期影响补货响应速度，常备现货更适合高频消耗品，滚动补货需关注安全库存。',
      '笔尖类型': '笔尖类型影响书写手感与适用场景，子弹头适合日常办公，针管头更适合精细书写。',
      '网络打印': '网络打印支持有线/无线接入，便于多人共享与远程输出，是办公设备选型的重要能力。',
      '支持纸张尺寸': '纸张尺寸范围决定设备兼容性，需覆盖日常使用的纸型规格。'
    };

    function getProductColor(index) {
      return SUPPLIER_RADAR_COLORS[index % SUPPLIER_RADAR_COLORS.length];
    }

    function renderProductColorDot(index, extraClass) {
      var cls = 'product-color-dot' + (extraClass ? ' ' + extraClass : '');
      return '<span class="' + cls + '" style="background:' + getProductColor(index) + '" aria-hidden="true"></span>';
    }

    function escapeHtml(s) {
      var d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }

    function clampScore(value) {
      return Math.max(0, Math.min(100, Math.round(Number(value) || 0)));
    }

    function shortName(name, max) {
      var text = String(name || '');
      return text.length > (max || 18) ? text.slice(0, max || 18) + '…' : text;
    }

    function getSourceProduct(products) {
      return products.find(function(p) { return p.isSource; }) || products[0];
    }

    function buildSpecRows(products, source) {
      var paramKeys = [];
      (source.params || []).forEach(function(item) {
        if (item[0] && paramKeys.indexOf(item[0]) === -1) paramKeys.push(item[0]);
      });
      products.forEach(function(product) {
        (product.params || []).forEach(function(item) {
          if (item[0] && paramKeys.indexOf(item[0]) === -1) paramKeys.push(item[0]);
        });
      });

      var rows = paramKeys.map(function(key) {
        return {
          label: key,
          type: 'param',
          values: products.map(function(product) {
            var matched = (product.params || []).find(function(item) { return item[0] === key; });
            return matched ? matched[1] : '—';
          })
        };
      });

      rows.push({
        label: '单价',
        type: 'trade',
        values: products.map(function(product) {
          return '¥' + Number(product.price || 0).toFixed(Number(product.price || 0) % 1 ? 2 : 0) + ' / ' + (product.unit || '件');
        })
      });
      rows.push({
        label: '平台建议区间',
        type: 'trade',
        values: products.map(function(product) {
          return '¥' + Number(product.floor || 0).toFixed(0) + ' - ¥' + Number(product.ceiling || 0).toFixed(0);
        })
      });
      rows.push({
        label: '供应商',
        type: 'trade',
        values: products.map(function(product) { return product.supplier || '—'; })
      });
      rows.push({
        label: '操作',
        type: 'action',
        values: products.map(function(product) {
          return product.id
            ? '<a class="detail-btn" href="../pages/product.html?id=' + encodeURIComponent(product.id) + '" target="_blank" rel="noopener noreferrer"><i class="fa-solid fa-arrow-up-right-from-square"></i> 查看详情</a>'
            : '—';
        })
      });
      return rows;
    }

    function valuesAreUniform(values) {
      if (!values.length) return true;
      var first = String(values[0]);
      return values.every(function(value) { return String(value) === first; });
    }

    function inferParamValueComment(label, value, allValues, product, productIndex) {
      var text = String(value || '—');
      var valLower = text.toLowerCase();
      if (valuesAreUniform(allValues)) {
        return '参数值为「' + text + '」，与其他候选一致。';
      }
      if (/支持|具备|含|有/.test(text) && !/不支持|不含|无/.test(text)) {
        return '标注为「' + text + '」，在该项能力上表述明确，配置相对完整。';
      }
      if (/不支持|不含|无/.test(text)) {
        return '标注为「' + text + '」，在该项能力上相对偏弱，需确认是否影响实际使用。';
      }
      if (label.indexOf('周期') !== -1 || label.indexOf('供货') !== -1) {
        if (/现货|24|48|当日|常备/.test(text)) {
          return '供货表述为「' + text + '」，响应速度较快，适合紧急补货。';
        }
        return '供货表述为「' + text + '」，建议结合安全库存与采购频次评估。';
      }
      if (label.indexOf('规格') !== -1 || label.indexOf('尺寸') !== -1 || label.indexOf('克重') !== -1) {
        return '规格取值为「' + text + '」，请核对是否与现有使用标准一致。';
      }
      var others = allValues.filter(function(v, i) { return i !== productIndex; }).map(String);
      var uniqueOthers = others.filter(function(v, i, arr) { return arr.indexOf(v) === i; });
      if (uniqueOthers.indexOf(text) === -1) {
        return '参数值「' + text + '」与其他候选不同，是本项主要差异点之一。';
      }
      return '参数值为「' + text + '」，与部分候选一致，可结合价格与供应商能力综合判断。';
    }

    function buildSpecAiProsCons(row, products) {
      var values = row.values;
      if (valuesAreUniform(values)) {
        return '各参与对比商品在该指标上取值一致（均为「' + escapeHtml(String(values[0])) + '」），本项不构成差异化选型因素。';
      }
      return products.map(function(product, index) {
        var prefix = product.isSource ? '参照商品·' : '';
        var comment = inferParamValueComment(row.label, values[index], values, product, index);
        return (index + 1) + '. ' + prefix + shortName(product.name, 20) + '：' + comment;
      }).join('<br>');
    }

    function buildSpecAiSuggestion(row, products) {
      var values = row.values;
      var label = row.label;
      if (valuesAreUniform(values)) {
        return '本项参数无差异，可继续从价格、供应商能力、历史成交等维度综合决策。';
      }
      var sourceIndex = Math.max(0, products.findIndex(function(item) { return item.isSource; }));
      var suggestions = [];
      products.forEach(function(product, index) {
        if (index === sourceIndex) return;
        if (String(values[index]) === String(values[sourceIndex])) return;
        var val = values[index];
        if (/不支持|不含|无/.test(String(val))) return;
        suggestions.push('若更看重「' + escapeHtml(label) + '」取值为「' + escapeHtml(String(val)) + '」，可关注「' + escapeHtml(shortName(product.name, 18)) + '」。');
      });
      if (!suggestions.length) {
        suggestions.push('候选商品在该指标上存在差异，建议以参照商品「' + escapeHtml(shortName(products[sourceIndex].name, 18)) + '」的参数为基准，优先选择匹配度更高的选项。');
      }
      suggestions.push('如需保持与参照商品一致，请优先选择该指标取值相同或接近的候选。');
      return suggestions.slice(0, 4).join('<br>');
    }

    function buildSpecAiAnalysisHtml(row, products) {
      var attr = SPEC_PARAM_ATTR_HINTS[row.label] ||
        ('「' + escapeHtml(row.label) + '」是商品关键参数之一，直接影响选型匹配度与使用效果，建议结合部门实际场景综合判断。');
      return '<div class="spec-ai-panel-section">' +
          '<div class="spec-ai-panel-title">【商品属性】</div>' +
          '<div>' + attr + '</div>' +
        '</div>' +
        '<div class="spec-ai-panel-section">' +
          '<div class="spec-ai-panel-title">【属性优劣】</div>' +
          '<div>' + buildSpecAiProsCons(row, products) + '</div>' +
        '</div>' +
        '<div class="spec-ai-panel-section">' +
          '<div class="spec-ai-panel-title">【适用建议】</div>' +
          '<div>' + buildSpecAiSuggestion(row, products) + '</div>' +
        '</div>';
    }

    function closeAllSpecAiPanels() {
      document.querySelectorAll('.spec-ai-panel-row').forEach(function(row) {
        row.hidden = true;
      });
      document.querySelectorAll('.spec-ai-btn').forEach(function(btn) {
        btn.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
      });
      activeSpecAiKey = null;
    }

    function toggleSpecAiPanel(rowKey, btn, row, products) {
      var panel = document.getElementById(rowKey + '-panel');
      var content = document.getElementById(rowKey + '-content');
      if (!panel || !content) return;
      if (activeSpecAiKey === rowKey) {
        closeAllSpecAiPanels();
        return;
      }
      closeAllSpecAiPanels();
      content.innerHTML = buildSpecAiAnalysisHtml(row, products);
      panel.hidden = false;
      btn.classList.add('is-open');
      btn.setAttribute('aria-expanded', 'true');
      activeSpecAiKey = rowKey;
    }

    function bindSpecAiHandlers(products, rows) {
      var table = document.getElementById('specTable');
      if (!table || table.dataset.aiBound === '1') return;
      table.dataset.aiBound = '1';
      table.addEventListener('click', function(event) {
        var btn = event.target.closest('.spec-ai-btn');
        if (!btn) return;
        event.preventDefault();
        event.stopPropagation();
        var rowKey = btn.getAttribute('data-spec-key');
        if (!rowKey) return;
        var rowIndex = Number(rowKey.replace('spec-row-', ''));
        if (Number.isNaN(rowIndex) || !rows[rowIndex]) return;
        toggleSpecAiPanel(rowKey, btn, rows[rowIndex], products);
      });
    }

    function renderSpecTable(products, source) {
      var rows = buildSpecRows(products, source);
      var head = '<thead><tr><th class="spec-row-label">对比项</th>';
      products.forEach(function(product, index) {
        head += '<th class="product-col-head' + (product.isSource ? ' spec-ref-col' : '') + '" scope="col">' +
          '<div class="product-col-head-inner">' +
            renderProductColorDot(index) +
            '<div>' +
              '<div class="product-col-name">' + escapeHtml(shortName(product.name, 22)) + '</div>' +
              '<div class="product-col-meta">' + escapeHtml(product.supplier || '') + '</div>' +
              (product.isSource ? '<span class="ref-badge"><i class="fa-solid fa-bookmark"></i>参照商品</span>' : '') +
            '</div>' +
          '</div>' +
          '</th>';
      });
      head += '</tr></thead>';

      var body = '<tbody>';
      var sourceIndex = Math.max(0, products.findIndex(function(item) { return item.isSource; }));
      closeAllSpecAiPanels();
      rows.forEach(function(row, rowIndex) {
        var rowKey = 'spec-row-' + rowIndex;
        var canAi = row.type === 'param';
        var labelHtml = canAi
          ? '<div class="spec-label-cell">' +
              '<span class="spec-label-text">' + escapeHtml(row.label) + '</span>' +
              '<button type="button" class="spec-ai-btn" data-spec-key="' + rowKey + '" aria-expanded="false" title="AI分析">AI</button>' +
            '</div>'
          : escapeHtml(row.label);

        body += '<tr class="spec-data-row" data-spec-key="' + rowKey + '">';
        body += '<td class="spec-row-label">' + labelHtml + '</td>';
        var sourceValue = row.values[sourceIndex];
        row.values.forEach(function(value, index) {
          var product = products[index];
          var isDiff = row.type === 'param' && String(value) !== String(sourceValue) && !product.isSource;
          var cls = product.isSource ? 'spec-ref-col' : '';
          if (isDiff) cls += ' spec-diff';
          if (row.type === 'action') {
            body += '<td class="' + cls + '">' + value + '</td>';
          } else {
            body += '<td class="' + cls + '">' + escapeHtml(value) + '</td>';
          }
        });
        body += '</tr>';

        if (canAi) {
          body += '<tr class="spec-ai-panel-row" id="' + rowKey + '-panel" hidden>' +
            '<td colspan="' + (products.length + 1) + '">' +
              '<div class="spec-ai-panel" id="' + rowKey + '-content"></div>' +
            '</td>' +
          '</tr>';
        }
      });
      body += '</tbody>';
      var table = document.getElementById('specTable');
      table.removeAttribute('data-ai-bound');
      table.innerHTML = head + body;
      bindSpecAiHandlers(products, rows);
    }

    function getPortraitScore(product, key) {
      return clampScore((product.portrait || {})[key] || 0);
    }

    function enrichProductTradeInsight(products) {
      products.forEach(function(product, index) {
        if (product.tradeInsight) return;
        product.tradeInsight = {
          priceChange: {
            date: '2026-04-0' + ((index % 4) + 2),
            direction: index % 3 === 0 ? '加价' : '降价',
            percent: +(1.5 + index * 0.9).toFixed(1)
          },
          sold: Math.max(200, 5200 - index * 980),
          recentSold: Math.max(12, 280 - index * 55),
          lastDealDate: '2026-05-' + String(Math.max(10, 20 - index * 2)).padStart(2, '0'),
          goodRate: (97.5 - index * 1.1).toFixed(1) + '%',
          validEvalCount: Math.max(10, 120 - index * 20),
          returnRate: +(1.0 + index * 0.35).toFixed(1)
        };
      });
    }

    function buildPriceAxisScale(products) {
      var values = [];
      products.forEach(function(product) {
        values.push(Number(product.floor) || 0, Number(product.ceiling) || 0, Number(product.price) || 0);
      });
      var rawMin = Math.min.apply(null, values);
      var rawMax = Math.max.apply(null, values);
      var span = rawMax - rawMin || 1;
      var pad = span * 0.08;
      var min = Math.max(0, rawMin - pad);
      var max = rawMax + pad;
      var total = max - min || 1;
      return {
        min: min,
        max: max,
        toPercent: function(value) {
          return Math.max(0, Math.min(100, ((Number(value) - min) / total) * 100));
        }
      };
    }

    function formatAxisPrice(value) {
      var num = Number(value) || 0;
      return '¥' + num.toFixed(num % 1 ? 2 : 0);
    }

    function buildPriceAxisTicks(scale, tickCount) {
      tickCount = tickCount || 5;
      if (tickCount < 2) tickCount = 2;
      var ticks = [];
      for (var i = 0; i < tickCount; i++) {
        var ratio = i / (tickCount - 1);
        var value = scale.min + (scale.max - scale.min) * ratio;
        ticks.push({
          value: value,
          percent: scale.toPercent(value)
        });
      }
      return ticks;
    }

    function renderPriceAxisTicks(scale) {
      return buildPriceAxisTicks(scale, 5).map(function(tick) {
        return '<div class="price-axis-tick" style="left:' + tick.percent + '%">' +
          '<span class="price-axis-tick-mark"></span>' +
          '<span class="price-axis-tick-label">' + formatAxisPrice(tick.value) + '</span>' +
        '</div>';
      }).join('');
    }

    function buildPriceBandStyle(scale, floor, ceiling) {
      var left = scale.toPercent(floor);
      var right = scale.toPercent(ceiling);
      return {
        left: left,
        width: Math.max(0.8, right - left)
      };
    }

    function buildPriceReasonTooltip(product, productIndex) {
      var score = getPortraitScore(product, 'priceReason');
      var floor = Number(product.floor) || 0;
      var ceiling = Number(product.ceiling) || 0;
      var price = Number(product.price) || 0;
      return '<div class="price-axis-tooltip-name">' +
          renderProductColorDot(productIndex) +
          '<div class="price-axis-tooltip-name-text">' +
            escapeHtml(shortName(product.name, 22)) +
            (product.isSource ? ' <span class="ref-badge"><i class="fa-solid fa-star"></i>参照</span>' : '') +
          '</div>' +
        '</div>' +
        '<div class="price-axis-tooltip-row">平台建议区间 <strong>' + formatAxisPrice(floor) + ' - ' + formatAxisPrice(ceiling) + '</strong></div>' +
        '<div class="price-axis-tooltip-row">现价 <strong>' + formatAxisPrice(price) + '</strong> / ' + escapeHtml(product.unit || '件') + '</div>' +
        '<div class="price-axis-tooltip-score">价格合理性评分 ' + score + ' 分</div>';
    }

    function positionPriceAxisTooltip(marker, tooltip) {
      var track = marker.closest('.price-axis-track');
      if (!track || !tooltip) return;
      var anchor = marker.querySelector('.price-axis-star') || marker.querySelector('.price-axis-dot');
      if (!anchor) return;

      tooltip.hidden = false;
      tooltip.style.visibility = 'hidden';

      var trackRect = track.getBoundingClientRect();
      var anchorRect = anchor.getBoundingClientRect();
      var centerX = anchorRect.left + anchorRect.width / 2 - trackRect.left;
      var anchorTop = anchorRect.top - trackRect.top;
      var gap = 10;
      var tipHeight = tooltip.offsetHeight;
      var top = Math.max(8, anchorTop - tipHeight - gap);
      var tipWidth = tooltip.offsetWidth;
      var clampedX = Math.max(tipWidth / 2 + 6, Math.min(trackRect.width - tipWidth / 2 - 6, centerX));

      tooltip.style.left = clampedX + 'px';
      tooltip.style.top = top + 'px';
      tooltip.style.visibility = 'visible';
    }

    function bindPriceReasonAxis(products) {
      var panel = document.getElementById('priceReasonAxisPanel');
      if (!panel || panel.dataset.bound === '1') return;
      panel.dataset.bound = '1';

      var refBand = document.getElementById('priceReasonRefBand');
      var activeBand = document.getElementById('priceReasonActiveBand');
      var tooltip = document.getElementById('priceReasonTooltip');
      var markers = panel.querySelectorAll('.price-axis-marker');
      if (!refBand || !activeBand || !tooltip) return;

      var scale = buildPriceAxisScale(products);
      var source = getSourceProduct(products);

      function resetAxisState() {
        markers.forEach(function(node) { node.classList.remove('is-active'); });
        activeBand.style.opacity = '0';
        activeBand.hidden = true;
        refBand.style.opacity = '1';
        tooltip.hidden = true;
        tooltip.style.visibility = 'hidden';
      }

      function activateProduct(index) {
        var product = products[index];
        var marker = markers[index];
        if (!product || !marker) return;
        var band = buildPriceBandStyle(scale, product.floor, product.ceiling);
        markers.forEach(function(node) {
          node.classList.toggle('is-active', Number(node.getAttribute('data-index')) === index);
        });
        activeBand.style.left = band.left + '%';
        activeBand.style.width = band.width + '%';
        activeBand.hidden = false;
        activeBand.style.opacity = '1';
        refBand.style.opacity = product.isSource ? '1' : '0.22';
        tooltip.innerHTML = buildPriceReasonTooltip(product, index);
        positionPriceAxisTooltip(marker, tooltip);
      }

      markers.forEach(function(marker) {
        marker.addEventListener('mouseenter', function() {
          activateProduct(Number(marker.getAttribute('data-index')));
        });
        marker.addEventListener('mouseleave', resetAxisState);
        marker.addEventListener('focus', function() {
          activateProduct(Number(marker.getAttribute('data-index')));
        });
        marker.addEventListener('blur', resetAxisState);
      });

      resetAxisState();
    }

    function renderPriceStableCompare(products) {

              '<div class="stability-tooltip" id="priceStableTooltip" hidden></div>' +
              '<p class="stability-chart-hint">纵轴为相对各自初始价的百分比（起点 100%）；线段上涨为红、下降为绿。移入月份查看较上月变化，最右端标注当前百分比与评分。</p>' +
            '</div>' +

    }

    function buildLast12MonthLabels() {
      var now = comparePayload && comparePayload.generatedAt
        ? new Date(comparePayload.generatedAt)
        : new Date();
      var labels = [];
      for (var i = 11; i >= 0; i--) {
        var date = new Date(now.getFullYear(), now.getMonth() - i, 1);
        var key = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
        labels.push({
          key: key,
          label: (date.getMonth() + 1) + '月'
        });
      }
      return labels;
    }

    function enrichPriceHistory(products) {
      products.forEach(function(product, index) {
        if (product.priceHistory && product.priceHistory.points && product.priceHistory.points.length === 12) return;
        product.priceHistory = buildPriceHistory(product, index);
      });
    }

    function buildPriceHistory(product, index) {
      var labels = buildLast12MonthLabels();
      var currentPrice = Number(product.price) || 24.9;
      var monthCount = labels.length;
      var prices = new Array(monthCount);
      prices[monthCount - 1] = currentPrice;

      for (var i = monthCount - 2; i >= 0; i--) {
        var wave = Math.sin((index + 1) * 1.7 + i * 0.85) * 0.018;
        var bias = (index % 2 === 0 ? -1 : 1) * 0.004;
        var step = wave + bias + ((i % 3) - 1) * 0.003;
        prices[i] = Math.max(0.01, prices[i + 1] * (1 - step));
      }

      var initialPrice = prices[0];
      var points = labels.map(function(label, i) {
        var price = +prices[i].toFixed(2);
        var pct = +(price / initialPrice * 100).toFixed(1);
        var prevPrice = i > 0 ? prices[i - 1] : price;
        var changeFromPrev = i === 0 ? 0 : +((price - prevPrice) / prevPrice * 100).toFixed(1);
        var direction = i === 0 ? 'flat' : (price > prevPrice ? 'up' : (price < prevPrice ? 'down' : 'flat'));
        return {
          monthKey: label.key,
          monthLabel: label.label,
          price: price,
          pct: pct,
          changeFromPrev: changeFromPrev,
          direction: direction
        };
      });

      return {
        initialPrice: +initialPrice.toFixed(2),
        points: points
      };
    }

    function getStabilitySegmentColor(direction) {
      if (direction === 'up') return '#ef4444';
      if (direction === 'down') return '#16a34a';
      return '#94a3b8';
    }

    function getStabilityYDomain(products, indices) {
      var values = [100];
      indices.forEach(function(index) {
        var history = products[index].priceHistory;
        if (!history) return;
        history.points.forEach(function(point) {
          values.push(point.pct);
        });
      });
      var min = Math.min.apply(null, values);
      var max = Math.max.apply(null, values);
      var pad = Math.max(2, (max - min) * 0.12);
      return {
        min: Math.floor((min - pad) * 10) / 10,
        max: Math.ceil((max + pad) * 10) / 10
      };
    }

    function stabilityX(step, totalSteps, plot) {
      if (totalSteps <= 1) return plot.x;
      return plot.x + (plot.w * step / (totalSteps - 1));
    }

    function stabilityY(pct, domain, plot) {
      var span = domain.max - domain.min || 1;
      return plot.y + plot.h - ((pct - domain.min) / span) * plot.h;
    }

    function drawPriceStableChart(products) {
      var svg = document.getElementById('priceStableSvg');
      var panel = document.getElementById('priceStableChartPanel');
      if (!svg || !panel) return;

      var indices = stabilitySelectedIndices.slice();
      if (!indices.length) {
        svg.innerHTML = '';
        var empty = document.createElement('div');
        empty.className = 'stability-chart-empty';
        empty.textContent = '请至少勾选一个商品以展示价格稳定性走势';
        panel.querySelector('.stability-chart-empty') && panel.querySelector('.stability-chart-empty').remove();
        svg.insertAdjacentElement('afterend', empty);
        return;
      }
      var oldEmpty = panel.querySelector('.stability-chart-empty');
      if (oldEmpty) oldEmpty.remove();

      var cfg = STABILITY_CHART;
      var plot = {
        x: cfg.pad.left,
        y: cfg.pad.top,
        w: cfg.width - cfg.pad.left - cfg.pad.right,
        h: cfg.height - cfg.pad.top - cfg.pad.bottom
      };
      var domain = getStabilityYDomain(products, indices);
      var monthCount = 12;
      var parts = [];

      parts.push('<rect x="0" y="0" width="' + cfg.width + '" height="' + cfg.height + '" fill="#fafbfc"/>');

      for (var g = 0; g <= 4; g++) {
        var pctTick = domain.min + (domain.max - domain.min) * (g / 4);
        var y = stabilityY(pctTick, domain, plot);
        parts.push('<line x1="' + plot.x + '" y1="' + y + '" x2="' + (plot.x + plot.w) + '" y2="' + y + '" stroke="#eef2f7" stroke-width="1"/>');
        parts.push('<text x="' + (plot.x - 8) + '" y="' + (y + 4) + '" text-anchor="end" font-size="11" fill="#94a3b8">' + pctTick.toFixed(0) + '%</text>');
      }

      var y100 = stabilityY(100, domain, plot);
      if (100 >= domain.min && 100 <= domain.max) {
        parts.push('<line x1="' + plot.x + '" y1="' + y100 + '" x2="' + (plot.x + plot.w) + '" y2="' + y100 + '" stroke="#bfdbfe" stroke-width="1.5" stroke-dasharray="5 4"/>');
      }

      var firstHistory = products[indices[0]].priceHistory;
      firstHistory.points.forEach(function(point, monthIndex) {
        var x = stabilityX(monthIndex, monthCount, plot);
        parts.push('<text x="' + x + '" y="' + (cfg.height - 14) + '" text-anchor="middle" font-size="11" fill="#94a3b8">' + escapeHtml(point.monthLabel) + '</text>');
      });

      indices.forEach(function(productIndex) {
        var product = products[productIndex];
        var history = product.priceHistory;
        var color = getSupplierColor(productIndex);
        var score = getPortraitScore(product, 'priceStable');

        history.points.forEach(function(point, monthIndex) {
          if (monthIndex === 0) return;
          var prev = history.points[monthIndex - 1];
          var x1 = stabilityX(monthIndex - 1, monthCount, plot);
          var y1 = stabilityY(prev.pct, domain, plot);
          var x2 = stabilityX(monthIndex, monthCount, plot);
          var y2 = stabilityY(point.pct, domain, plot);
          var segDir = point.price > prev.price ? 'up' : (point.price < prev.price ? 'down' : 'flat');
          parts.push('<line x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2 + '" stroke="' + getStabilitySegmentColor(segDir) + '" stroke-width="2.2" stroke-linecap="round"/>');
        });

        history.points.forEach(function(point, monthIndex) {
          var x = stabilityX(monthIndex, monthCount, plot);
          var y = stabilityY(point.pct, domain, plot);
          parts.push('<circle cx="' + x + '" cy="' + y + '" r="4" fill="#fff" stroke="' + color + '" stroke-width="2"/>');
        });

        var last = history.points[history.points.length - 1];
        var lastX = stabilityX(monthCount - 1, monthCount, plot);
        var lastY = stabilityY(last.pct, domain, plot);
        parts.push('<text x="' + (lastX + 10) + '" y="' + lastY + '" dominant-baseline="middle" font-size="11" font-weight="700" fill="' + color + '">' +
          last.pct + '% · ' + score + '分</text>');
      });

      var hitWidth = plot.w / monthCount;
      for (var m = 0; m < monthCount; m++) {
        var hx = plot.x + hitWidth * m;
        parts.push('<rect class="stability-month-hit" data-month="' + m + '" x="' + hx + '" y="' + plot.y + '" width="' + hitWidth + '" height="' + plot.h + '" fill="transparent" style="cursor:pointer"/>');
      }

      svg.innerHTML = parts.join('');
      bindPriceStableChartInteractions(products, plot, domain, monthCount);
    }

    function buildStabilityTooltipCard(product, productIndex, monthIndex, showColorDot) {
      var point = product.priceHistory.points[monthIndex];
      var changeClass = point.direction === 'up' ? 'up' : (point.direction === 'down' ? 'down' : 'flat');
      var changeText = monthIndex === 0
        ? '基准月（100%）'
        : ('较上月 ' + (point.changeFromPrev > 0 ? '+' : '') + point.changeFromPrev + '%');
      var dotHtml = showColorDot
        ? '<span class="stability-tooltip-dot" style="background:' + getSupplierColor(productIndex) + '"></span>'
        : '';
      return '<div class="stability-tooltip-name">' + dotHtml + escapeHtml(shortName(product.name, 20)) + '</div>' +
        '<div class="stability-tooltip-row">价格 <strong>' + formatAxisPrice(point.price) + '</strong></div>' +
        '<div class="stability-tooltip-row">相对初始价 <strong>' + point.pct + '%</strong></div>' +
        '<div class="stability-tooltip-row stability-tooltip-change ' + changeClass + '">' + changeText + '</div>';
    }

    function buildStabilityTooltipHtml(products, indices, monthIndex) {
      if (indices.length <= 1) {
        var singleIndex = indices[0];
        var singleProduct = products[singleIndex];
        return '<div class="stability-tooltip-card">' +
          buildStabilityTooltipCard(singleProduct, singleIndex, monthIndex, false) +
        '</div>';
      }
      return indices.map(function(productIndex) {
        var product = products[productIndex];
        return '<div class="stability-tooltip-card">' +
          buildStabilityTooltipCard(product, productIndex, monthIndex, true) +
        '</div>';
      }).join('');
    }

    function bindPriceStableChartInteractions(products, plot, domain, monthCount) {
      var svg = document.getElementById('priceStableSvg');
      var panel = document.getElementById('priceStableChartPanel');
      var tooltip = document.getElementById('priceStableTooltip');
      if (!svg || !panel || !tooltip) return;

      svg.querySelectorAll('.stability-month-hit').forEach(function(hit) {
        hit.addEventListener('mouseenter', function() {
          var monthIndex = Number(hit.getAttribute('data-month'));
          if (Number.isNaN(monthIndex)) return;
          var indices = stabilitySelectedIndices.slice();
          if (!indices.length) return;
          tooltip.innerHTML = buildStabilityTooltipHtml(products, indices, monthIndex);
          tooltip.hidden = false;
          tooltip.style.visibility = 'hidden';
          var hitWidth = plot.w / monthCount;
          var centerX = plot.x + hitWidth * monthIndex + hitWidth / 2;
          var svgRect = svg.getBoundingClientRect();
          var scaleX = svgRect.width / STABILITY_CHART.width;
          var tipWidth = tooltip.offsetWidth;
          var left = (centerX * scaleX) - (tipWidth / 2);
          left = Math.max(8, Math.min(svgRect.width - tipWidth - 8, left));
          tooltip.style.left = left + 'px';
          tooltip.style.top = '8px';
          tooltip.style.visibility = 'visible';
        });
        hit.addEventListener('mouseleave', function() {
          tooltip.hidden = true;
        });
      });
    }

    function bindStabilityProductList(products) {
      var list = document.getElementById('stabilityProductList');
      if (!list || list.dataset.bound === '1') return;
      list.dataset.bound = '1';
      list.addEventListener('click', function(event) {
        var item = event.target.closest('.stability-list-item');
        if (!item) return;
        var index = Number(item.getAttribute('data-index'));
        if (Number.isNaN(index)) return;
        var pos = stabilitySelectedIndices.indexOf(index);
        if (pos === -1) {
          stabilitySelectedIndices.push(index);
        } else {
          stabilitySelectedIndices.splice(pos, 1);
        }
        list.querySelectorAll('.stability-list-item').forEach(function(node) {
          var nodeIndex = Number(node.getAttribute('data-index'));
          var selected = stabilitySelectedIndices.indexOf(nodeIndex) !== -1;
          node.classList.toggle('is-selected', selected);
          node.setAttribute('aria-pressed', selected ? 'true' : 'false');
        });
        drawPriceStableChart(products);
      });
    }

    function initPriceStableChart(products) {
      enrichPriceHistory(products);
      drawPriceStableChart(products);
      bindStabilityProductList(products);
    }

    function getDealDisplayOrder(products, indices) {
      return indices.slice().sort(function(a, b) {
        if (products[a].isSource) return -1;
        if (products[b].isSource) return 1;
        return a - b;
      });
    }

    function renderHistoryDealCompare(products) {
      enrichProductTradeInsight(products);
      dealSelectedIndices = products.map(function(_, index) { return index; });
      var refScore = getPortraitScore(getSourceProduct(products), 'historyDeal');
      var displayOrder = getDealDisplayOrder(products, dealSelectedIndices);

      var listHtml = displayOrder.map(function(index) {
        var product = products[index];
        var score = getPortraitScore(product, 'historyDeal');
        var selected = dealSelectedIndices.indexOf(index) !== -1;
        var insight = product.tradeInsight || {};
        return '<button type="button" class="stability-list-item' + (selected ? ' is-selected' : '') + '" data-index="' + index + '" aria-pressed="' + (selected ? 'true' : 'false') + '">' +
          '<span class="stability-list-check" aria-hidden="true"><i class="fa-solid fa-check"></i></span>' +
          renderProductColorDot(index, 'stability-list-dot') +
          '<div class="stability-list-main">' +
            '<div class="stability-list-name">' + escapeHtml(shortName(product.name, 20)) +
              (product.isSource ? ' <span class="ref-badge"><i class="fa-solid fa-bookmark"></i>参照</span>' : '') +
            '</div>' +
            '<div class="stability-list-score">累计 <strong>' + Number(insight.sold || 0) + '</strong> · 近30天 <strong>' + Number(insight.recentSold || 0) + '</strong></div>' +
            '<div class="stability-list-score">历史成交评分 <strong>' + score + '</strong> 分</div>' +
          '</div>' +
        '</button>';
      }).join('');

      return '<div class="five-dim-block">' +
        renderFiveDimHead('historyDeal', refScore) +
        '<div class="five-dim-body">' +
          '<div class="deal-chart-layout">' +
            '<div class="stability-product-list" id="dealProductList" role="group" aria-label="历史成交对比商品">' + listHtml + '</div>' +
            '<div class="deal-chart-panel" id="historyDealChartPanel">' +
              '<svg id="historyDealSvg" viewBox="0 0 ' + DEAL_CHART.width + ' ' + DEAL_CHART.height + '" aria-label="历史成交柱状对比图"></svg>' +
              '<div class="deal-chart-legend">' +
                '<span class="deal-chart-legend-item"><span class="deal-chart-legend-dot" style="background:#2563eb"></span>历史成交量</span>' +
                '<span class="deal-chart-legend-item"><span class="deal-chart-legend-dot" style="background:#f97316"></span>近三十天成交</span>' +
              '</div>' +
              '<p class="deal-chart-hint">横轴为商品，纵轴为成交数量；每个商品并列展示累计成交与近 30 天成交，左侧可勾选/取消对比商品。</p>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }

    function getDealYDomain(products, indices) {
      var max = 0;
      indices.forEach(function(index) {
        var insight = products[index].tradeInsight || {};
        max = Math.max(max, Number(insight.sold) || 0, Number(insight.recentSold) || 0);
      });
      if (max <= 0) return { min: 0, max: 10 };
      var magnitude = Math.pow(10, Math.floor(Math.log10(max)));
      var niceMax = Math.ceil(max / magnitude) * magnitude;
      if (niceMax === max) niceMax += magnitude;
      return { min: 0, max: niceMax };
    }

    function dealBarHeight(value, domain, plot) {
      var span = domain.max - domain.min || 1;
      return Math.max(0, ((Number(value) - domain.min) / span) * plot.h);
    }

    function drawHistoryDealChart(products) {
      var svg = document.getElementById('historyDealSvg');
      var panel = document.getElementById('historyDealChartPanel');
      if (!svg || !panel) return;

      var indices = getDealDisplayOrder(products, dealSelectedIndices);
      panel.querySelector('.deal-chart-empty') && panel.querySelector('.deal-chart-empty').remove();

      if (!indices.length) {
        svg.innerHTML = '';
        var empty = document.createElement('div');
        empty.className = 'deal-chart-empty';
        empty.textContent = '请至少勾选一个商品以展示历史成交对比';
        svg.insertAdjacentElement('afterend', empty);
        return;
      }

      var cfg = DEAL_CHART;
      var plot = {
        x: cfg.pad.left,
        y: cfg.pad.top,
        w: cfg.width - cfg.pad.left - cfg.pad.right,
        h: cfg.height - cfg.pad.top - cfg.pad.bottom
      };
      var domain = getDealYDomain(products, indices);
      var parts = [];
      var groupCount = indices.length;
      var groupWidth = plot.w / groupCount;
      var barWidth = Math.min(24, Math.max(12, groupWidth / 4));
      var barGap = 6;

      parts.push('<rect x="0" y="0" width="' + cfg.width + '" height="' + cfg.height + '" fill="#fafbfc"/>');

      for (var g = 0; g <= 4; g++) {
        var tickVal = domain.min + (domain.max - domain.min) * (g / 4);
        var y = plot.y + plot.h - (tickVal / domain.max) * plot.h;
        parts.push('<line x1="' + plot.x + '" y1="' + y + '" x2="' + (plot.x + plot.w) + '" y2="' + y + '" stroke="#eef2f7" stroke-width="1"/>');
        parts.push('<text x="' + (plot.x - 8) + '" y="' + (y + 4) + '" text-anchor="end" font-size="11" fill="#94a3b8">' + Math.round(tickVal) + '</text>');
      }

      parts.push('<text x="' + (plot.x - 42) + '" y="' + (plot.y + plot.h / 2) + '" transform="rotate(-90 ' + (plot.x - 42) + ' ' + (plot.y + plot.h / 2) + ')" text-anchor="middle" font-size="11" fill="#94a3b8">成交数</text>');

      indices.forEach(function(productIndex, groupIndex) {
        var product = products[productIndex];
        var insight = product.tradeInsight || {};
        var sold = Number(insight.sold) || 0;
        var recentSold = Number(insight.recentSold) || 0;
        var groupCenter = plot.x + groupWidth * groupIndex + groupWidth / 2;
        var totalX = groupCenter - barWidth / 2 - barGap / 2;
        var recentX = groupCenter + barGap / 2;
        var totalH = dealBarHeight(sold, domain, plot);
        var recentH = dealBarHeight(recentSold, domain, plot);
        var totalY = plot.y + plot.h - totalH;
        var recentY = plot.y + plot.h - recentH;

        parts.push('<rect x="' + totalX + '" y="' + totalY + '" width="' + barWidth + '" height="' + totalH + '" rx="4" fill="#2563eb" opacity="0.9"/>');
        parts.push('<rect x="' + recentX + '" y="' + recentY + '" width="' + barWidth + '" height="' + recentH + '" rx="4" fill="#f97316" opacity="0.9"/>');

        if (totalH > 16) {
          parts.push('<text x="' + (totalX + barWidth / 2) + '" y="' + (totalY - 4) + '" text-anchor="middle" font-size="10" fill="#2563eb" font-weight="700">' + sold + '</text>');
        }
        if (recentH > 16) {
          parts.push('<text x="' + (recentX + barWidth / 2) + '" y="' + (recentY - 4) + '" text-anchor="middle" font-size="10" fill="#ea580c" font-weight="700">' + recentSold + '</text>');
        }

        var nameColor = getSupplierColor(productIndex);
        parts.push('<text x="' + groupCenter + '" y="' + (plot.y + plot.h + 16) + '" text-anchor="middle" font-size="11" fill="' + nameColor + '" font-weight="700">' + escapeHtml(shortName(product.name, 10)) + '</text>');
        if (product.isSource) {
          parts.push('<text x="' + groupCenter + '" y="' + (plot.y + plot.h + 30) + '" text-anchor="middle" font-size="10" fill="' + nameColor + '">参照</text>');
        }
      });

      svg.innerHTML = parts.join('');
    }

    function bindDealProductList(products) {
      var list = document.getElementById('dealProductList');
      if (!list || list.dataset.bound === '1') return;
      list.dataset.bound = '1';
      list.addEventListener('click', function(event) {
        var item = event.target.closest('.stability-list-item');
        if (!item) return;
        var index = Number(item.getAttribute('data-index'));
        if (Number.isNaN(index)) return;
        var pos = dealSelectedIndices.indexOf(index);
        if (pos === -1) {
          dealSelectedIndices.push(index);
        } else {
          dealSelectedIndices.splice(pos, 1);
        }
        list.querySelectorAll('.stability-list-item').forEach(function(node) {
          var nodeIndex = Number(node.getAttribute('data-index'));
          var selected = dealSelectedIndices.indexOf(nodeIndex) !== -1;
          node.classList.toggle('is-selected', selected);
          node.setAttribute('aria-pressed', selected ? 'true' : 'false');
        });
        drawHistoryDealChart(products);
      });
    }

    function initHistoryDealChart(products) {
      enrichProductTradeInsight(products);
      drawHistoryDealChart(products);
      bindDealProductList(products);
    }

    function getReputationTone(type, value) {
      if (type === 'goodRate') {
        var pct = parseFloat(String(value).replace('%', '')) || 0;
        return pct >= 97 ? 'positive' : (pct < 95 ? 'negative' : '');
      }
      if (type === 'validEvalCount') {
        return value >= 50 ? 'positive' : (value < 15 ? 'negative' : '');
      }
      if (type === 'returnRate') {
        return value <= 1.5 ? 'positive' : (value > 2.5 ? 'negative' : '');
      }
      return '';
    }

    function parseGoodRatePct(goodRate) {
      return parseFloat(String(goodRate || '').replace('%', '')) || 0;
    }

    function getReputationRowData(product, index) {
      var insight = product.tradeInsight || {};
      var goodRate = insight.goodRate || '—';
      var validEvalCount = Number(insight.validEvalCount || 0);
      var returnRate = Number(insight.returnRate || 0);
      return {
        product: product,
        productIndex: index,
        goodRate: goodRate,
        goodRateNum: parseGoodRatePct(goodRate),
        validEvalCount: validEvalCount,
        returnRate: returnRate,
        score: getPortraitScore(product, 'userReputation')
      };
    }

    function getReputationCellClass(type, value) {
      var tone = getReputationTone(type, value);
      if (tone === 'positive') return 'reputation-cell-positive';
      if (tone === 'negative') return 'reputation-cell-negative';
      return '';
    }

    function sortReputationRows(rows, key, dir) {
      if (!key) {
        return rows.slice().sort(function(a, b) {
          if (a.product.isSource) return -1;
          if (b.product.isSource) return 1;
          return 0;
        });
      }
      var mul = dir === 'asc' ? 1 : -1;
      return rows.slice().sort(function(a, b) {
        var av;
        var bv;
        if (key === 'goodRate') {
          av = a.goodRateNum;
          bv = b.goodRateNum;
        } else if (key === 'validEval') {
          av = a.validEvalCount;
          bv = b.validEvalCount;
        } else if (key === 'returnRate') {
          av = a.returnRate;
          bv = b.returnRate;
        } else {
          av = a.score;
          bv = b.score;
        }
        if (av === bv) return 0;
        return (av > bv ? 1 : -1) * mul;
      });
    }

    function renderReputationSortBtn(label, key) {
      var isActive = reputationSortKey === key;
      var ascActive = isActive && reputationSortDir === 'asc';
      var descActive = isActive && reputationSortDir === 'desc';
      return '<button type="button" class="reputation-sort-btn' + (isActive ? ' is-active' : '') + '" data-sort="' + key + '" aria-label="按' + label + '排序">' +
        escapeHtml(label) +
        '<span class="reputation-sort-icons" aria-hidden="true">' +
          '<i class="fa-solid fa-sort-up' + (ascActive ? ' is-active' : '') + '"></i>' +
          '<i class="fa-solid fa-sort-down' + (descActive ? ' is-active' : '') + '"></i>' +
        '</span>' +
      '</button>';
    }

    function renderReputationTableBody(products) {
      var rows = sortReputationRows(
        products.map(getReputationRowData),
        reputationSortKey,
        reputationSortDir
      );
      return rows.map(function(row) {
        var product = row.product;
        return '<tr class="' + (product.isSource ? 'is-source' : '') + '">' +
          '<td>' +
            '<div class="reputation-product-cell">' +
              renderProductColorDot(row.productIndex) +
              '<div>' +
                '<div class="reputation-product-name">' + escapeHtml(shortName(product.name, 22)) +
                  (product.isSource ? ' <span class="ref-badge"><i class="fa-solid fa-bookmark"></i>参照</span>' : '') +
                '</div>' +
                '<div class="reputation-product-meta">' + escapeHtml(product.supplier || '') + '</div>' +
              '</div>' +
            '</div>' +
          '</td>' +
          '<td class="' + getReputationCellClass('goodRate', row.goodRate) + '">' + escapeHtml(String(row.goodRate)) + '</td>' +
          '<td class="' + getReputationCellClass('validEvalCount', row.validEvalCount) + '">' + row.validEvalCount + ' 条</td>' +
          '<td class="' + getReputationCellClass('returnRate', row.returnRate) + '">' + row.returnRate.toFixed(1) + '%</td>' +
          '<td class="reputation-score-cell">' + row.score + '</td>' +
        '</tr>';
      }).join('');
    }

    function updateReputationSortHeaders() {
      document.querySelectorAll('#reputationTable .reputation-sort-btn').forEach(function(btn) {
        var key = btn.getAttribute('data-sort');
        var isActive = reputationSortKey === key;
        btn.classList.toggle('is-active', isActive);
        var icons = btn.querySelectorAll('.reputation-sort-icons i');
        if (icons[0]) icons[0].classList.toggle('is-active', isActive && reputationSortDir === 'asc');
        if (icons[1]) icons[1].classList.toggle('is-active', isActive && reputationSortDir === 'desc');
      });
    }

    function refreshReputationTable() {
      var tbody = document.getElementById('reputationTableBody');
      if (!tbody || !reputationTableProducts.length) return;
      tbody.innerHTML = renderReputationTableBody(reputationTableProducts);
      updateReputationSortHeaders();
    }

    function bindReputationTable(products) {
      reputationTableProducts = products;
      var table = document.getElementById('reputationTable');
      if (!table || table.dataset.bound === '1') return;
      table.dataset.bound = '1';
      table.addEventListener('click', function(event) {
        var btn = event.target.closest('.reputation-sort-btn');
        if (!btn) return;
        var key = btn.getAttribute('data-sort');
        if (!key) return;
        if (reputationSortKey === key) {
          reputationSortDir = reputationSortDir === 'asc' ? 'desc' : 'asc';
        } else {
          reputationSortKey = key;
          reputationSortDir = 'desc';
        }
        refreshReputationTable();
      });
      refreshReputationTable();
    }

    function renderUserReputationCompare(products) {
      enrichProductTradeInsight(products);
      reputationSortKey = '';
      reputationSortDir = 'desc';
      var refScore = getPortraitScore(getSourceProduct(products), 'userReputation');
      return '<div class="five-dim-block">' +
        renderFiveDimHead('userReputation', refScore) +
        '<div class="five-dim-body">' +
          '<div class="reputation-table-wrap">' +
            '<table class="reputation-table" id="reputationTable">' +
              '<thead><tr>' +
                '<th scope="col">商品</th>' +
                '<th scope="col">' + renderReputationSortBtn('好评率', 'goodRate') + '</th>' +
                '<th scope="col">' + renderReputationSortBtn('有效评价', 'validEval') + '</th>' +
                '<th scope="col">' + renderReputationSortBtn('退货率', 'returnRate') + '</th>' +
                '<th scope="col">' + renderReputationSortBtn('综合评分', 'score') + '</th>' +
              '</tr></thead>' +
              '<tbody id="reputationTableBody"></tbody>' +
            '</table>' +
          '</div>' +
        '</div>' +
      '</div>';
    }

    function renderSupplierDimBlock(products) {
      var refScore = getPortraitScore(getSourceProduct(products), 'supplier');
      return '<div class="five-dim-block five-dim-supplier">' +
        renderFiveDimHead('supplier', refScore) +

          '<div id="portraitSupplierRadar"></div>' +
        '</div>' +
      '</div>';
    }

    function renderPortraitCompare(products) {
      enrichProductTradeInsight(products);
      document.getElementById('portraitCompare').innerHTML =
        renderPriceReasonCompare(products) +
        renderPriceStableCompare(products) +
        renderHistoryDealCompare(products) +
        renderUserReputationCompare(products) +
        renderSupplierDimBlock(products);
      bindPriceReasonAxis(products);
      initPriceStableChart(products);
      initHistoryDealChart(products);
      bindReputationTable(products);
      renderSupplierRadarCompare(products, 'portraitSupplierRadar');
    }

    function getSupplierColor(index) {
      return getProductColor(index);
    }

    function getSupplierScores(product) {
      return SUPPLIER_DIM_KEYS.map(function(dim) {
        var matched = (product.supplierDims || []).find(function(item) { return item.key === dim.key; });
        return clampScore(matched ? matched.score : 0);
      });
    }

    function avgSixDimScore(scores) {
      if (!scores.length) return 0;
      var sum = scores.reduce(function(total, score) { return total + score; }, 0);
      return clampScore(sum / scores.length);
    }

    function buildAverageScores(products) {
      if (!products.length) return SUPPLIER_DIM_KEYS.map(function() { return 0; });
      return SUPPLIER_DIM_KEYS.map(function(dim, dimIndex) {
        var total = products.reduce(function(sum, product) {
          return sum + getSupplierScores(product)[dimIndex];
        }, 0);
        return clampScore(total / products.length);
      });
    }

    function buildSupplierRadarEntries(products) {
      var averageScores = buildAverageScores(products);
      var averageEntry = {
        id: 'average',
        type: 'average',
        name: '平均分',
        subtitle: '各候选供应商六维均值',
        color: '#64748b',
        scores: averageScores,
        avgScore: avgSixDimScore(averageScores),
        isSource: false
      };
      var productEntries = products.map(function(product, index) {
        var scores = getSupplierScores(product);
        return {
          id: 'product-' + index,
          type: 'product',
          productIndex: index,
          name: product.supplier || '未知供应商',
          subtitle: product.name || '',
          color: getProductColor(index),
          scores: scores,
          avgScore: avgSixDimScore(scores),
          isSource: !!product.isSource
        };
      });
      return [averageEntry].concat(productEntries);
    }

    function getDefaultSupplierSelectedIds(entries) {
      var ids = ['average'];
      var sourceEntry = entries.find(function(entry) { return entry.isSource; });
      if (sourceEntry) ids.push(sourceEntry.id);
      return ids;
    }

    function hexToRgba(hex, alpha) {
      var value = String(hex || '#2563eb').replace('#', '');
      if (value.length === 3) {
        value = value.split('').map(function(ch) { return ch + ch; }).join('');
      }
      var num = parseInt(value, 16);
      var r = (num >> 16) & 255;
      var g = (num >> 8) & 255;
      var b = num & 255;
      return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
    }

    function drawSupplierRadar(canvas, entries, selectedIds) {
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var width = canvas.width;
      var height = canvas.height;
      var centerX = width / 2;
      var centerY = height / 2 + 6;
      var radius = Math.min(width, height) * 0.28;
      var labels = SUPPLIER_DIM_KEYS.map(function(dim) { return dim.label; });
      var total = labels.length;
      var angleOf = function(index) {
        return -Math.PI / 2 + (index * Math.PI * 2 / total);
      };
      var activeEntries = entries.filter(function(entry) {
        return selectedIds.indexOf(entry.id) !== -1;
      });

      ctx.clearRect(0, 0, width, height);

      for (var level = 1; level <= 4; level++) {
        var levelRadius = radius * (level / 4);
        ctx.beginPath();
        for (var i = 0; i < total; i++) {
          var angle = angleOf(i);
          var x = centerX + Math.cos(angle) * levelRadius;
          var y = centerY + Math.sin(angle) * levelRadius;
          ctx[i ? 'lineTo' : 'moveTo'](x, y);
        }
        ctx.closePath();
        ctx.strokeStyle = level === 4 ? '#d1d5db' : '#e5e7eb';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      for (var axis = 0; axis < total; axis++) {
        var axisAngle = angleOf(axis);
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(axisAngle) * radius, centerY + Math.sin(axisAngle) * radius);
        ctx.strokeStyle = '#e5e7eb';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      activeEntries.forEach(function(entry) {
        var values = entry.scores;
        var color = entry.color;
        var isAverage = entry.type === 'average';

        ctx.beginPath();
        values.forEach(function(value, index) {
          var ratio = value / 100;
          var pointAngle = angleOf(index);
          var x = centerX + Math.cos(pointAngle) * radius * ratio;
          var y = centerY + Math.sin(pointAngle) * radius * ratio;
          ctx[index ? 'lineTo' : 'moveTo'](x, y);
        });
        ctx.closePath();
        ctx.fillStyle = hexToRgba(color, isAverage ? 0.12 : 0.18);
        ctx.fill();
        ctx.strokeStyle = color;
        ctx.lineWidth = isAverage ? 2 : 2.5;
        if (isAverage) ctx.setLineDash([6, 4]); else ctx.setLineDash([]);
        ctx.stroke();
        ctx.setLineDash([]);

        values.forEach(function(value, index) {
          var ratio = value / 100;
          var pointAngle = angleOf(index);
          var x = centerX + Math.cos(pointAngle) * radius * ratio;
          var y = centerY + Math.sin(pointAngle) * radius * ratio;
          ctx.beginPath();
          ctx.arc(x, y, isAverage ? 3 : 3.5, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.fill();
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 1.5;
          ctx.stroke();
        });
      });

      ctx.font = '12px "Microsoft YaHei", sans-serif';
      ctx.fillStyle = '#475569';
      labels.forEach(function(label, index) {
        var labelAngle = angleOf(index);
        var labelRadius = radius + 30;
        var x = centerX + Math.cos(labelAngle) * labelRadius;
        var y = centerY + Math.sin(labelAngle) * labelRadius;
        var text = label;
        var metrics = ctx.measureText(text);
        var drawX = x - metrics.width / 2;
        if (index === 1 || index === 2) drawX = x;
        if (index === 3 || index === 4) drawX = x - metrics.width;
        ctx.fillText(text, drawX, y + 4);
      });
    }

    function renderSupplierListItem(entry, isSelected) {
      var extraClass = entry.type === 'average' ? ' is-average' : '';
      var dotHtml = entry.type === 'product' && entry.productIndex != null
        ? renderProductColorDot(entry.productIndex, 'supplier-list-dot')
        : '<span class="product-color-dot supplier-list-dot" style="background:' + entry.color + '" aria-hidden="true"></span>';
      return '<button type="button" class="supplier-list-item' + extraClass + (isSelected ? ' is-selected' : '') + '" data-id="' + escapeHtml(entry.id) + '" aria-pressed="' + (isSelected ? 'true' : 'false') + '">' +
        '<span class="supplier-list-check" aria-hidden="true"><i class="fa-solid fa-check"></i></span>' +
        dotHtml +
        '<div class="supplier-list-main">' +
          '<div class="supplier-list-name-row">' +
            '<span class="supplier-list-name">' + escapeHtml(entry.name) + '</span>' +
            '<span class="supplier-list-total">六维均分 <strong>' + entry.avgScore + '</strong></span>' +
          '</div>' +
          '<div class="supplier-list-product" title="' + escapeHtml(entry.subtitle || '') + '">' + escapeHtml(shortName(entry.subtitle, 24)) + '</div>' +
          (entry.isSource ? '<span class="ref-badge"><i class="fa-solid fa-bookmark"></i>参照商品</span>' : '') +
        '</div>' +
      '</button>';
    }

    function refreshSupplierRadarView() {
      var canvas = document.getElementById('supplierRadarCanvas');
      var wrap = document.querySelector('.supplier-radar-wrap');
      if (!canvas || !wrap) return;
      var hasSelection = supplierSelectedIds.length > 0;
      wrap.classList.toggle('is-empty', !hasSelection);
      if (hasSelection) {
        drawSupplierRadar(canvas, supplierRadarEntries, supplierSelectedIds);
      } else {
        var ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }

    function renderSupplierRadarCompare(products, containerId) {
      containerId = containerId || 'portraitSupplierRadar';
      supplierRadarEntries = buildSupplierRadarEntries(products);
      supplierSelectedIds = getDefaultSupplierSelectedIds(supplierRadarEntries);

      var listHtml = supplierRadarEntries.map(function(entry) {
        return renderSupplierListItem(entry, supplierSelectedIds.indexOf(entry.id) !== -1);
      }).join('');

      document.getElementById(containerId).innerHTML =
        '<div class="supplier-radar-layout">' +
          '<div class="supplier-list" id="supplierList" role="group" aria-label="供应商对比模块">' + listHtml + '</div>' +
          '<div>' +
            '<div class="supplier-radar-wrap">' +
              '<canvas id="supplierRadarCanvas" width="560" height="420" aria-label="供应商六维叠加雷达图"></canvas>' +
              '<div class="supplier-radar-empty">请至少勾选一个模块以展示六维雷达图</div>' +
            '</div>' +
            '<p class="supplier-radar-hint">点击左侧模块可勾选/取消；默认展示平均分与参照商品，支持多选叠加对比。六维均分为 0–100 分。</p>' +
          '</div>' +
        '</div>';

      refreshSupplierRadarView();

      var listEl = document.getElementById('supplierList');
      if (!listEl || listEl.dataset.bound === '1') return;
      listEl.dataset.bound = '1';
      listEl.addEventListener('click', function(event) {
        var item = event.target.closest('.supplier-list-item');
        if (!item) return;
        var id = item.getAttribute('data-id');
        if (!id) return;
        var selectedIndex = supplierSelectedIds.indexOf(id);
        if (selectedIndex === -1) {
          supplierSelectedIds.push(id);
        } else {
          supplierSelectedIds.splice(selectedIndex, 1);
        }
        document.querySelectorAll('.supplier-list-item').forEach(function(node) {
          var nodeId = node.getAttribute('data-id');
          var isSelected = supplierSelectedIds.indexOf(nodeId) !== -1;
          node.classList.toggle('is-selected', isSelected);
          node.setAttribute('aria-pressed', isSelected ? 'true' : 'false');
        });
        refreshSupplierRadarView();
      });
    }

    function renderComparePage() {
      var products = comparePayload.products || [];
      if (!products.length) {
        document.getElementById('pageMain').innerHTML = '<section class="card section"><div class="empty-state">未找到比质比价分析数据，请从商品详情勾选候选商品后进入。</div></section>';
        return;
      }

      var source = getSourceProduct(products);
      spreadSupplierDimsIfFlat(products);
      renderSpecTable(products, source);
      renderPortraitCompare(products);
    }

    function defaultSupplierDims(index) {
      var profile = SUPPLIER_MOCK_SCORE_MATRIX[index % SUPPLIER_MOCK_SCORE_MATRIX.length];
      return SUPPLIER_DIM_KEYS.map(function(dim, dimIndex) {
        return {
          key: dim.key,
          name: dim.label,
          score: clampScore(profile[dimIndex])
        };
      });
    }

    function spreadSupplierDimsIfFlat(products) {
      if (!products.length) return;
      var avgs = products.map(function(product) {
        return avgSixDimScore(getSupplierScores(product));
      });
      var maxAvg = Math.max.apply(null, avgs);
      var minAvg = Math.min.apply(null, avgs);
      if (maxAvg - minAvg <= 8) {
        products.forEach(function(product, index) {
          product.supplierDims = defaultSupplierDims(index);
        });
      }
    }

    function legacyToProducts(legacy) {
      var source = legacy.sourceProduct || {};
      var rows = (legacy.selectedRows && legacy.selectedRows[legacy.compareType || 'same']) ||
        (legacy.selectedRows && legacy.selectedRows.same) || [];
      var compareType = legacy.compareType || 'same';
      var sourceEntry = {
        id: source.id,
        name: source.name,
        supplier: source.supplier,
        price: source.price,
        unit: '件',
        floor: source.floor,
        ceiling: source.ceiling,
        params: source.params || [],
        portrait: {
          priceReason: source.priceScore || 82,
          priceStable: 78,
          historyDeal: 86,
          userReputation: source.qualityScore || 88,
          supplier: 90
        },
        supplierDims: defaultSupplierDims(0),
        tradeInsight: {
          priceChange: { date: '2026-04-06', direction: '降价', percent: 2.1 },
          sold: 5670,
          recentSold: 312,
          lastDealDate: '2026-06-03',
          goodRate: '97.9%',
          validEvalCount: 128,
          returnRate: 1.2
        },
        isSource: true
      };
      var candidates = rows.filter(function(row) { return !row.isCurrent; }).map(function(row, index) {
        return {
          id: row.id,
          name: row.productName || row.name,
          supplier: row.supplier,
          price: row.price,
          unit: '件',
          floor: row.floor,
          ceiling: row.ceiling,
          params: sourceEntry.params,
          portrait: {
            priceReason: row.priceScore || 80,
            priceStable: row.priceChangeDirection === '降价' ? 82 : 68,
            historyDeal: clampScore(84 - index * 5),
            userReputation: row.qualityScore || 75,
            supplier: clampScore(88 - index * 3)
          },
          supplierDims: defaultSupplierDims(index + 1),
          tradeInsight: {
            priceChange: {
              date: row.priceChangeDate || ('2026-04-0' + (index + 2)),
              direction: row.priceChangeDirection || '降价',
              percent: row.priceChangePercent || +(1.8 + index * 0.8).toFixed(1)
            },
            sold: Math.max(200, 5200 - (index + 1) * 980),
            recentSold: Math.max(12, 280 - (index + 1) * 55),
            lastDealDate: '2026-05-' + String(Math.max(10, 20 - index * 2)).padStart(2, '0'),
            goodRate: (97.5 - (index + 1) * 1.1).toFixed(1) + '%',
            validEvalCount: Math.max(10, 120 - (index + 1) * 20),
            returnRate: +(1.0 + (index + 1) * 0.35).toFixed(1)
          },
          isSource: false
        };
      });
      return [sourceEntry].concat(candidates);
    }

    function normalizePayload(raw) {
      if (raw.products && raw.products.length) {
        if (!raw.products.some(function(p) { return p.isSource; })) {
          raw.products[0].isSource = true;
        }
        return raw;
      }
      if (raw.sourceProduct || raw.selectedRows) {
        return {
          compareType: raw.compareType || 'same',
          compareTypeLabel: raw.compareType === 'similar' ? '相近品规' : '同品同规',
          sourceId: raw.sourceProduct && raw.sourceProduct.id,
          specLabel: raw.sourceProduct && raw.sourceProduct.name,
          generatedAt: raw.generatedAt || new Date().toISOString(),
          products: legacyToProducts(raw)
        };
      }
      return raw;
    }

    function bootstrap() {
      var rawPayload = window.ComparePayloadBridge ? ComparePayloadBridge.load() : null;
      if (!rawPayload) {
        document.getElementById('pageMain').innerHTML = '<section class="card section"><div class="empty-state">未找到比质比价分析数据，请从商品详情勾选候选商品后进入。</div></section>';
        return;
      }
      comparePayload = normalizePayload(rawPayload);
      if (window.ComparePayloadBridge) ComparePayloadBridge.clearHash();
      if (!comparePayload.products || !comparePayload.products.length) {
        document.getElementById('pageMain').innerHTML = '<section class="card section"><div class="empty-state">未找到比质比价分析数据，请从商品详情勾选候选商品后进入。</div></section>';
        return;
      }
      renderComparePage();
    }

    document.addEventListener('DOMContentLoaded', bootstrap);
  </script>
  <script src="../assets/unified_topbar.js"></script>
</body>
</html>
