<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>采购单审批 | 国采e购</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../assets/custom.css">
  <style>
    :root {
      --primary: #E2231A;
      --primary-dark: #c01e16;
      --border: #ececec;
      --text: #111827;
      --sub: #6b7280;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #1f2937;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 12px;
    }

    .phone-shell {
      width: min(390px, 100%);
      min-height: min(844px, calc(100vh - 48px));
      background: #f5f5f5;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      border: 8px solid #111827;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .phone-notch {
      height: 28px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .phone-notch::after {
      content: "";
      width: 96px;
      height: 22px;
      border-radius: 0 0 16px 16px;
      background: #111827;
    }

    .mobile-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff;
      padding: 14px 16px 16px;
      flex-shrink: 0;
    }

    .mobile-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      opacity: 0.92;
    }

    .mobile-title {
      margin-top: 10px;
      font-size: 20px;
      font-weight: 800;
    }

    .mobile-subtitle {
      margin-top: 4px;
      font-size: 12px;
      opacity: 0.88;
    }

    .mobile-content {
      flex: 1;
      overflow: auto;
      padding: 12px 12px 88px;
    }

    .m-card {
      background: #fff;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }

    .m-section-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .m-info-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f3f4f6;
      font-size: 13px;
      line-height: 1.7;
    }

    .m-info-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .m-info-label {
      color: var(--sub);
      flex-shrink: 0;
      min-width: 84px;
    }

    .m-info-value {
      color: var(--text);
      font-weight: 600;
      text-align: right;
      word-break: break-all;
    }

    .m-file-item {
      padding: 10px 12px;
      border-radius: 10px;
      background: #f8fafc;
      font-size: 12px;
      color: #475569;
      margin-top: 8px;
    }

    .product-card {
      display: flex;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
    }

    .product-thumb {
      width: 72px;
      height: 72px;
      border-radius: 10px;
      border: 1px solid var(--border);
      object-fit: cover;
      flex-shrink: 0;
    }

    .product-name {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.6;
      color: var(--text);
    }

    .product-meta {
      margin-top: 6px;
      font-size: 12px;
      color: var(--sub);
      line-height: 1.8;
    }

    .product-price-row {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 13px;
    }

    .price-red {
      color: var(--primary);
      font-weight: 800;
    }

    .total-box {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      background: #fff5f5;
      border: 1px solid #fecaca;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 8px;
      color: #374151;
    }

    .total-row:last-child {
      margin-bottom: 0;
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
    }

    .total-row:last-child .price-red {
      font-size: 20px;
    }

    .remark-box {
      min-height: 72px;
      padding: 12px;
      border-radius: 10px;
      background: #f8fafc;
      border: 1px solid var(--border);
      font-size: 13px;
      line-height: 1.8;
      color: #475569;
    }

    .approver-tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 700;
      margin: 0 8px 8px 0;
    }

    .mobile-footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(8px);
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .m-btn {
      height: 44px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      border: none;
      cursor: pointer;
    }

    .m-btn-reject {
      background: #fff;
      color: #374151;
      border: 1px solid #d1d5db;
    }

    .m-btn-pass {
      background: var(--primary);
      color: #fff;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 32px;
      transform: translateX(-50%) translateY(12px);
      z-index: 300;
      min-width: 220px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.92);
      color: #fff;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="phone-shell">
    <div class="phone-notch"></div>

    <header class="mobile-header">
      <div class="mobile-header-top">
        <span><i class="fa-solid fa-signal"></i> 国采e购</span>
        <span id="headerTime">--:--</span>
      </div>
      <div class="mobile-title">采购单审批</div>
      <div class="mobile-subtitle">采购单编号：<span id="headerPurchaseNo">--</span></div>
    </header>

    <main class="mobile-content">
      <section class="m-card">
        <div class="m-section-title"><i class="fa-solid fa-id-card text-red-500"></i>采购基础信息</div>
        <div class="m-info-row"><span class="m-info-label">采购人员</span><span class="m-info-value" id="basePurchaser">--</span></div>
        <div class="m-info-row"><span class="m-info-label">所在部门</span><span class="m-info-value" id="baseDepartment">--</span></div>
        <div class="m-info-row"><span class="m-info-label">发起时间</span><span class="m-info-value" id="baseInitiatedAt">--</span></div>
        <div class="m-info-row"><span class="m-info-label">采购计划</span><span class="m-info-value" id="basePlan">--</span></div>
        <div class="m-info-row"><span class="m-info-label">采购预算</span><span class="m-info-value" id="baseBudget">--</span></div>
        <div class="m-info-row"><span class="m-info-label">依据文件</span><span class="m-info-value" id="baseFilesBrief">--</span></div>
        <div id="baseFiles"></div>
        <div style="margin-top:10px;">
          <div class="m-info-label" style="margin-bottom:6px;">审批人员</div>
          <div id="approverTags"></div>
        </div>
      </section>

      <section class="m-card">
        <div class="m-section-title"><i class="fa-solid fa-box text-red-500"></i>采购商品</div>
        <div id="productCardWrap"></div>
        <div class="total-box">
          <div class="total-row"><span>商品金额</span><span class="price-red" id="goodsTotal">--</span></div>
          <div class="total-row"><span>运费</span><span id="shippingFee">￥0.00</span></div>
          <div class="total-row"><span>金额总计</span><span class="price-red" id="payableTotal">--</span></div>
        </div>
      </section>

      <section class="m-card">
        <div class="m-section-title"><i class="fa-solid fa-file-invoice text-red-500"></i>发票信息</div>
        <div class="m-info-row"><span class="m-info-label">发票类型</span><span class="m-info-value" id="invoiceType">--</span></div>
        <div class="m-info-row"><span class="m-info-label">发票抬头</span><span class="m-info-value" id="invoiceTitle">--</span></div>
        <div class="m-info-row"><span class="m-info-label">纳税人识别号</span><span class="m-info-value" id="invoiceTaxNo">--</span></div>
        <div class="m-info-row"><span class="m-info-label">开户行</span><span class="m-info-value" id="invoiceBank">--</span></div>
        <div class="m-info-row"><span class="m-info-label">账号</span><span class="m-info-value" id="invoiceAccount">--</span></div>
      </section>

      <section class="m-card">
        <div class="m-section-title"><i class="fa-solid fa-location-dot text-red-500"></i>收货人信息</div>
        <div class="m-info-row"><span class="m-info-label">配送地址</span><span class="m-info-value" id="deliveryArea">--</span></div>
        <div class="m-info-row"><span class="m-info-label">收货人</span><span class="m-info-value" id="deliveryReceiver">--</span></div>
        <div class="m-info-row"><span class="m-info-label">联系电话</span><span class="m-info-value" id="deliveryPhone">--</span></div>
        <div class="m-info-row"><span class="m-info-label">预计发货</span><span class="m-info-value" id="deliveryTime">--</span></div>
      </section>

      <section class="m-card">
        <div class="m-section-title"><i class="fa-solid fa-note-sticky text-red-500"></i>备注信息</div>
        <div class="remark-box" id="remarkText">无</div>
      </section>
    </main>

    <footer class="mobile-footer">
      <button class="m-btn m-btn-reject" type="button" onclick="showToast('已驳回（原型演示）')">驳回</button>
      <button class="m-btn m-btn-pass" type="button" onclick="showToast('审批通过（原型演示）')">审批通过</button>
    </footer>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const APPROVAL_STORAGE_KEY = 'gcPurchaseApprovalPayload';

    function formatCurrency(value) {
      return `￥${Number(value || 0).toFixed(2)}`;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function updateHeaderTime() {
      const now = new Date();
      document.getElementById('headerTime').textContent = now.toLocaleTimeString('zh-CN', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });
    }

    function getFallbackPayload() {
      return {
        purchaseNo: 'PO20260520001',
        purchaser: '采购专员',
        purchaserDepartment: '采购管理部',
        initiatedAt: new Date().toLocaleString('zh-CN', { hour12: false }),
        procurementBasis: { plan: null, budget: null, files: [] },
        remark: '',
        approvers: [{ name: '王主任', phone: '13800138001', department: '采购管理部' }],
        product: {
          name: '中性笔 0.5mm 黑色 12支/盒',
          model: '0.5mm',
          image: 'https://images.unsplash.com/photo-1583484963886-cce2f525b1a8?w=120&h=120&fit=crop',
          unit: '盒',
          price: 24.9,
          qty: 1,
          subtotal: 24.9,
          supplier: '得力政企集采店',
          storeName: '京东'
        },
        invoice: {
          type: '增值税普通发票',
          title: '天创信总公司',
          taxNo: '93827472837237172Y',
          bank: '--',
          account: '--'
        },
        delivery: {
          area: '上海市浦东新区创业大厦17楼',
          receiver: '小庄',
          phone: '138****5621',
          time: '48小时内发货'
        },
        totalAmount: 24.9,
        shippingFee: 0,
        payableAmount: 24.9
      };
    }

    function loadPayload() {
      const raw = sessionStorage.getItem(APPROVAL_STORAGE_KEY);
      if (!raw) return getFallbackPayload();
      try {
        return JSON.parse(raw);
      } catch (error) {
        return getFallbackPayload();
      }
    }

    function renderPage() {
      const data = loadPayload();
      const params = new URLSearchParams(window.location.search);
      const approverName = params.get('name');
      const pb = data.procurementBasis || {};
      const plan = pb.plan;
      const budget = pb.budget;
      const files = Array.isArray(pb.files) ? pb.files : [];

      document.title = `采购单审批 - ${data.purchaseNo} | 国采e购`;
      document.getElementById('headerPurchaseNo').textContent = data.purchaseNo || '--';
      if (approverName) {
        document.querySelector('.mobile-subtitle').innerHTML = `采购单编号：${escapeHtml(data.purchaseNo || '--')} · 当前审批人：${escapeHtml(approverName)}`;
      }

      document.getElementById('basePurchaser').textContent = data.purchaser || '--';
      document.getElementById('baseDepartment').textContent = data.purchaserDepartment || '--';
      document.getElementById('baseInitiatedAt').textContent = data.initiatedAt || '--';
      document.getElementById('basePlan').textContent = plan ? plan.name : '未关联采购计划';
      document.getElementById('baseBudget').textContent = budget ? `${budget.name}（${formatCurrency(budget.amount || 0)}）` : '未关联采购预算';
      document.getElementById('baseFilesBrief').textContent = files.length ? `共 ${files.length} 份` : '暂未上传';

      document.getElementById('baseFiles').innerHTML = files.length
        ? files.map(item => `<div class="m-file-item"><i class="fa-regular fa-file-lines mr-1"></i>${escapeHtml(item.name)}</div>`).join('')
        : '';

      document.getElementById('approverTags').innerHTML = (data.approvers || []).map(item =>
        `<span class="approver-tag">${escapeHtml(item.name)} · ${escapeHtml(item.department)}</span>`
      ).join('') || '<span class="approver-tag" style="background:#f1f5f9;color:#64748b;">暂无审批人员</span>';

      const p = data.product || {};
      document.getElementById('productCardWrap').innerHTML = `
        <div class="product-card">
          <img class="product-thumb" src="${escapeHtml(p.image)}" alt="商品图片">
          <div style="flex:1;min-width:0;">
            <div class="product-name">${escapeHtml(p.name)}</div>
            <div class="product-meta">规格：${escapeHtml(p.model || '--')}<br>${escapeHtml(p.supplier || '--')}</div>
            <div class="product-price-row">
              <span class="price-red">${formatCurrency(p.price)} / ${escapeHtml(p.unit || '件')}</span>
              <span>x ${p.qty || 1}</span>
            </div>
            <div class="product-price-row">
              <span>小计</span>
              <span class="price-red">${formatCurrency(p.subtotal || p.price)}</span>
            </div>
          </div>
        </div>
      `;

      document.getElementById('goodsTotal').textContent = formatCurrency(data.totalAmount);
      document.getElementById('shippingFee').textContent = formatCurrency(data.shippingFee || 0);
      document.getElementById('payableTotal').textContent = formatCurrency(data.payableAmount);

      const inv = data.invoice || {};
      document.getElementById('invoiceType').textContent = inv.type || '--';
      document.getElementById('invoiceTitle').textContent = inv.title || '--';
      document.getElementById('invoiceTaxNo').textContent = inv.taxNo || '--';
      document.getElementById('invoiceBank').textContent = inv.bank || '--';
      document.getElementById('invoiceAccount').textContent = inv.account || '--';

      const d = data.delivery || {};
      document.getElementById('deliveryArea').textContent = d.area || '--';
      document.getElementById('deliveryReceiver').textContent = d.receiver || '--';
      document.getElementById('deliveryPhone').textContent = d.phone || '--';
      document.getElementById('deliveryTime').textContent = d.time || '--';
      document.getElementById('remarkText').textContent = data.remark || '无';
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    document.addEventListener('DOMContentLoaded', function() {
      updateHeaderTime();
      setInterval(updateHeaderTime, 60000);
      renderPage();
    });
  </script>
</body>
</html>
