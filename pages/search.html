<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>采购搜索 | 国采e购</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --brand: #2f6bff;
      --brand-dark: #1d4ed8;
      --brand-light: rgba(47, 107, 255, 0.08);
      --mall-red: #E2231A;
      --mall-red-hover: #c01e16;
      --mall-red-light: #fff3f2;
      --text-main: #0f172a;
      --text-sub: #64748b;
      --bg: #f9f8f6;
      --border: rgba(148, 163, 184, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #fff;
      color: var(--text-main);
    }

    .search-header-zone {
      background: #fff;
      border-bottom: 1px solid rgba(226, 232, 240, 0.92);
      padding: 20px 0 16px;
    }

    .page-wrap {
      width: min(1320px, calc(100% - 40px));
      margin: 0 auto;
    }

    .search-hero {
      width: 100%;
      margin: 0 auto;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    .search-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      grid-template-rows: auto auto;
      column-gap: 18px;
      row-gap: 12px;
      width: min(980px, calc(100% - 40px));
      align-items: center;
    }

    .eshop-brand {
      grid-column: 1;
      grid-row: 1;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      text-decoration: none;
      align-self: center;
    }

    .eshop-name {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.2px;
      color: var(--brand);
      white-space: nowrap;
    }

    .eshop-name em {
      font-style: normal;
      color: #5b8cff;
      font-weight: 700;
    }

    .search-bar {
      grid-column: 2;
      grid-row: 1;
      width: 100%;
      height: 48px;
      border-radius: 999px;
      border: 1px solid rgba(226, 232, 240, 0.96);
      background: #fff;
      display: grid;
      grid-template-columns: 92px 1fr 96px;
      align-items: center;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
    }

    .cat-assistant-btn {
      grid-column: 3;
      grid-row: 1;
      display: inline-flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      height: 48px;
      padding: 0 16px 0 8px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffffff 0%, #f0f5ff 100%);
      border: 1px solid rgba(47, 107, 255, 0.22);
      box-shadow: 0 6px 16px rgba(47, 107, 255, 0.1);
      text-decoration: none;
      flex-shrink: 0;
      align-self: center;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .cat-assistant-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(47, 107, 255, 0.38);
      box-shadow: 0 8px 20px rgba(47, 107, 255, 0.16);
    }

    .cat-mini {
      position: relative;
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    .cat-mini-card {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(180deg, #fff 0%, #eef4ff 100%);
      border: 1px solid rgba(47, 107, 255, 0.12);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
      overflow: hidden;
    }

    .cat-mini-face {
      position: absolute;
      left: 50%;
      top: 8px;
      transform: translateX(-50%);
      width: 24px;
      height: 20px;
      background: linear-gradient(180deg, #1f2937 0%, #0f172a 100%);
      border-radius: 11px;
    }

    .cat-mini-ear {
      position: absolute;
      top: -5px;
      width: 8px;
      height: 8px;
      background: #111827;
      border-radius: 4px 6px 3px 6px;
    }

    .cat-mini-ear.left { left: 2px; transform: rotate(-28deg); }
    .cat-mini-ear.right { right: 2px; transform: scaleX(-1) rotate(-28deg); }

    .cat-mini-eye {
      position: absolute;
      top: 8px;
      width: 3px;
      height: 5px;
      border-radius: 999px;
      background: #fff;
    }

    .cat-mini-eye.left { left: 6px; }
    .cat-mini-eye.right { right: 6px; }

    .cat-mini-nose {
      position: absolute;
      left: 50%;
      top: 11px;
      transform: translateX(-50%);
      width: 4px;
      height: 3px;
      border-radius: 6px;
      background: #fb7185;
    }

    .cat-mini-body {
      display: none;
    }

    .cat-assistant-label {
      font-size: 15px;
      font-weight: 800;
      color: var(--brand);
      line-height: 1;
      white-space: nowrap;
      letter-spacing: 0.2px;
    }

    .search-type {
      position: relative;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid rgba(226, 232, 240, 0.96);
      background: #fafbfc;
      padding: 0 10px 0 14px;
    }

    .search-type::after {
      content: "";
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      border: 4px solid transparent;
      border-top-color: #94a3b8;
      pointer-events: none;
    }

    .search-type-select {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      padding-right: 14px;
    }

    .search-input {
      height: 100%;
      border: none;
      outline: none;
      font-size: 15px;
      background: transparent;
      color: var(--text-main);
    }

    .search-btn {
      height: 100%;
      border: none;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .search-btn:hover {
      opacity: 0.88;
    }

    .tab-row {
      margin-top: 16px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 4px;
      overflow-x: auto;
    }

    .tab-item {
      height: 52px;
      padding: 0 18px;
      border: none;
      background: transparent;
      color: #475569;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      position: relative;
      white-space: nowrap;
    }

    .tab-item.active {
      color: var(--brand);
    }

    .tab-item.active::after {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 0;
      height: 3px;
      border-radius: 3px 3px 0 0;
      background: var(--brand);
    }

    .filter-bar {
      margin-top: 14px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      color: var(--text-main);
    }

    .filter-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .sort-btn {
      height: 32px;
      padding: 0 14px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text-sub);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .sort-btn.active {
      background: var(--brand);
      color: #fff;
    }

    .filter-select {
      height: 32px;
      min-width: 112px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid rgba(203, 213, 225, 0.9);
      background: #f8fafc;
      color: var(--text-main);
      font-size: 13px;
      outline: none;
    }

    .filter-select option {
      color: var(--text-main);
    }

    .results-footer {
      margin-top: 20px;
      padding: 16px 18px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      color: var(--text-sub);
      font-size: 13px;
      font-weight: 600;
    }

    .results-footer-meta b {
      color: var(--brand);
    }

    .results-pagination {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .page-btn {
      height: 34px;
      min-width: 72px;
      padding: 0 14px;
      border-radius: 8px;
      border: 1px solid rgba(203, 213, 225, 0.95);
      background: #fff;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    }

    .page-btn:hover:not(:disabled) {
      border-color: var(--brand);
      color: var(--brand);
      background: var(--brand-light);
    }

    .page-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .page-info {
      min-width: 64px;
      text-align: center;
      color: var(--text-main);
      font-weight: 700;
    }

    .ai-strip {
      grid-column: 2;
      grid-row: 2;
      margin: 0;
      padding: 0;
      background: transparent;
      border: none;
    }

    .ai-suggest {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-start;
    }

    .ai-suggest-label {
      font-size: 13px;
      color: var(--text-sub);
      font-weight: 600;
      margin-right: 2px;
    }

    .suggest-chip {
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid rgba(47, 107, 255, 0.3);
      background: #fff;
      color: var(--brand-dark);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .suggest-chip:hover {
      background: var(--brand-light);
      border-color: rgba(47, 107, 255, 0.45);
    }

    .suggest-chip.active {
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
      border-color: var(--brand);
      color: #fff;
    }

    .results-zone {
      background: #f5f8ff;
      padding: 16px 0 40px;
      min-height: calc(100vh - 300px);
    }

    .results-zone .page-wrap {
      padding: 0;
    }

    .results-wrap {
      margin-top: 16px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px 10px;
    }

    .product-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 0;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .product-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
      border-color: var(--mall-red);
    }

    .product-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #f8fafc;
    }

    .product-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product-tag {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #fde2e0;
      color: var(--mall-red);
      font-size: 11px;
      font-weight: 700;
    }

    .product-body {
      padding: 10px 10px 8px;
    }

    .product-name {
      display: block;
      min-height: 40px;
      color: #1f2937;
      text-decoration: none;
      font-size: 13px;
      line-height: 1.45;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .product-name:hover {
      color: var(--mall-red);
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
      margin-bottom: 8px;
    }

    .price-num {
      color: var(--mall-red);
      font-size: 22px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .price-unit {
      color: var(--mall-red);
      font-size: 12px;
      font-weight: 700;
    }

    .supplier-row {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-sub);
      font-size: 12px;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .range-wrap {
      margin-bottom: 10px;
    }

    .range-track {
      position: relative;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(to right, #60a5fa 0%, #38bdf8 50%, #f87171 100%);
    }

    .range-marker {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--brand);
      box-shadow: 0 0 0 2px rgba(47, 107, 255, 0.15);
    }

    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #9ca3af;
      margin-top: 5px;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-btn {
      height: 30px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .action-btn.compare {
      flex: 1;
      border: none;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
      color: #fff;
    }

    .action-btn.compare:hover {
      filter: brightness(0.98);
    }

    .action-btn.cart {
      flex: 1;
      border: 1px solid #fecaca;
      background: #fff5f5;
      color: var(--mall-red);
    }

    .action-btn.cart:hover {
      background: #fff0ef;
    }

    .empty-box {
      background: #fff;
      border: 1px dashed #d1d5db;
      border-radius: 16px;
      padding: 60px 20px;
      text-align: center;
      color: #9ca3af;
      grid-column: 1 / -1;
    }

    .compare-picker-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(4px);
      z-index: 180;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .compare-picker-overlay.show {
      display: flex;
    }

    .compare-picker-modal {
      width: min(1180px, 96vw);
      max-height: 88vh;
      background: #fff;
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .compare-picker-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .compare-picker-close {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
      color: #64748b;
      cursor: pointer;
    }

    .compare-picker-content {
      padding: 18px 20px;
      overflow: auto;
      flex: 1;
      background: #fafafa;
    }

    .compare-picker-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .compare-picker-current {
      padding: 10px 12px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid #dbeafe;
      color: #1e3a8a;
      font-size: 13px;
      line-height: 1.7;
    }

    .compare-picker-count {
      font-size: 14px;
      color: #475569;
      font-weight: 700;
    }

    .compare-tab-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .compare-tab {
      height: 36px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      color: #475569;
      font-weight: 700;
      cursor: pointer;
    }

    .compare-tab.active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    .compare-picker-table-wrap {
      margin-top: 14px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: auto;
    }

    .compare-picker-table {
      width: 100%;
      min-width: 1080px;
      border-collapse: collapse;
    }

    .compare-picker-table th,
    .compare-picker-table td {
      padding: 12px 10px;
      border-bottom: 1px solid #f1f5f9;
      text-align: left;
      font-size: 13px;
      vertical-align: middle;
    }

    .compare-picker-table th {
      background: #f8fafc;
      color: #475569;
      font-weight: 700;
    }

    .compare-picker-foot {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      background: #fff;
    }

    .compare-picker-tip {
      font-size: 13px;
      color: #64748b;
    }

    .primary-btn,
    .secondary-btn {
      height: 38px;
      padding: 0 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: none;
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
      color: #fff;
    }

    .primary-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .secondary-btn {
      background: #fff;
      color: #475569;
      border: 1px solid var(--border);
    }

    @media (max-width: 900px) {
      .search-row {
        grid-template-columns: minmax(0, 1fr) auto;
        grid-template-rows: auto auto auto;
        width: min(100%, calc(100% - 32px));
      }
      .eshop-brand {
        grid-column: 1 / -1;
        grid-row: 1;
        justify-self: center;
      }
      .search-bar {
        grid-column: 1;
        grid-row: 2;
        grid-template-columns: 84px 1fr 88px;
      }
      .cat-assistant-btn {
        grid-column: 2;
        grid-row: 2;
      }
      .ai-strip {
        grid-column: 1 / -1;
        grid-row: 3;
      }
    }

    @media (max-width: 1280px) {
      .product-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    }

    @media (max-width: 1100px) {
      .product-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .filter-bar { align-items: flex-start; }
    }

    @media (max-width: 900px) {
      .product-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .product-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
  <script src="../assets/mode_switcher.js"></script>
</head>
<body>
  <header class="topbar"></header>

  <div class="search-header-zone">
    <section class="search-hero">
      <div class="search-row">
        <a class="eshop-brand" href="./merged_home.html?tab=mall">
          <span class="eshop-name">E<em>·</em>SHOPPING</span>
        </a>
        <div class="search-bar">
          <div class="search-type">
            <select id="searchTypeSelect" class="search-type-select" aria-label="搜索类型">
              <option value="product">宝贝</option>
              <option value="shop">店铺</option>
            </select>
          </div>
          <input id="searchInput" class="search-input" placeholder="请输入采购需求，如“A4打印纸，15元以内，华南供应商，高时效”">
          <button id="searchBtn" class="search-btn" type="button">搜索</button>
        </div>
        <a class="cat-assistant-btn" href="../pages-new/ai_assistant.html" title="猫助手 · AI 智能采购">
          <span class="cat-mini" aria-hidden="true">
            <span class="cat-mini-card">
              <span class="cat-mini-face">
                <span class="cat-mini-ear left"></span>
                <span class="cat-mini-ear right"></span>
                <span class="cat-mini-eye left"></span>
                <span class="cat-mini-eye right"></span>
                <span class="cat-mini-nose"></span>
              </span>
            </span>
          </span>
          <span class="cat-assistant-label">猫助手</span>
        </a>
        <div class="ai-strip">
          <div class="ai-suggest" id="aiSuggest"></div>
        </div>
      </div>
    </section>
  </div>

  <div class="results-zone" id="resultsZone">
  <main class="page-wrap">

    <section class="tab-row" id="tabRow"></section>

    <section class="filter-bar">
      <div class="filter-left">
        <button class="sort-btn active" data-sort="comprehensive">综合</button>
        <button class="sort-btn" data-sort="priceAsc">价格 <i class="fa-solid fa-chevron-down text-xs"></i></button>

    const PAGE_SIZE = 24;

    const state = {
      tab: 'hot',
      query: '',
      searchType: 'product',
      sort: 'comprehensive',
      region: '全部',
      city: '全部',
      attr: '全部',
      page: 1,
      cart: { 'GC-001': 1, 'GC-005': 2 }
    };

    let currentCompareProduct = null;
    let currentCompareTab = 'same';
    let comparePickerSelections = { same: [], similar: [] };

    function $(id) {
      return document.getElementById(id);
    }

    function avg(values) {
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function productScore(product) {
      return Math.round(avg([
        getPriceScore(product),
        getRiskScore(product),
        getQualityScore(product),
        getAfterSalesScore(product),
        getFulfillmentScore(product)
      ]));
    }

    function getPriceScore(product) {
      const pct = ((product.price - product.floor) / product.floor) * 100;
      return Math.max(76, Math.round(98 - pct));
    }

    function getRiskScore(product) {
      return Math.round((product.supplierScore / 5) * 100);
    }

    function getQualityScore(product) {
      return Math.min(96, Math.round(parseFloat(product.goodRate) || 90));
    }

    function getAfterSalesScore(product) {
      return Math.round((product.serviceScore / 5) * 100);
    }

    function getFulfillmentScore(product) {
      return Math.round((product.deliveryScore / 5) * 100);
    }

    function pBand(price) {
      if (price <= 20) return '低价优先';
      if (price <= 300) return '性价比';
      if (price <= 3000) return '设备采购';
      return '高客单价';
    }

    function getTabData(tab) {
      const list = [...PRODUCTS];
      if (tab === 'guess') return list.sort((a, b) => b.prefScore - a.prefScore);
      if (tab === 'quality') return list.sort((a, b) => getQualityScore(b) - getQualityScore(a));
      if (tab === 'value') return list.sort((a, b) => getPriceScore(b) - getPriceScore(a));
      if (tab === 'hot') return list.sort((a, b) => b.hotScore - a.hotScore);
      return list;
    }

    function applySearch(list) {
      if (!state.query.trim()) return list;
      const tokens = state.query.toLowerCase().split(/[\s,，]+/).filter(Boolean);
      return list.filter(item => {
        const blob = state.searchType === 'shop'
          ? [item.supplier, item.deliveryArea, item.deliveryCity].join(' ').toLowerCase()
          : [
              item.name,
              item.category,
              item.supplier,
              item.deliveryArea,
              item.deliveryCity,
              item.deliveryTime,
              item.tags.join(' ')
            ].join(' ').toLowerCase();
        return tokens.every(token => blob.includes(token));
      });
    }

    function updateSearchPlaceholder() {
      const input = $('searchInput');
      if (!input) return;
      input.placeholder = state.searchType === 'shop'
        ? '请输入供应商或店铺名称，如“德邦办公、晨采办公”'
        : '请输入采购需求，如“A4打印纸，15元以内，华南供应商，高时效”';
    }

    function initFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const keyword = (params.get('keyword') || params.get('q') || '').trim();
      const type = params.get('type');
      if (keyword) {
        state.query = keyword;
        $('searchInput').value = keyword;
      }
      if (type === 'shop' || type === 'product') {
        state.searchType = type;
        $('searchTypeSelect').value = type;
      }
      updateSearchPlaceholder();
    }

    function applyFilters(list) {
      let result = [...list];
      if (state.region !== '全部') result = result.filter(item => item.deliveryArea === state.region);
      if (state.city !== '全部') result = result.filter(item => item.deliveryCity === state.city);
      if (state.attr !== '全部') {
        result = result.filter(item => {
          if (state.attr === '高合规') return item.inspectionReport.status === '有效' && getRiskScore(item) >= 94;
          if (state.attr === '48小时可发货') return /24小时|48小时/.test(item.deliveryTime);
          if (state.attr === '低价优先') return item.price <= item.ceiling * 0.92;
          return item.tags.includes(state.attr) || item.category === state.attr;
        });
      }

      if (state.sort === 'priceAsc') result.sort((a, b) => a.price - b.price);
      else if (state.sort === 'priceDesc') result.sort((a, b) => b.price - a.price);
      else result.sort((a, b) => productScore(b) - productScore(a) || a.price - b.price);

      return result;
    }

    function currentResults() {
      return applyFilters(applySearch(getTabData(state.tab)));
    }

    function renderTabs() {
      $('tabRow').innerHTML = Object.entries(TAB_META).map(([key, meta]) => `
        <button class="tab-item ${state.tab === key ? 'active' : ''}" data-tab="${key}">
          <i class="${meta.icon}"></i>${meta.label}
        </button>
      `).join('');

      document.querySelectorAll('.tab-item[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.tab = btn.dataset.tab;
          render(true);
        });
      });
    }

    function renderSelectOptions() {
      const regions = ['全部', ...new Set(PRODUCTS.map(item => item.deliveryArea))];
      const cities = ['全部', ...new Set(PRODUCTS.map(item => item.deliveryCity))];
      const attrs = ['全部', '高合规', '48小时可发货', '低价优先', ...new Set(PRODUCTS.flatMap(item => item.tags).slice(0, 4))];

      $('regionSelect').innerHTML = regions.map(v => `<option value="${v}" ${state.region === v ? 'selected' : ''}>${v}</option>`).join('');
      $('citySelect').innerHTML = cities.map(v => `<option value="${v}" ${state.city === v ? 'selected' : ''}>${v}</option>`).join('');
      $('attrSelect').innerHTML = attrs.map(v => `<option value="${v}" ${state.attr === v ? 'selected' : ''}>${v}</option>`).join('');
    }

    function renderSuggestTags() {
      const suggestions = [];
      suggestions.push('高合规', '48小时可发货', '低价优先');
      if (state.query.includes('打印') || state.query.includes('纸')) suggestions.push('办公耗材');
      if (state.query.includes('会议')) suggestions.push('会议设备');
      if (state.query.includes('椅') || state.query.includes('桌')) suggestions.push('办公家具');
      const unique = [...new Set(suggestions)].slice(0, 6);
      const chips = unique.map(item => {
        const active = state.attr === item ? ' active' : '';
        return `<button class="suggest-chip${active}" type="button" data-suggest="${item}">${item}</button>`;
      }).join('');
      $('aiSuggest').innerHTML = `<span class="ai-suggest-label">智能推荐：</span>${chips}`;
      document.querySelectorAll('.suggest-chip').forEach(btn => {
        btn.addEventListener('click', () => {
          state.attr = state.attr === btn.dataset.suggest ? '全部' : btn.dataset.suggest;
          render(true);
        });
      });
    }

    function getPageMeta(list) {
      const totalPages = Math.max(1, Math.ceil(list.length / PAGE_SIZE));
      state.page = Math.min(Math.max(1, state.page), totalPages);
      return {
        totalPages,
        page: state.page,
        start: (state.page - 1) * PAGE_SIZE
      };
    }

    function renderCounts(list, pageMeta) {
      const meta = pageMeta || getPageMeta(list);
      $('resultCount').textContent = list.length;
      $('pageInfo').textContent = `${meta.page} / ${meta.totalPages}`;
      $('pagePrevBtn').disabled = meta.page <= 1;
      $('pageNextBtn').disabled = meta.page >= meta.totalPages;
    }

    function scrollToResults() {
      const zone = $('resultsZone');
      if (!zone) return;
      const top = zone.getBoundingClientRect().top + window.scrollY - 8;
      window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
    }

    function tagText(item) {
      if (state.tab === 'quality') return '品质甄选';
      if (state.tab === 'value') return '性价之选';
      if (state.tab === 'hot') return '热门商品';
      return item.tags[0] || '猜你喜欢';
    }

    function renderCards(list, pageMeta) {
      const grid = $('productGrid');
      const meta = pageMeta || getPageMeta(list);
      const pageList = list.slice(meta.start, meta.start + PAGE_SIZE);
      if (!list.length) {
        grid.innerHTML = `<div class="empty-box">未找到符合条件的商品，请调整搜索条件或清空筛选。</div>`;
        return;
      }

      grid.innerHTML = pageList.map(item => {
        const marker = Math.max(6, Math.min(94, ((item.price - item.floor) / (item.ceiling - item.floor)) * 100));
        return `
          <article class="product-card" onclick="window.open('product.html?id=${item.id}', '_blank')">
            <div class="product-thumb">
              <img src="${item.image}" alt="${item.name}">
              <span class="product-tag">${tagText(item)}</span>
            </div>
            <div class="product-body">
              <a class="product-name" href="product.html?id=${item.id}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">${item.name}</a>
              <div class="price-row">
                <span class="price-num">¥${item.price.toFixed(2)}</span>
                <span class="price-unit">/${item.unit}</span>
              </div>
              <div class="supplier-row">
                <i class="fa-regular fa-building"></i>
                <span>${item.supplier}</span>
              </div>
              <div class="range-wrap">
                <div class="range-track"><span class="range-marker" style="left:${marker}%"></span></div>
                <div class="range-labels"><span>¥${item.floor.toFixed(2)}</span><span>¥${item.ceiling.toFixed(2)}</span></div>
              </div>
              <div class="card-actions">
                <button class="action-btn compare" onclick="event.stopPropagation();openComparePickerById('${item.id}')"><i class="fa-solid fa-scale-balanced"></i>比质比价</button>
                <button class="action-btn cart" onclick="event.stopPropagation();addToCart('${item.id}')"><i class="fa-solid fa-cart-plus"></i>加入购物车</button>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    function addToCart(id) {
      state.cart[id] = (state.cart[id] || 0) + 1;
      showToast('已加入购物车');
    }

    function productById(id) {
      return PRODUCTS.find(item => item.id === id);
    }

    function buildCompareRows(base, type) {
      const offsets = type === 'same' ? [-8, 0, 6, 12] : [-12, -4, 9, 15];
      const supplierNames = ['晨光政采店', '得力企业采购店', '华采办公旗舰店', '京采优选供应站'];
      const supplierTags = ['信用认证', '次日达', '价格优势', '售后稳定'];
      const productNames = type === 'same'
        ? [base.name, `${base.name} 商务版`, `${base.name} 政采优选`, `${base.name} 速发款`]
        : [`相近品规 ${base.category} 候选A`, `相近品规 ${base.category} 候选B`, `相近品规 ${base.category} 候选C`, `相近品规 ${base.category} 候选D`];

      const rows = offsets.map((offset, index) => {
        const price = +(base.price + offset).toFixed(2);
        const delta = +(price - base.ceiling).toFixed(2);
        const ratio = ((delta / base.ceiling) * 100).toFixed(1);
        const priceScore = Math.max(72, 96 - Math.abs(offset) * 2 - (type === 'similar' ? 4 : 0));
        const riskScore = Math.max(68, 92 - index * 4 - (type === 'similar' ? 5 : 0));
        const qualityScore = Math.max(70, 89 - index * 2 + (type === 'same' ? 2 : -1));
        const afterSalesScore = Math.max(69, 90 - index * 3 - (type === 'similar' ? 4 : 0));
        const fulfillmentScore = Math.max(70, 91 - index * 3 - (type === 'similar' ? 5 : 0));
        const totalScore = Math.round(avg([priceScore, riskScore, qualityScore, afterSalesScore, fulfillmentScore]));
        return {
          id: `${type}_${index}`,
          type,
          productName: productNames[index],
          supplier: supplierNames[index],
          tag: supplierTags[index],
          price,
          floor: base.floor,
          ceiling: base.ceiling,
          delta,
          ratio,
          delivery: index % 2 === 0 ? '24小时内发货' : '48小时内发货',
          riskScore,
          qualityScore,
          afterSalesScore,
          fulfillmentScore,
          priceScore,
          inspectionStatus: index === 2 && type === 'similar' ? '即将到期' : (index === 3 && type === 'same' ? '无' : '有效'),
          inspectionExpiry: index === 2 && type === 'similar' ? '2026-05-20' : (index === 3 && type === 'same' ? '无' : '2026-12-31'),
          priceChangeDate: `2026-04-0${index + 2}`,
          priceChangeDirection: (type === 'similar' && index % 2 === 0) || (type === 'same' && index === 3) ? '加价' : '降价',
          priceChangePercent: +(1.8 + index * 0.7 + (type === 'similar' ? 0.6 : 0)).toFixed(1),
          riskLevel: riskScore >= 88 ? '低' : riskScore >= 78 ? '中' : '高',
          qualityLevel: qualityScore >= 88 ? '优' : qualityScore >= 78 ? '良' : '一般',
          afterSalesLabel: afterSalesScore >= 88 ? '24h内' : afterSalesScore >= 78 ? '48h内' : '较慢',
          fulfillmentLabel: fulfillmentScore >= 88 ? '高' : fulfillmentScore >= 78 ? '中' : '一般',
          totalScore,
          score: (4.6 + index * 0.1).toFixed(1),
          isCurrent: price === base.price
        };
      });

      const ranked = [...rows].sort((a, b) => a.price - b.price);
      rows.forEach(row => {
        row.rankValue = ranked.findIndex(item => item.id === row.id) + 1;
        row.rankText = `${row.rankValue}/${rows.length}`;
      });
      return rows;
    }

    function resetComparePicker() {
      currentCompareTab = 'same';
      comparePickerSelections = { same: [], similar: [] };
      document.querySelectorAll('[data-picker-tab]').forEach((item, index) => {
        item.classList.toggle('active', index === 0);
      });
    }

    function buildAiComparePayloadFromRows(base, sameRows) {
      const products = sameRows.map((row, idx) => {
        const brandMatch = String(row.productName || '').match(/^([\u4e00-\u9fa5A-Za-z&·]+)/);
        const scoreNum = Math.round(row.qualityScore || 90);
        return {
          id: row.id,
          name: row.productName,
          brand: brandMatch ? brandMatch[1] : '通用品牌',
          price: row.price,
          unit: '件',
          supplier: row.supplier,
          floor: row.floor,
          ceiling: row.ceiling,
          goodRate: +(scoreNum + idx * 0.3).toFixed(1),
          isSource: !!row.isCurrent,
          radar: {
            afterSales: Math.min(98, scoreNum - 1 + idx),
            credit: Math.min(98, scoreNum + 2 - idx),
            delivery: Math.min(98, scoreNum - 3 + idx * 2),
            fulfillment: Math.min(98, scoreNum - idx),
            consistency: Math.min(98, scoreNum - 2),
            priceReason: Math.min(98, 100 - idx * 4)
          }
        };
      }).sort((a, b) => a.price - b.price);
      products.forEach((p, i) => { p.priceRank = i + 1; });
      return {
        sourceId: base.id,
        specLabel: base.category || base.name || '同品同规',
        compareType: 'same',
        generatedAt: new Date().toISOString(),
        products
      };
    }

    function openComparePickerById(id) {
      const product = productById(id);
      if (!product) return;
      const sameRows = buildCompareRows(product, 'same');
      const payload = buildAiComparePayloadFromRows(product, sameRows);
      sessionStorage.setItem('aiComparePayload', JSON.stringify(payload));
      window.open('../pages-new/compare_analysis.html?from=ai', '_blank', 'noopener,noreferrer');
    }

    function closeComparePicker() {
      $('comparePickerOverlay').classList.remove('show');
      document.body.style.overflow = '';
    }

    function updateComparePickerSummary() {
      const count = comparePickerSelections.same.length + comparePickerSelections.similar.length;
      $('comparePickerCurrent').innerHTML = `当前商品：<strong>${currentCompareProduct.name}</strong><br>将作为默认对照项参与整体分析。`;
      $('comparePickerCount').textContent = `已勾选 ${count} 个候选商品`;
      const btn = $('goCompareAnalysisBtn');
      btn.disabled = count === 0;
    }

    function renderComparePickerTable() {
      const rows = currentCompareProduct.compare[currentCompareTab] || [];
      $('comparePickerBody').innerHTML = rows.map(row => {
        const checked = comparePickerSelections[currentCompareTab].includes(row.id);
        return `
          <tr>
            <td><input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleCompareSelection('${currentCompareTab}','${row.id}')"></td>
            <td>
              <div class="font-semibold text-gray-900">${row.productName}</div>
              ${row.isCurrent ? '<div class="text-xs mt-1" style="color:var(--mall-red)">当前商品同源款</div>' : ''}
            </td>
            <td>${row.supplier}</td>
            <td class="font-bold" style="color:var(--mall-red)">￥${row.price.toFixed(2)}</td>
            <td>￥${row.floor.toFixed(2)} - ￥${row.ceiling.toFixed(2)}</td>
            <td>${row.rankText}</td>
            <td>${row.riskLevel}</td>
            <td>${row.qualityLevel}</td>
            <td>${row.afterSalesLabel}</td>
            <td>${row.fulfillmentLabel}</td>
            <td class="font-semibold" style="color:var(--brand)">${row.totalScore}</td>
          </tr>
        `;
      }).join('');
      updateComparePickerSummary();
    }

    function toggleCompareSelection(type, id) {
      const list = comparePickerSelections[type];
      const index = list.indexOf(id);
      if (index >= 0) list.splice(index, 1);
      else list.push(id);
      renderComparePickerTable();
    }

    function goToCompareAnalysis() {
      const sameRows = currentCompareProduct.compare.same.filter(row => comparePickerSelections.same.includes(row.id));
      const similarRows = currentCompareProduct.compare.similar.filter(row => comparePickerSelections.similar.includes(row.id));
      const total = sameRows.length + similarRows.length;
      if (!total) {
        showToast('请至少勾选 1 个候选商品');
        return;
      }

      const payload = {
        sourceProduct: {
          id: currentCompareProduct.id,
          name: currentCompareProduct.name,
          supplier: currentCompareProduct.supplier,
          price: currentCompareProduct.price,
          floor: currentCompareProduct.floor,
          ceiling: currentCompareProduct.ceiling,
          delivery: currentCompareProduct.deliveryTime,
          qualityLevel: (parseFloat(currentCompareProduct.goodRate) || 0) >= 98 ? '优' : (parseFloat(currentCompareProduct.goodRate) || 0) >= 95 ? '良' : '一般',
          afterSalesLabel: '24h内',
          fulfillmentLabel: currentCompareProduct.deliveryTime,
          riskLevel: currentCompareProduct.inspectionReport.status === '无' ? '中' : '低',
          inspectionStatus: currentCompareProduct.inspectionReport.status,
          inspectionExpiry: currentCompareProduct.inspectionReport.expiry,
          priceChangeDate: currentCompareProduct.priceChange.date,
          priceChangeDirection: currentCompareProduct.priceChange.direction,
          priceChangePercent: currentCompareProduct.priceChange.percent,
          priceScore: getPriceScore(currentCompareProduct),
          riskScore: getRiskScore(currentCompareProduct),
          qualityScore: getQualityScore(currentCompareProduct),
          afterSalesScore: getAfterSalesScore(currentCompareProduct),
          fulfillmentScore: getFulfillmentScore(currentCompareProduct)
        },
        selectedRows: {
          same: sameRows,
          similar: similarRows
        },
        generatedAt: new Date().toISOString()
      };

      sessionStorage.setItem('compareAnalysisPayload', JSON.stringify(payload));
      closeComparePicker();
      window.location.href = '../pages-new/compare_analysis.html';
    }

    function bindCompareTabs() {
      document.querySelectorAll('[data-picker-tab]').forEach(btn => {
        btn.addEventListener('click', function() {
          currentCompareTab = this.dataset.pickerTab;
          document.querySelectorAll('[data-picker-tab]').forEach(item => item.classList.remove('active'));
          this.classList.add('active');
          renderComparePickerTable();
        });
      });
    }

    function showToast(text) {
      const toast = document.createElement('div');
      toast.textContent = text;
      Object.assign(toast.style, {
        position: 'fixed',
        top: '96px',
        left: '50%',
        transform: 'translateX(-50%)',
        background: '#111827',
        color: '#fff',
        padding: '8px 18px',
        borderRadius: '8px',
        fontSize: '13px',
        fontWeight: '600',
        zIndex: '999',
        boxShadow: '0 6px 16px rgba(0,0,0,0.18)',
        animation: 'fadeInOut 1.6s ease forwards'
      });
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 1700);
    }

    function render(resetPage) {
      if (resetPage) state.page = 1;
      renderTabs();
      renderSelectOptions();
      const list = currentResults();
      const pageMeta = getPageMeta(list);
      renderCounts(list, pageMeta);
      renderSuggestTags();
      renderCards(list, pageMeta);
      document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.sort === state.sort);
      });
    }

    function goToPage(nextPage) {
      state.page = nextPage;
      render();
      scrollToResults();
    }

    function runSearch(scrollResults) {
      state.query = $('searchInput').value.trim();
      render(true);
      if (scrollResults) scrollToResults();
    }

    function bindStaticEvents() {
      $('searchBtn').addEventListener('click', () => runSearch(true));

      $('searchInput').addEventListener('keydown', event => {
        if (event.key === 'Enter') runSearch(true);
      });

      $('searchTypeSelect').addEventListener('change', event => {
        state.searchType = event.target.value;
        updateSearchPlaceholder();
        if (state.query.trim()) render(true);
      });

      document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.sort = btn.dataset.sort;
          render(true);
        });
      });

      $('regionSelect').addEventListener('change', event => {
        state.region = event.target.value;
        render(true);
      });

      $('citySelect').addEventListener('change', event => {
        state.city = event.target.value;
        render(true);
      });

      $('attrSelect').addEventListener('change', event => {
        state.attr = event.target.value;
        render(true);
      });

      $('pagePrevBtn').addEventListener('click', () => {
        if (state.page <= 1) return;
        goToPage(state.page - 1);
      });

      $('pageNextBtn').addEventListener('click', () => {
        goToPage(state.page + 1);
      });

      bindCompareTabs();
    }

    const fadeStyle = document.createElement('style');
    fadeStyle.textContent = `@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(-8px);}15%{opacity:1;transform:translateX(-50%) translateY(0);}75%{opacity:1;}100%{opacity:0;transform:translateX(-50%) translateY(-8px);}}`;
    document.head.appendChild(fadeStyle);

    bindStaticEvents();
    initFromUrl();
    render();
    if (state.query) {
      requestAnimationFrame(() => scrollToResults());
    }
  </script>
</body>
</html>
