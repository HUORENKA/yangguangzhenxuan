<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单管理 | 采购工作台</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background: #f5f7fa; color: #0f172a; font-family: system-ui, "Microsoft YaHei", sans-serif; }
    .page-wrap { max-width: 1660px; margin: 0 auto; padding: 16px 20px 32px; }
    .toolbar-title { font-size: 22px; font-weight: 800; }
    .toolbar-sub { font-size: 13px; color: #64748b; margin-top: 4px; }
    .tabs-wrap { border-bottom: 2px solid #e5e7eb; margin-bottom: 12px; }
    .tabs { display: flex; flex-wrap: wrap; gap: 4px 8px; align-items: flex-end; }
    .tab { padding: 10px 14px 12px; font-size: 14px; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; font-weight: 600; }
    .tab:hover { color: #16a34a; }
    .tab.active { color: #16a34a; border-bottom-color: #16a34a; }
    .filter-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 10px 12px; margin-bottom: 14px; }
    .ipt { border: 1px solid #d8dee8; border-radius: 6px; padding: 8px 12px; font-size: 13px; min-width: 220px; }
    .btn { height: 34px; padding: 0 16px; border-radius: 6px; font-size: 13px; font-weight: 700; border: 1px solid #cbd5e1; background: #fff; color: #475569; cursor: pointer; }
    .btn:hover { filter: brightness(0.98); }
    .btn-primary { background: #16a34a; border-color: #16a34a; color: #fff; }
    .btn-ghost-line { border: 1px solid #94a3b8; color: #334155; background: #fff; }
    .btn-sm { height: 30px; padding: 0 10px; font-size: 12px; }
    .list-head-grid {
      display: grid;
      grid-template-columns: 36px minmax(320px, 1fr) 140px 160px 100px 120px;
      gap: 12px;
      align-items: center;
      padding: 10px 16px;
      background: #eef2f6;
      border: 1px solid #e2e8f0;
      border-radius: 6px 6px 0 0;
      font-size: 13px;
      font-weight: 700;
      color: #475569;
    }
    .order-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-top: none;
      margin-bottom: 16px;
      border-radius: 0 0 8px 8px;
      box-shadow: 0 6px 16px rgba(15,23,42,.04);
      overflow: hidden;
    }
    .order-meta {
      padding: 10px 14px;
      background: linear-gradient(#f8fafc, #f1f5f9);
      border-bottom: 1px solid #e8edf3;
      display: flex; flex-wrap: wrap; align-items: center; gap: 10px 20px;
      font-size: 13px;
    }
    .order-meta .muted { color: #64748b; }
    .badge {
      margin-left: auto;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 800;
    }
    .badge-pending-supplier { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .badge-pending-ship { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
    .badge-partial { background: #fefce8; color: #a16207; border: 1px solid #fde047; }
    .badge-shipped { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
    .badge-done { background: #ecfeff; color: #0e7490; border: 1px solid #a5f3fc; }
    .badge-cancel { background: #f8fafc; color: #64748b; border: 1px solid #e2e8f0; }
    .badge-return { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .inner-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .inner-table td { vertical-align: top; padding: 14px 12px; border-top: 1px solid #f1f5f9; }
    .product-cell { display: flex; gap: 10px; align-items: flex-start; padding-left: 8px !important; }
    .thumb {
      width: 72px; height: 72px; border-radius: 8px; background: linear-gradient(135deg,#e2e8f0,#bbf7d0);
      flex-shrink: 0; border: 1px solid #e2e8f0;
      display:flex; align-items:center; justify-content:center; color:#94a3b8; font-size:11px; text-align:center; padding:4px;
    }
    .p-name { font-weight: 700; color: #0f172a; line-height: 1.4; margin-bottom: 6px; }
    .p-spec { font-size: 12px; color: #64748b; line-height: 1.6; }
    .qty-block .row { margin-bottom: 4px; }
    .qty-block .lbl { color: #94a3b8; margin-right: 6px; }
    .qty-block strong { font-weight: 700; color: #0f172a; }
    .price-red { font-weight: 800; color: #dc2626; }
    .linklike { font-size: 13px; color: #16a34a; cursor: pointer; background: none; border: none; padding: 0; text-align: left; }
    .linklike:hover { text-decoration: underline; }
    .ship-count { font-size: 11px; color: #64748b; margin-top: 6px; }
    .line-actions { display: flex; flex-direction: column; gap: 6px; align-items: stretch; }
    .line-actions .btn { width: 100%; }
    .empty-list { padding: 40px; text-align: center; color: #94a3b8; font-size: 14px; }
    .dlg-overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,.5); z-index: 50;
      display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .dlg-overlay.show { display: flex; }
    .dlg {
      background: #fff; border-radius: 12px; max-width: 560px; width: 100%;
      max-height: 92vh; overflow: hidden; display: flex; flex-direction: column;
      box-shadow: 0 24px 48px rgba(15,23,42,.18); border: 1px solid #e2e8f0;
    }
    .dlg-hd {
      padding: 16px 20px; border-bottom: 1px solid #e8edf3; font-weight: 800; font-size: 17px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .dlg-bd { padding: 16px 20px; overflow-y: auto; flex: 1; }
    .dlg-ft { padding: 12px 20px; border-top: 1px solid #e8edf3; display: flex; justify-content: flex-end; gap: 10px; }
    .timeline-wrap { position: relative; padding: 8px 0 4px 6px; }
    .timeline-item { position: relative; padding: 0 0 18px 22px; font-size: 13px; }
    .timeline-item:last-child { padding-bottom: 0; }
    .timeline-item::before {
      content: ''; position: absolute; left: 5px; top: 6px; width: 10px; height: 10px;
      border-radius: 50%; background: #cbd5e1; border: 2px solid #fff; box-shadow: 0 0 0 1px #cbd5e1;
    }
    .timeline-item:first-child::before { background: #16a34a; box-shadow: 0 0 0 1px #16a34a; }
    .timeline-item:not(:last-child)::after {
      content: ''; position: absolute; left: 9px; top: 18px; bottom: 0; width: 2px; background: #e2e8f0;
    }
    .timeline-time { color: #64748b; font-size: 12px; margin-bottom: 2px; }
    .timeline-desc { color: #0f172a; font-weight: 600; line-height: 1.5; }
    .timeline-loc { color: #64748b; font-size: 12px; margin-top: 2px; }
    .timeline-head { font-size: 14px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #e8edf3; }
    .alert-mock {
      padding: 8px 12px; background: #ecfdf5; border: 1px solid #a7f3d0;
      border-radius: 6px; font-size: 12px; color: #047857; margin-bottom: 12px;
    }
    .dlg-line-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .dlg-line-table th, .dlg-line-table td { border: 1px solid #e8edf3; padding: 10px; vertical-align: middle; }
    .dlg-line-table th { background: #f8fafc; font-weight: 700; color: #475569; }
    .dlg-product-cell { display: flex; gap: 10px; align-items: flex-start; min-width: 0; }
    .dlg-thumb {
      width: 56px; height: 56px; border-radius: 6px; object-fit: cover;
      border: 1px solid #e2e8f0; flex-shrink: 0; background: #f1f5f9;
    }

    .dlg-product-spec { font-size: 11px; color: #64748b; margin-top: 4px; line-height: 1.5; }

    .dlg-supplier-lbl { color: #94a3b8; font-size: 11px; display: block; margin-bottom: 2px; }

      </div>
    </div>
  </div>

        <table class="dlg-line-table">
          <thead>
            <tr>
              <th>商品</th>
              <th style="width:140px">供应商</th>
              <th style="width:100px;text-align:center">本次收货数量</th>
            </tr>
          </thead>
          <tbody id="receiveDlgBody"></tbody>
        </table>
      </div>
      <div class="dlg-ft">
        <button class="btn" type="button" onclick="closeReceiveDlg()">取消</button>
        <button class="btn btn-primary" type="button" onclick="submitReceive()">确认收货</button>
      </div>
    </div>
  </div>

    function statusBadgeClass(st) {
      const map = {
        pending_confirm: 'badge-pending-supplier',
        pending_ship: 'badge-pending-ship',
        partial_ship: 'badge-partial',
        shipped: 'badge-shipped',
        received_done: 'badge-done',
        cancelled: 'badge-cancel',
        'return': 'badge-return'
      };
      return map[st] || 'badge-cancel';
    }

    function statusLabel(st) {
      const map = {
        pending_confirm: '待供应商确认',
        pending_ship: '待发货',
        partial_ship: '部分发货',
        shipped: '待收货',
        received_done: '收货完成',
        cancelled: '已取消',
        'return': '退货'
      };
      return map[st] || st;
    }

    function linePendingReceive(ln) {
      return Math.max(0, (ln.shippedQty || 0) - (ln.receivedQty || 0));
    }

    function lineUnshipped(ln) {
      return Math.max(0, ln.qty - (ln.shippedQty || 0));
    }

    function recomputeBuyerStatus(o) {
      if (['cancelled', 'return'].includes(o.status)) return;
      const allDone = o.lines.every(l => (l.receivedQty || 0) >= l.qty);
      const anyToReceive = o.lines.some(l => linePendingReceive(l) > 0);
      const anyShipped = o.lines.some(l => (l.shippedQty || 0) > 0);
      const anyUnshipped = o.lines.some(l => lineUnshipped(l) > 0);
      if (allDone && o.lines.every(l => l.shippedQty >= l.qty)) {
        o.status = 'received_done';
      } else if (anyToReceive) {
        o.status = 'shipped';
      } else if (anyShipped && anyUnshipped) {
        o.status = 'partial_ship';
      } else if (!anyShipped) {
        o.status = 'pending_ship';
      }
    }

    function getLineShipments(o, lineId) {
      return o.shipments.filter(sh =>
        sh.allocations.some(a => a.lineId === lineId && a.qty > 0)
      );
    }

    function getLatestLineShipment(o, lineId) {
      const list = getLineShipments(o, lineId);
      return list.length ? list[list.length - 1] : null;
    }

    function mockWaybillTimeline(waybill, carrier, shipTimeApi) {
      const base = shipTimeApi || fmtNow();
      return [
        { time: base, desc: '快件已揽收', loc: '发货网点' },
        { time: addHours(base, 2), desc: '快件已发往【区域转运中心】', loc: '转运中心' },
        { time: addHours(base, 8), desc: '快件到达【区域转运中心】', loc: '转运中心' },
        { time: addHours(base, 20), desc: '快件已发出，下一站【目的地】', loc: '在途' },
        { time: addHours(base, 36), desc: '快件派送中', loc: '目的地派送站' }
      ];
    }

    function fmtNow() {
      return new Date().toISOString().slice(0, 19).replace('T', ' ');
    }

    function addHours(isoStr, h) {
      const d = new Date(String(isoStr).replace(/-/g, '/'));
      if (isNaN(d.getTime())) return isoStr;
      d.setHours(d.getHours() + h);
      return d.toISOString().slice(0, 19).replace('T', ' ');
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function lineImageUrl(ln) {
      const seed = encodeURIComponent(ln.skuCode || ln.lineId || 'product');
      return 'https://picsum.photos/seed/' + seed + '/112/112';
    }

    function renderDlgProductCell(ln) {
      return `
        <div class="dlg-product-cell">
          <img class="dlg-thumb" src="${lineImageUrl(ln)}" alt="${escapeHtml(ln.name)}" loading="lazy" />
          <div>
            <div class="dlg-product-name">${escapeHtml(ln.name)}</div>
            <div class="dlg-product-spec">${escapeHtml(ln.spec)}</div>
          </div>
        </div>`;
    }

    function renderDlgSupplierCell(supplierName) {
      return `
        <div class="dlg-supplier">
          <span class="dlg-supplier-lbl">供应商</span>
          ${escapeHtml(supplierName || '—')}

    }

    function tabCounts() {
      const counts = {};
      TAB_KEYS.forEach(k => { counts[k] = 0; });
      counts.all = orders.length;
      orders.forEach(o => {
        TAB_KEYS.forEach(k => {
          if (k === 'all') return;
          if (tabMatches(k, o.status)) counts[k] += 1;
        });
      });
      return counts;
    }

      const counts = tabCounts();
      document.getElementById('orderTabs').innerHTML = TAB_KEYS.map(k => {
        const n = counts[k] ?? 0;
        return `<button type="button" class="tab ${activeTab===k?'active':''}" data-tab="${k}">${TAB_LABEL[k]}（${n}）</button>`;
      }).join('');
      document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          activeTab = btn.getAttribute('data-tab');
          renderTabs();
          renderOrderList();
        });
      });
    }

    function renderLineActions(o, ln) {
      if (o.status === 'cancelled') return '<span class="text-xs text-slate-400">—</span>';
      const parts = [];
      const pendingRcv = linePendingReceive(ln);
      const hasLogistics = ln.shippedQty > 0 && getLineShipments(o, ln.lineId).length > 0;

      if (pendingRcv > 0 && hasLogistics) {
        parts.push(`<button type="button" class="btn btn-primary btn-sm" data-action="receive-line" data-order="${escapeHtml(o.id)}" data-line="${escapeHtml(ln.lineId)}">确认收货</button>`);
      }
      if (hasLogistics) {
        parts.push(`<button type="button" class="btn btn-ghost-line btn-sm" data-action="timeline" data-order="${escapeHtml(o.id)}" data-line="${escapeHtml(ln.lineId)}">查看物流</button>`);
      }
      if (o.status === 'received_done' && (ln.receivedQty || 0) > 0) {
        parts.push(`<button type="button" class="btn btn-ghost-line btn-sm" data-action="after-sale" data-order="${escapeHtml(o.id)}" data-line="${escapeHtml(ln.lineId)}">发起售后</button>`);
      } else if (o.status === 'return' && hasLogistics) {
        parts.push(`<button type="button" class="btn btn-ghost-line btn-sm" data-action="after-sale" data-order="${escapeHtml(o.id)}" data-line="${escapeHtml(ln.lineId)}">售后详情</button>`);
      }

      if (!parts.length) {
        if (lineUnshipped(ln) > 0) return '<span class="text-xs text-slate-400">待发货</span>';
        if (o.status === 'return') return '<span class="text-xs text-slate-400">退货</span>';
        return '<span class="text-xs text-slate-400">—</span>';
      }
      return `<div class="line-actions">${parts.join('')}</div>`;
    }

    function renderOneOrderCard(o) {
      const nLines = o.lines.length;
      let detailLinks = `<button type="button" class="linklike">订单详情</button>`;
      let shipNote = o.shipments.length ? `<div class="ship-count">供应商已发 ${o.shipments.length} 批</div>` : '';

      let rows = '';
      o.lines.forEach((ln, idx) => {
        const unshipped = lineUnshipped(ln);
        const pendingRcv = linePendingReceive(ln);
        const lineAmt = ln.unitPrice * ln.qty;
        const detailCell = idx === 0 ? `
            <td style="width:100px;text-align:center;vertical-align:middle;background:#fafffe;" rowspan="${nLines}">
              ${detailLinks}${shipNote}
            </td>` : '';
        rows += `
          <tr>
            <td style="width:36px"><input type="checkbox" disabled/></td>
            <td style="padding-left:14px;">
              <div class="product-cell">
                <div class="thumb">SKU<br/>${escapeHtml(ln.skuCode||'')}</div>
                <div>
                  <div class="p-name">${escapeHtml(ln.name)}</div>
                  <div class="p-spec">${escapeHtml(ln.spec)}</div>
                </div>
              </div>
            </td>
            <td style="width:140px;">
              <div class="qty-block">
                <div class="row"><span class="lbl">单价：</span><span class="price-red">¥ ${ln.unitPrice.toLocaleString()}</span></div>
                <div class="row"><span class="lbl">下单数量：</span><strong>${ln.qty}</strong></div>
                <div class="row"><span class="lbl">待收：</span><strong style="${pendingRcv>0?'color:#16a34a':''}">${pendingRcv}</strong></div>
                ${unshipped>0 ? `<div class="row"><span class="lbl">未发：</span><strong style="color:#d97706">${unshipped}</strong></div>` : ''}
              </div>
            </td>
            <td style="width:160px;">
              <div class="qty-block">
                <div class="row"><span class="lbl">运费：</span>¥ ${o.freight.toLocaleString()}</div>
                <div class="row"><span class="lbl">单品小计：</span><span class="price-red">¥ ${lineAmt.toLocaleString('zh-CN',{maximumFractionDigits:2})}</span></div>
              </div>
            </td>
            ${detailCell}
            <td style="width:120px;text-align:center;vertical-align:middle;background:#fafffe;padding:12px 8px!important;">
              ${renderLineActions(o, ln)}
            </td>
          </tr>`;
      });

      return `
      <div class="order-card">
        <div class="order-meta">
          <label class="muted"><input type="checkbox" disabled style="vertical-align:middle;margin-right:6px"/>订单编号：</label>
          <strong>${escapeHtml(o.id)}</strong>
          <span class="muted">｜关联采购单：${escapeHtml(o.poNo)}</span>
          <span class="muted">｜供应商：${escapeHtml(o.supplierName)}（联系方式：${escapeHtml(o.supplierPhone)}）</span>
          <span class="muted">｜提交日期：${escapeHtml(o.createdAt)}</span>
          <span class="badge ${statusBadgeClass(o.status)}">${escapeHtml(statusLabel(o.status))}</span>
        </div>
        <table class="inner-table"><tbody>${rows}</tbody></table>
      </div>`;
    }

    function renderOrderList() {
      renderTabs();
      const root = document.getElementById('orderListRoot');
      const kw = searchKw.trim().toLowerCase();
      let filtered = orders.filter(o => {
        if (!kw) return true;
        return o.id.toLowerCase().includes(kw) ||
          (o.supplierName || '').toLowerCase().includes(kw);
      });
      if (activeTab !== 'all') filtered = filtered.filter(o => tabMatches(activeTab, o.status));
      root.innerHTML = filtered.length
        ? filtered.map(renderOneOrderCard).join('')
        : '<div class="order-card empty-list">暂无订单</div>';
      bindHandlers();
    }

    function bindHandlers() {
      document.querySelectorAll('[data-action="timeline"]').forEach(btn => {
        btn.addEventListener('click', () => openTimelineDlg(btn.getAttribute('data-order'), btn.getAttribute('data-line')));
      });
      document.querySelectorAll('[data-action="receive-line"]').forEach(btn => {
        btn.addEventListener('click', () => openReceiveDlg(btn.getAttribute('data-order'), btn.getAttribute('data-line')));
      });
      document.querySelectorAll('[data-action="after-sale"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const label = btn.textContent.trim();
          if (label === '售后详情') {
            window.location.href = '../../pages-new/after_sales/after_sales_buyer.html';
          } else {
            if (confirm('将跳转至售后管理发起退货申请（示意）')) {
              window.location.href = '../../pages-new/after_sales/after_sales_buyer.html';
            }
          }
        });
      });
    }

    function openTimelineDlg(orderId, lineId) {
      const o = orders.find(x => x.id === orderId);
      if (!o) return;
      const ln = o.lines.find(l => l.lineId === lineId);
      const sh = getLatestLineShipment(o, lineId);
      if (!sh) { alert('该商品暂无物流信息'); return; }
      const nodes = mockWaybillTimeline(sh.waybill, sh.carrier, sh.shipTimeApi);
      document.getElementById('timelineDlgBody').innerHTML = `
        <div class="timeline-head">
          <div><strong>${escapeHtml(ln ? ln.name : '')}</strong></div>
          <div class="text-sm text-slate-500 mt-1">订单 ${escapeHtml(orderId)} · 供应商 ${escapeHtml(o.supplierName)}</div>
          <div class="text-sm mt-2"><span class="text-slate-500">承运商：</span>${escapeHtml(sh.carrier)}</div>
          <div class="text-sm"><span class="text-slate-500">运单号：</span><strong>${escapeHtml(sh.waybill)}</strong></div>
        </div>
        <div class="timeline-wrap">
          ${nodes.map(n => `
            <div class="timeline-item">
              <div class="timeline-time">${escapeHtml(n.time)}</div>
              <div class="timeline-desc">${escapeHtml(n.desc)}</div>
              ${n.loc ? `<div class="timeline-loc">${escapeHtml(n.loc)}</div>` : ''}
            </div>`).join('')}
        </div>`;
      document.getElementById('timelineDlg').classList.add('show');
    }

    function closeTimelineDlg() {
      document.getElementById('timelineDlg').classList.remove('show');
    }

    function openReceiveDlg(orderId, lineId) {
      const o = orders.find(x => x.id === orderId);
      if (!o) return;
      const ln = o.lines.find(l => l.lineId === lineId);
      const qty = linePendingReceive(ln);
      if (!qty) { alert('当前无可确认收货数量'); return; }
      receiveCtx = { orderId, lineId };
      document.getElementById('receiveDlgSummary').innerHTML =
        `<strong>订单</strong> ${escapeHtml(orderId)}`;
      document.getElementById('receiveDlgBody').innerHTML = `
        <tr>
          <td>${renderDlgProductCell(ln)}</td>
          <td>${renderDlgSupplierCell(o.supplierName)}</td>
          <td style="text-align:center;font-weight:800;font-size:15px">${qty}</td>
        </tr>`;
      document.getElementById('receiveDlg').classList.add('show');
    }

    function closeReceiveDlg() {
      receiveCtx = null;
      document.getElementById('receiveDlg').classList.remove('show');
    }

    function submitReceive() {
      if (!receiveCtx) return;
      const o = orders.find(x => x.id === receiveCtx.orderId);
      const ln = o && o.lines.find(l => l.lineId === receiveCtx.lineId);
      if (!ln) return;
      const qty = linePendingReceive(ln);
      ln.receivedQty = (ln.receivedQty || 0) + qty;
      recomputeBuyerStatus(o);
      alert('收货已确认（示意），数量：' + qty);
      closeReceiveDlg();
      renderOrderList();
    }

    document.getElementById('btnSearch').addEventListener('click', () => {
      searchKw = document.getElementById('orderSearchInput').value;
      renderOrderList();
    });
    document.getElementById('btnReset').addEventListener('click', () => {
      document.getElementById('orderSearchInput').value = '';
      searchKw = '';
      activeTab = 'all';
      renderOrderList();
    });

    seedOrders();
    orders.forEach(recomputeBuyerStatus);
    renderOrderList();
  </script>
</body>
</html>
