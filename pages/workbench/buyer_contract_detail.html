<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合同详情 | 采购工作台</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background:#f8fafc; color:#0f172a; padding-bottom:100px; }
    .page-card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; box-shadow:0 8px 20px rgba(15,23,42,.04); }
    .badge { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700; }
    .b-warn { background:#fffbeb; color:#b45309; }
    .b-blue { background:#eff6ff; color:#1d4ed8; }
    .b-green { background:#ecfdf5; color:#047857; }
    .b-slate { background:#f1f5f9; color:#475569; }
    .b-muted { background:#f4f4f5; color:#52525b; }
    .btn { height:40px; padding:0 18px; border-radius:8px; font-size:13px; font-weight:700; border:1px solid #dbe2ea; background:#fff; color:#475569; cursor:pointer; display:inline-flex; align-items:center; gap:8px; }
    .btn-primary { background:#4f46e5; border-color:#4f46e5; color:#fff; }
    .btn-danger { background:#fef2f2; border-color:#fecaca; color:#b91c1c; }
    .btn:disabled { opacity:.45; cursor:not-allowed; }
    .info-row { display:grid; grid-template-columns:140px 1fr; gap:8px 16px; font-size:14px; padding:10px 0; border-bottom:1px solid #f1f5f9; }
    .info-row:last-child { border-bottom:none; }
    .info-label { color:#64748b; font-weight:600; }
    .modal-overlay { position:fixed; inset:0; background:rgba(15,23,42,.45); z-index:100; display:none; align-items:center; justify-content:center; padding:16px; }
    .modal-overlay.show { display:flex; }
    .modal-box { background:#fff; border-radius:14px; max-width:440px; width:100%; padding:20px; box-shadow:0 22px 48px rgba(15,23,42,.2); }
    .reject-modal { max-width:min(92vw,560px); }
    .reject-update-panel { display:none; margin-top:12px; border:1px dashed #cbd5e1; border-radius:12px; padding:12px; background:#fafafa; }
    .reject-update-panel.show { display:block; }
    .reject-method-pane { display:none; }
    .reject-method-pane.active { display:block; }
    .approval-row { display:flex; gap:14px; padding:12px 0; border-bottom:1px solid #f1f5f9; align-items:flex-start; }
    .approval-row:last-child { border-bottom:none; }
    .approval-time { flex-shrink:0; width:152px; font-size:12px; color:#94a3b8; font-weight:600; }
    .approval-body { flex:1; font-size:14px; }
    .approval-actor { font-weight:700; color:#0f172a; margin-bottom:4px; }
    .approval-desc { color:#475569; line-height:1.55; }
    .detail-footer { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #e2e8f0; padding:14px 24px; display:flex; justify-content:flex-end; gap:10px; flex-wrap:wrap; box-shadow:0 -8px 24px rgba(15,23,42,.06); z-index:40; }
  </style>
</head>
<body>
  <div class="p-5 max-w-[920px] mx-auto">
    <div class="flex items-center gap-3 mb-4">
      <button type="button" class="btn" onclick="location.href='buyer_contract_hub.html'"><i class="fas fa-arrow-left"></i>返回列表</button>
    </div>

    <div class="page-card p-6 mb-4">
      <h1 class="text-2xl font-bold" id="detailTitle">合同详情</h1>
      <div class="mt-3" id="detailBadgeWrap"></div>
    </div>

    <div class="page-card p-6 mb-4">
      <h2 class="text-base font-bold text-slate-900 mb-4 border-b border-slate-100 pb-2">合同基础信息</h2>
      <div id="detailBase"></div>
    </div>

    <div class="page-card p-6 mb-4">
      <h2 class="text-base font-bold text-slate-900 mb-4 border-b border-slate-100 pb-2">关联订单信息</h2>
      <div id="detailOrder"></div>
    </div>

    <div class="page-card p-6 mb-4">
      <h2 class="text-base font-bold text-slate-900 mb-4 border-b border-slate-100 pb-2">审批记录</h2>
      <div id="detailApproval"></div>
    </div>
  </div>

  <div id="detailFooter" class="detail-footer"></div>

  <div id="rejectModal" class="modal-overlay" onclick="if(event.target===this) closeRejectModal()">
    <div class="modal-box reject-modal" onclick="event.stopPropagation()">
      <div class="text-lg font-bold text-slate-900 mb-2">退回合同</div>
      <p class="text-sm text-slate-500 mb-3">请核对下方「当前合同」信息。如需替换合同文本，可在该卡片内展开「更新合同」，从平台选用（支持预览）或上传新版本；然后填写退回理由。</p>
      <div class="rounded-lg border border-slate-200 bg-slate-50 p-3 mb-4">
        <div class="text-xs font-bold uppercase tracking-wide text-slate-500 mb-2">当前合同</div>
        <div id="rejectCurrentContractBody" class="text-sm"></div>
        <div class="mt-3 pt-3 border-t border-slate-200">
          <button type="button" id="rejectToggleUpdateBtn" class="btn btn-primary" onclick="toggleRejectUpdatePanel()"><i class="fas fa-file-contract"></i>更新合同</button>
          <div id="rejectUpdatePanel" class="reject-update-panel">
            <div class="text-sm font-semibold text-slate-800 mb-2">请选择更新方式</div>
            <div class="flex flex-wrap gap-2 mb-3">
              <button type="button" id="rejectMethodSystem" class="btn btn-primary" onclick="setRejectUpdateMethod('system')">从系统选择</button>
              <button type="button" id="rejectMethodUpload" class="btn" onclick="setRejectUpdateMethod('upload')">上传合同</button>
            </div>
            <div id="rejectPaneSystem" class="reject-method-pane active">
              <label class="block text-xs font-semibold text-slate-600 mb-1">平台内已有合同或模板</label>
              <div class="flex flex-wrap gap-2 items-stretch">
                <select id="rejectSystemSelect" class="flex-1 min-w-[200px] border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white" onchange="onRejectSystemSelectChange()"></select>
                <button type="button" id="rejectSystemPreviewBtn" class="btn whitespace-nowrap self-center" onclick="previewRejectSystemSelection()" disabled>预览</button>
              </div>
            </div>
            <div id="rejectPaneUpload" class="reject-method-pane">
              <input type="file" id="rejectUploadInput" class="hidden" accept=".pdf,.doc,.docx" onchange="handleRejectUpload(this)">
              <button type="button" class="btn" onclick="document.getElementById('rejectUploadInput').click()"><i class="fas fa-folder-open"></i>选择文件</button>
              <span id="rejectUploadFileName" class="text-sm text-slate-600 ml-2 align-middle"></span>
              <p class="text-xs text-slate-500 mt-2 mb-0">支持 PDF、Word（.doc / .docx）。提交后将作为修订稿通知对方重新确认。</p>
            </div>
          </div>
        </div>
      </div>
      <label class="block text-sm font-semibold text-slate-700 mb-1">退回理由 <span class="text-red-500">*</span></label>
      <textarea id="rejectReason" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm min-h-[100px] mb-4" placeholder="例如：条款与采购单约定不一致，请修订后重新提交。"></textarea>
      <div class="flex justify-end gap-2">
        <button type="button" class="btn" onclick="closeRejectModal()">取消</button>
        <button type="button" class="btn btn-danger" onclick="submitReject()">确认退回</button>
      </div>
    </div>
  </div>

  <script>
    function escapeHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function badgeClass(st) {
      if (st === 'po-approving') return 'b-slate';
      if (st === 'pending-supplier') return 'b-warn';
      if (st === 'pending-confirm') return 'b-blue';
      if (st === 'signed') return 'b-green';
      return 'b-muted';
    }

    function loadContracts() {
      var defaults = [
        { id:'HT20260427001', name:'商用台式机采购合同', vendor:'北京联想直营科技', buyer:'北京市海淀区政务服务中心', doc:'ORD20260427008', status:'pending-confirm', label:'待确认', started:'2026-04-27 09:30', orderSummary:'联想台式机 ×5 · 订单待发货', orderAmt:'¥52,990' },
        { id:'HT20260426018', name:'网络设备供货合同', vendor:'新华三官方旗舰店', buyer:'北京市海淀区政务服务中心', doc:'ORD20260426021', status:'pending-supplier', label:'待供应商确认', started:'2026-04-26 14:20', orderSummary:'交换机 ×2 · 已下单', orderAmt:'¥6,495' },
        { id:'HT20260425003', name:'机房布线施工合同', vendor:'中通服建设有限公司', buyer:'朝阳区信息化管理中心', doc:'PO20260425003', status:'po-approving', label:'采购单审批中', started:'2026-04-25 11:05', orderSummary:'布线工程 · 采购单审核中', orderAmt:'¥128,000' },
        { id:'HT20260421006', name:'办公耗材年度框架合同', vendor:'浙江得力办公用品有限公司', buyer:'北京市海淀区政务服务中心', doc:'PO20260421006', status:'signed', label:'已签署', started:'2026-04-21 16:00', orderSummary:'框架协议 · 关联多笔订单', orderAmt:'—' },
        { id:'HT20260418009', name:'物业服务补充协议', vendor:'绿城服务集团', buyer:'北京市海淀区政务服务中心', doc:'PO20260418009', status:'voided', label:'已作废', started:'2026-04-18 10:12', orderSummary:'物业服务 · 已终止', orderAmt:'—' },
        { id:'HT20260415002', name:'会议室改造工程合同', vendor:'中建装饰工程有限公司', buyer:'北京市财政局采购中心', doc:'PO20260415002', status:'pending-confirm', label:'待确认', started:'2026-04-15 08:45', orderSummary:'改造工程一期 · 待入场', orderAmt:'¥386,000' }
      ];
      try {
        var saved = sessionStorage.getItem('buyerContractSigningMock');
        if (saved) {
          var parsed = JSON.parse(saved);
          return parsed.map(function (row) {
            if (!row.buyer) row.buyer = '北京市海淀区政务服务中心';
            return row;
          });
        }
      } catch (e) {}
      return defaults;
    }

    function saveContracts(list) {
      try { sessionStorage.setItem('buyerContractSigningMock', JSON.stringify(list)); } catch (e) {}
    }

    var contracts = loadContracts();
    var params = new URLSearchParams(location.search);
    var contractId = params.get('id') || '';

    function loadTemplatesFromStorage() {
      var defaultTemplates = [
        { id:'t1', name:'办公耗材采购合同（默认）', source:'upload', updated:'2026-01-20', isDefault:true, enabled:true },
        { id:'t2', name:'IT设备采购合同模板', source:'upload', updated:'2026-02-08', isDefault:false, enabled:true },
        { id:'t3', name:'采购框架协议模板（通用）', source:'ai', updated:'2026-03-12', isDefault:false, enabled:true }
      ];
      try {
        var raw = sessionStorage.getItem('buyerContractTplMock');
        if (raw) {
          return JSON.parse(raw).map(function (row) {
            if (!row.source) row.source = 'upload';
            return row;
          });
        }
      } catch (e) {}
      return defaultTemplates.map(function (x) { return Object.assign({}, x); });
    }

    var templates = loadTemplatesFromStorage();
    var rejectUpdateMethod = 'system';

    function getCurrent() {
      return contracts.find(function (x) { return x.id === contractId; });
    }

    function approvalLogsHtml(c) {
      if (!c) return '';
      var rows = [];
      rows.push({ time: c.started || '—', actor:'系统', desc:'合同草稿已生成，关联单据「' + c.doc + '」。' });
      rows.push({ time:'—', actor:'流程引擎', desc:'合同状态：' + c.label + '。' });
      if (c.status === 'po-approving') {
        rows.push({ time:'—', actor:'采购单审批', desc:'关联采购单审批未完成，合同暂不推送供应商。' });
      }
      if (c.status === 'pending-supplier') {
        rows.push({ time:'2026-04-26 09:00', actor:'王五 · 采购专员', desc:'已完成采购方内部节点，已推送供应商确认。' });
      }
      if (c.status === 'pending-confirm') {
        rows.push({ time:'2026-04-27 08:00', actor:'供应商（经办）', desc:'供应商已回传盖章稿，待采购方确认。' });
      }
      if (c.status === 'signed') {
        rows.push({ time:'2026-04-21 15:30', actor:'赵六 · 采购专员', desc:'采购方确认通过；双方电子签署已完成。' });
      }
      if (c.status === 'voided') {
        rows.push({ time:'2026-04-18 11:00', actor:'审核岗', desc:'合同已作废，不再参与签署流程。' });
      }
      return rows.map(function (r) {
        return '<div class="approval-row"><div class="approval-time">' + escapeHtml(r.time) + '</div><div class="approval-body"><div class="approval-actor">' + escapeHtml(r.actor) + '</div><div class="approval-desc">' + escapeHtml(r.desc) + '</div></div></div>';
      }).join('');
    }

    function renderFooterActions(current) {
      var el = document.getElementById('detailFooter');
      if (!el) return;
      if (!current) {
        el.innerHTML = '<button type="button" class="btn" onclick="location.href=\'buyer_contract_hub.html\'">返回列表</button>';
        return;
      }
      var st = current.status;
      var html = '';
      html += '<button type="button" class="btn" onclick="location.href=\'buyer_contract_hub.html\'"><i class="fas fa-list"></i>返回列表</button>';
      if (st === 'pending-confirm') {
        html += '<button type="button" class="btn btn-primary" onclick="doConfirm()"><i class="fas fa-check"></i>确认</button>';
        html += '<button type="button" class="btn btn-danger" onclick="openRejectModal()"><i class="fas fa-rotate-left"></i>退回</button>';
      }
      if (st === 'voided') {
        html += '<button type="button" class="btn btn-danger" onclick="deleteContractRecord()"><i class="fas fa-trash"></i>删除</button>';
      }
      el.innerHTML = html;
    }

    function renderDetail() {
      var current = getCurrent();
      if (!current) {
        document.getElementById('detailTitle').textContent = '未找到合同';
        document.getElementById('detailBadgeWrap').innerHTML = '';
        document.getElementById('detailBase').innerHTML = '<p class="text-slate-500">请从列表重新进入。</p>';
        document.getElementById('detailOrder').innerHTML = '';
        document.getElementById('detailApproval').innerHTML = '';
        renderFooterActions(null);
        return;
      }

      document.getElementById('detailTitle').textContent = current.name;
      document.getElementById('detailBadgeWrap').innerHTML = '<span class="badge ' + badgeClass(current.status) + '">' + escapeHtml(current.label) + '</span>';

      document.getElementById('detailBase').innerHTML =
        '<div class="info-row"><span class="info-label">合同名称</span><span>' + escapeHtml(current.name) + '</span></div>' +
        '<div class="info-row"><span class="info-label">合同编号</span><span>' + escapeHtml(current.id) + '</span></div>' +
        '<div class="info-row"><span class="info-label">供应商</span><span>' + escapeHtml(current.vendor) + '</span></div>' +
        '<div class="info-row"><span class="info-label">采购商</span><span>' + escapeHtml(current.buyer || '—') + '</span></div>' +
        '<div class="info-row"><span class="info-label">发起时间</span><span>' + escapeHtml(current.started) + '</span></div>';

      document.getElementById('detailOrder').innerHTML =
        '<div class="info-row"><span class="info-label">订单编号</span><span class="flex flex-wrap items-center gap-3">' + escapeHtml(current.doc) +
        '<button type="button" class="btn !h-9 !py-0 text-xs" onclick="openOrderDetailMock(' + JSON.stringify(current.doc || '') + ')">查看详情</button></span></div>';

      document.getElementById('detailApproval').innerHTML = approvalLogsHtml(current);

      renderFooterActions(current);
    }

    function openOrderDetailMock(no) {
      alert('打开订单详情（原型）：' + no + '\n实际系统可跳转订单详情页。');
    }

    function doConfirm() {
      var current = getCurrent();
      if (!current || current.status !== 'pending-confirm') return;
      if (!confirm('确认通过合同「' + current.name + '」？')) return;
      current.status = 'signed';
      current.label = '已签署';
      saveContracts(contracts);
      alert('已确认签署（原型演示）。');
      renderDetail();
    }

    function fillRejectCurrentContractBox() {
      var el = document.getElementById('rejectCurrentContractBody');
      if (!el) return;
      var c = getCurrent();
      if (!c) {
        el.innerHTML = '<p class="text-slate-500 m-0">未找到合同信息</p>';
        return;
      }
      el.innerHTML =
        '<div style="display:grid;grid-template-columns:1fr;gap:8px 16px;">' +
        '<div style="display:grid;grid-template-columns:140px 1fr;gap:8px 16px;"><span class="info-label">合同编号</span><span class="font-semibold">' + escapeHtml(c.id) + '</span></div>' +
        '<div style="display:grid;grid-template-columns:140px 1fr;gap:8px 16px;"><span class="info-label">状态</span><span>' + escapeHtml(c.label) + '</span></div>' +
        '<div style="display:grid;grid-template-columns:140px 1fr;gap:8px 16px;"><span class="info-label">合同名称</span><span class="font-semibold">' + escapeHtml(c.name) + '</span></div>' +
        '<div style="display:grid;grid-template-columns:140px 1fr;gap:8px 16px;"><span class="info-label">供应商</span><span>' + escapeHtml(c.vendor) + '</span></div>' +
        '<div style="display:grid;grid-template-columns:140px 1fr;gap:8px 16px;"><span class="info-label">关联单据</span><span>' + escapeHtml(c.doc) + '</span></div>' +
        '</div>';
    }

    function resetRejectUpdatePanel() {
      rejectUpdateMethod = 'system';
      var panel = document.getElementById('rejectUpdatePanel');
      var btn = document.getElementById('rejectToggleUpdateBtn');
      if (panel) panel.classList.remove('show');
      if (btn) btn.innerHTML = '<i class="fas fa-file-contract"></i>更新合同';
      var sel = document.getElementById('rejectSystemSelect');
      if (sel) sel.innerHTML = '';
      var inp = document.getElementById('rejectUploadInput');
      if (inp) inp.value = '';
      var fn = document.getElementById('rejectUploadFileName');
      if (fn) fn.textContent = '';
      setRejectUpdateMethod('system');
      onRejectSystemSelectChange();
    }

    function toggleRejectUpdatePanel() {
      var panel = document.getElementById('rejectUpdatePanel');
      var btn = document.getElementById('rejectToggleUpdateBtn');
      if (!panel || !btn) return;
      var opening = !panel.classList.contains('show');
      if (opening) {
        panel.classList.add('show');
        btn.innerHTML = '<i class="fas fa-chevron-up"></i>收起更新';
        populateRejectSystemSelect();
        setRejectUpdateMethod('system');
      } else {
        panel.classList.remove('show');
        btn.innerHTML = '<i class="fas fa-file-contract"></i>更新合同';
        var sel = document.getElementById('rejectSystemSelect');
        if (sel) sel.innerHTML = '';
        var inp = document.getElementById('rejectUploadInput');
        if (inp) inp.value = '';
        var fn = document.getElementById('rejectUploadFileName');
        if (fn) fn.textContent = '';
        onRejectSystemSelectChange();
      }
    }

    function populateRejectSystemSelect() {
      var sel = document.getElementById('rejectSystemSelect');
      if (!sel) return;
      sel.innerHTML = '<option value="">请选择平台内的合同或模板…</option>';
      contracts.forEach(function (sc) {
        if (sc.id === contractId) return;
        var opt = document.createElement('option');
        opt.value = 'sign:' + sc.id;
        opt.textContent = '合同 · ' + sc.id + ' · ' + sc.name;
        sel.appendChild(opt);
      });
      templates.forEach(function (t) {
        var opt = document.createElement('option');
        opt.value = 'tpl:' + t.id;
        opt.textContent = '模板 · ' + t.name;
        sel.appendChild(opt);
      });
      onRejectSystemSelectChange();
    }

    function setRejectUpdateMethod(m) {
      rejectUpdateMethod = m;
      var bs = document.getElementById('rejectMethodSystem');
      var bu = document.getElementById('rejectMethodUpload');
      var ps = document.getElementById('rejectPaneSystem');
      var pu = document.getElementById('rejectPaneUpload');
      if (bs && bu) {
        bs.classList.toggle('btn-primary', m === 'system');
        bu.classList.toggle('btn-primary', m === 'upload');
      }
      if (ps && pu) {
        ps.classList.toggle('active', m === 'system');
        pu.classList.toggle('active', m === 'upload');
      }
      onRejectSystemSelectChange();
    }

    function onRejectSystemSelectChange() {
      var sel = document.getElementById('rejectSystemSelect');
      var previewBtn = document.getElementById('rejectSystemPreviewBtn');
      if (!previewBtn) return;
      previewBtn.disabled = !(sel && sel.value && rejectUpdateMethod === 'system');
    }

    function previewRejectSystemSelection() {
      var sel = document.getElementById('rejectSystemSelect');
      var v = sel && sel.value;
      if (!v) {
        alert('请先在下拉框中选择合同或模板');
        return;
      }
      var idx = v.indexOf(':');
      var kind = idx === -1 ? '' : v.slice(0, idx);
      var id = idx === -1 ? v : v.slice(idx + 1);
      if (kind === 'sign') {
        var c = contracts.find(function (x) { return x.id === id; });
        if (c) {
          alert('预览合同正文（原型）：' + c.id + ' · ' + c.name + '\n实际系统将打开在线预览 / PDF。');
        } else {
          alert('未找到所选合同');
        }
      } else if (kind === 'tpl') {
        var t = templates.find(function (x) { return x.id === id; });
        if (t) {
          alert('预览模板（原型）：' + t.name + '\n实际系统将打开模板预览。');
        } else {
          alert('未找到所选模板');
        }
      }
    }

    function handleRejectUpload(inp) {
      var f = inp.files && inp.files[0];
      var el = document.getElementById('rejectUploadFileName');
      if (el) el.textContent = f ? f.name : '';
    }

    function openRejectModal() {
      var current = getCurrent();
      if (!current || current.status !== 'pending-confirm') return;
      templates = loadTemplatesFromStorage();
      document.getElementById('rejectReason').value = '';
      resetRejectUpdatePanel();
      fillRejectCurrentContractBox();
      document.getElementById('rejectModal').classList.add('show');
    }
    function closeRejectModal() {
      document.getElementById('rejectModal').classList.remove('show');
      resetRejectUpdatePanel();
    }
    function submitReject() {
      var current = getCurrent();
      if (!current || current.status !== 'pending-confirm') { closeRejectModal(); return; }
      var reason = document.getElementById('rejectReason').value.trim();
      if (!reason) { alert('请填写退回理由'); return; }
      var panel = document.getElementById('rejectUpdatePanel');
      var upd = panel && panel.classList.contains('show');
      var updHint = '';
      if (upd) {
        if (rejectUpdateMethod === 'system') {
          var v = document.getElementById('rejectSystemSelect').value;
          if (!v) {
            alert('请从系统中选择一份合同或模板，或切换为「上传合同」上传文件');
            return;
          }
          var selEl = document.getElementById('rejectSystemSelect');
          var opt = selEl && selEl.selectedOptions && selEl.selectedOptions[0];
          updHint = '（合同文本更新：' + (opt ? opt.textContent : v) + '）';
        } else {
          var inp = document.getElementById('rejectUploadInput');
          if (!inp || !inp.files || !inp.files[0]) {
            alert('请先上传合同文件，或切换为「从系统选择」');
            return;
          }
          updHint = '（合同文本更新：已上传「' + inp.files[0].name + '」）';
        }
      } else {
        updHint = '（未指定合同文本更新）';
      }
      if (!confirm('确认退回合同「' + current.name + '」？\n' + updHint)) return;
      current.status = 'voided';
      current.label = '已作废';
      saveContracts(contracts);
      closeRejectModal();
      alert('已退回（原型演示）。');
      renderDetail();
    }

    function deleteContractRecord() {
      var current = getCurrent();
      if (!current || current.status !== 'voided') return;
      if (!confirm('确认从列表中删除该作废合同记录？')) return;
      contracts = contracts.filter(function (x) { return x.id !== contractId; });
      saveContracts(contracts);
      try { sessionStorage.setItem('buyerContractHubTab', 'signing'); } catch (e) {}
      location.href = 'buyer_contract_hub.html';
    }

    renderDetail();
  </script>
</body>
</html>
