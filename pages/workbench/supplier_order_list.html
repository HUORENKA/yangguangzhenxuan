<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单管理 | 供应商工作台</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background: #f5f7fa; color: #0f172a; font-family: system-ui, "Microsoft YaHei", sans-serif; }
    .page-wrap { max-width: 1660px; margin: 0 auto; padding: 16px 20px 32px; }
    .toolbar-title { font-size: 22px; font-weight: 800; }
    .toolbar-sub { font-size: 13px; color: #64748b; margin-top: 4px; }
    .tabs-wrap { border-bottom: 2px solid #e5e7eb; margin-bottom: 12px; }
    .tabs { display: flex; flex-wrap: wrap; gap: 4px 8px; align-items: flex-end; }
    .tab { padding: 10px 14px 12px; font-size: 14px; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; font-weight: 600; }
    .tab:hover { color: #2563eb; }
    .tab.active { color: #2563eb; border-bottom-color: #2563eb; }
    .filter-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 10px 12px; margin-bottom: 14px; }
    .ipt { border: 1px solid #d8dee8; border-radius: 6px; padding: 8px 12px; font-size: 13px; min-width: 220px; }
    .btn { height: 34px; padding: 0 16px; border-radius: 6px; font-size: 13px; font-weight: 700; border: 1px solid #cbd5e1; background: #fff; color: #475569; cursor: pointer; }
    .btn:hover { filter: brightness(0.98); }
    .btn-primary { background: #2563eb; border-color: #2563eb; color: #fff; }
    .btn-ghost-line { border: 1px solid #94a3b8; color: #334155; background: #fff; }
    .btn-sm { height: 30px; padding: 0 10px; font-size: 12px; }
    .list-head-grid {
      display: grid;
      grid-template-columns: 36px minmax(320px, 1fr) 140px 160px 100px 120px;
      gap: 12px;
      align-items: center;
      padding: 10px 16px;
      background: #eef2f6;
      border: 1px solid #e2e8f0;
      border-radius: 6px 6px 0 0;
      font-size: 13px;
      font-weight: 700;
      color: #475569;
    }
    .order-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-top: none;
      margin-bottom: 16px;
      border-radius: 0 0 8px 8px;
      box-shadow: 0 6px 16px rgba(15,23,42,.04);
      overflow: hidden;
    }
    .order-meta {
      padding: 10px 14px;
      background: linear-gradient(#f8fafc, #f1f5f9);
      border-bottom: 1px solid #e8edf3;
      display: flex; flex-wrap: wrap; align-items: center; gap: 10px 20px;
      font-size: 13px;
    }
    .order-meta .muted { color: #64748b; }
    .badge {
      margin-left: auto;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 800;
    }
    .badge-pending-supplier { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .badge-pending-ship { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
    .badge-partial { background: #fefce8; color: #a16207; border: 1px solid #fde047; }
    .badge-shipped { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
    .badge-done { background: #ecfeff; color: #0e7490; border: 1px solid #a5f3fc; }
    .badge-cancel { background: #f8fafc; color: #64748b; border: 1px solid #e2e8f0; }
    .badge-return { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .inner-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .inner-table td { vertical-align: top; padding: 14px 12px; border-top: 1px solid #f1f5f9; }
    .product-cell { display: flex; gap: 10px; align-items: flex-start; padding-left: 8px !important; }
    .thumb {
      width: 72px; height: 72px; border-radius: 8px; background: linear-gradient(135deg,#e2e8f0,#cbd5f5);
      flex-shrink: 0; border: 1px solid #e2e8f0;
      display:flex; align-items:center; justify-content:center; color:#94a3b8; font-size:11px; text-align:center; padding:4px;
    }
    .p-name { font-weight: 700; color: #0f172a; line-height: 1.4; margin-bottom: 6px; }
    .p-spec { font-size: 12px; color: #64748b; line-height: 1.6; }
    .qty-block .row { margin-bottom: 4px; }
    .qty-block .lbl { color: #94a3b8; margin-right: 6px; }
    .qty-block strong { font-weight: 700; color: #0f172a; }
    .price-red { font-weight: 800; color: #dc2626; }
    .actions-stack { display: flex; flex-direction: column; gap: 8px; align-items: stretch; text-align: center; }
    .actions-stack button { justify-content: center; }
    .linklike { font-size: 13px; color: #2563eb; cursor: pointer; background: none; border: none; padding: 0; text-align: left; }
    .linklike:hover { text-decoration: underline; }
    .ship-count { font-size: 11px; color: #64748b; margin-top: 6px; }
    /* 弹窗 */
    .dlg-overlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.5);
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .dlg-overlay.show { display: flex; }
    .dlg {
      background: #fff;
      border-radius: 12px;
      max-width: 720px;
      width: 100%;
      max-height: 92vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 48px rgba(15,23,42,.18);
      border: 1px solid #e2e8f0;
    }
    .dlg-hd {
      padding: 16px 20px;
      border-bottom: 1px solid #e8edf3;
      font-weight: 800;
      font-size: 17px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .dlg-bd { padding: 16px 20px; overflow-y: auto; flex: 1; }
    .dlg-ft {
      padding: 12px 20px;
      border-top: 1px solid #e8edf3;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12px; font-weight: 700; color: #475569; margin-bottom: 4px; }
    .field .hint { font-size: 11px; color: #94a3b8; margin-top: 4px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .pill-readonly {
      padding: 8px 10px;
      background: #f8fafc;
      border-radius: 6px;
      border: 1px dashed #cbd5e1;
      font-size: 13px;
      color: #334155;
    }
    .waybill-row { display: flex; gap: 8px; align-items: flex-start; }
    .waybill-row input { flex: 1; }
    .ship-line-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
    }
    .ship-line-table th, .ship-line-table td {
      border: 1px solid #e8edf3; padding: 8px 10px;
    }
    .ship-line-table th { background: #f8fafc; font-weight: 700; color: #475569; }
    .alert-mock {
      padding: 8px 12px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 6px;
      font-size: 12px;
      color: #1e40af;
      margin-bottom: 14px;
    }
    .log-list { margin: 10px 0 0; padding-left: 16px; color: #475569; font-size: 13px; line-height: 1.7; max-height: 200px; overflow-y: auto; }
    .log-item { padding: 6px 0; border-bottom: 1px solid #f1f5f9; }
    .empty-list { padding: 40px; text-align: center; color: #94a3b8; font-size: 14px; }
    .upload-slip-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 12px; }
    .upload-preview {
      font-size: 12px; color: #047857; background: #ecfdf5; border: 1px solid #a7f3d0;
      border-radius: 6px; padding: 8px 10px; margin-bottom: 10px; display: none;
    }
    .upload-preview.show { display: block; }
    .qty-readonly { font-weight: 800; color: #0f172a; text-align: center; }
    .line-actions { display: flex; flex-direction: column; gap: 6px; align-items: stretch; }
    .line-actions .btn { width: 100%; }
    /* 物流时间轴 */
    .timeline-wrap { position: relative; padding: 8px 0 4px 6px; }
    .timeline-item {
      position: relative; padding: 0 0 18px 22px; font-size: 13px;
    }
    .timeline-item:last-child { padding-bottom: 0; }
    .timeline-item::before {
      content: ''; position: absolute; left: 5px; top: 6px; width: 10px; height: 10px;
      border-radius: 50%; background: #cbd5e1; border: 2px solid #fff; box-shadow: 0 0 0 1px #cbd5e1;
    }
    .timeline-item:first-child::before { background: #2563eb; box-shadow: 0 0 0 1px #2563eb; }
    .timeline-item:not(:last-child)::after {
      content: ''; position: absolute; left: 9px; top: 18px; bottom: 0; width: 2px; background: #e2e8f0;
    }
    .timeline-time { color: #64748b; font-size: 12px; margin-bottom: 2px; }
    .timeline-desc { color: #0f172a; font-weight: 600; line-height: 1.5; }
    .timeline-loc { color: #64748b; font-size: 12px; margin-top: 2px; }
    .timeline-head { font-size: 14px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #e8edf3; }
    .dlg-product-cell { display: flex; gap: 10px; align-items: flex-start; min-width: 0; }
    .dlg-thumb {
      width: 56px; height: 56px; border-radius: 6px; object-fit: cover;
      border: 1px solid #e2e8f0; flex-shrink: 0; background: #f1f5f9;
    }
    .dlg-product-name { font-weight: 700; font-size: 13px; line-height: 1.4; color: #0f172a; }
    .dlg-product-spec { font-size: 11px; color: #64748b; margin-top: 4px; line-height: 1.5; }
    .dlg-supplier { font-size: 12px; color: #334155; line-height: 1.5; }
    .dlg-supplier-lbl { color: #94a3b8; font-size: 11px; display: block; margin-bottom: 2px; }
    .ship-line-table .dlg-product-cell { min-width: 200px; }

</head>
<body>
  <div class="page-wrap">
    <div class="mb-5 flex items-start justify-between gap-4">
      <div>
        <div class="toolbar-title">订单管理</div>
        <p class="toolbar-sub">按商品行登记发货（勾选即发全部待发数量）· 上传物流单识别 · 运单校验回填 · 行级查看物流时间轴 / 修改单号</p>
      </div>
    </div>

    <div class="tabs-wrap">
      <div class="tabs" id="orderTabs"></div>
    </div>

    <div class="filter-bar">
      <input type="text" class="ipt" id="orderSearchInput" placeholder="请输入订单编号">
      <button class="btn btn-primary" type="button" id="btnSearch">搜索</button>
      <button class="btn" type="button" id="btnReset">重置</button>
    </div>

    <div class="list-head-grid">
      <div><input type="checkbox" disabled title="整单勾选（示意）"/></div>
      <div>商品详情</div>
      <div>数量</div>
      <div>金额</div>
      <div>订单详情</div>
      <div>操作</div>
    </div>

    <div id="orderListRoot"></div>
  </div>

  <!-- 登记发货 -->
  <div class="dlg-overlay" id="shipDlg">
    <div class="dlg" onclick="event.stopPropagation()">
      <div class="dlg-hd">
        <span>登记发货</span>
        <button type="button" class="btn btn-sm" onclick="closeShipDlg()">&times;</button>
      </div>
      <div class="dlg-bd">
        <div class="alert-mock"><i class="fa-solid fa-plug-circle-bolt mr-1"></i>可勾选<strong>同订单下多条待发商品</strong>合并一次发货，每条按<strong>全部待发数量</strong>发出。可<strong>上传物流单</strong>识别信息，或手动填写后<strong>校验</strong>回填承运商。</div>
        <div class="field">
          <table class="ship-line-table">
            <thead>
              <tr>
                <th style="width:36px;"></th>
                <th>商品</th>
                <th style="width:130px;">供应商</th>
                <th style="width:90px;text-align:center;">商品数量</th>
              </tr>
            </thead>
            <tbody id="shipDlgLinesBody"></tbody>
          </table>
        </div>
        <div class="upload-slip-row">
          <input type="file" id="inpLogisticsSlip" accept="image/*,.pdf" hidden>
          <button type="button" class="btn btn-ghost-line" id="btnUploadSlip"><i class="fa-solid fa-cloud-arrow-up mr-1"></i>上传物流单</button>
          <span class="text-xs text-slate-500">支持图片 / PDF，原型模拟 OCR 识别</span>
        </div>
        <div class="upload-preview" id="uploadSlipPreview"></div>
        <div class="row2">
          <div class="field">
            <label>发货人姓名 <span style="color:#dc2626">*</span></label>
            <input class="ipt w-full" id="inpShipperName" placeholder="如：王明">
          </div>
          <div class="field">
            <label>发货人手机号 <span style="color:#dc2626">*</span></label>
            <input class="ipt w-full" id="inpShipperPhone" placeholder="如：138xxxx0000">
          </div>
        </div>
        <div class="field">
          <label>物流单号 <span style="color:#dc2626">*</span></label>
          <div class="waybill-row">
            <input type="text" class="ipt" id="inpWaybill" placeholder="请输入运单号，或上传物流单自动识别">
            <button type="button" class="btn btn-ghost-line" id="btnValidateWaybill">校验</button>
          </div>
          <div class="hint field" id="waybillValidateMsg"></div>
        </div>
        <div class="field">
          <label>快递公司</label>
          <input class="ipt w-full" id="inpCarrier" readonly placeholder="请先校验物流单号">
        </div>
      </div>
      <div class="dlg-ft">
        <button class="btn" type="button" onclick="closeShipDlg()">取消</button>
        <button class="btn btn-primary" type="button" onclick="submitShipment()">提交发货</button>
      </div>
    </div>
  </div>

  <!-- 查看物流 · 时间轴 -->
  <div class="dlg-overlay" id="timelineDlg">
    <div class="dlg" style="max-width:560px" onclick="event.stopPropagation()">
      <div class="dlg-hd">
        <span>物流跟踪</span>
        <button type="button" class="btn btn-sm" onclick="closeTimelineDlg()">&times;</button>
      </div>
      <div class="dlg-bd" id="timelineDlgBody"></div>
      <div class="dlg-ft">
        <button class="btn" type="button" onclick="closeTimelineDlg()">关闭</button>
      </div>
    </div>
  </div>

  <!-- 修改单号（行级） -->
  <div class="dlg-overlay" id="modifyWaybillDlg">
    <div class="dlg" style="max-width:520px" onclick="event.stopPropagation()">
      <div class="dlg-hd">
        <span>修改物流单号</span>
        <button type="button" class="btn btn-sm" onclick="closeModifyWaybillDlg()">&times;</button>
      </div>
      <div class="dlg-bd">
        <p class="text-sm mb-3" id="modifyWaybillSummary"></p>
        <div class="upload-slip-row">
          <input type="file" id="inpModifyLogisticsSlip" accept="image/*,.pdf" hidden>
          <button type="button" class="btn btn-ghost-line" id="btnModifyUploadSlip"><i class="fa-solid fa-cloud-arrow-up mr-1"></i>上传物流单</button>
          <span class="text-xs text-slate-500">支持图片 / PDF，识别后自动填入运单号并校验</span>
        </div>
        <div class="upload-preview" id="modifyUploadSlipPreview"></div>
        <div class="field">
          <label>物流单号 <span style="color:#dc2626">*</span></label>
          <div class="waybill-row">
            <input type="text" class="ipt" id="modifyWaybillInput" placeholder="请输入新运单号，或上传物流单识别">
            <button type="button" class="btn btn-ghost-line" id="btnModifyValidate">校验</button>
          </div>
          <div class="hint" id="modifyWaybillMsg"></div>
        </div>
        <div class="row2">
          <div class="field">
            <label>承运商（接口回填）</label>
            <input class="ipt w-full" id="modifyCarrier" readonly>
          </div>
          <div class="field">
            <label>发货时间（接口回填）</label>
            <input class="ipt w-full" id="modifyShipTime" readonly>
          </div>
        </div>
      </div>
      <div class="dlg-ft">
        <button class="btn" type="button" onclick="closeModifyWaybillDlg()">取消</button>
        <button class="btn btn-primary" type="button" onclick="saveModifyWaybill()">保存</button>
      </div>
    </div>
  </div>

    function statusBadgeClass(st) {
      const map = {
        pending_confirm: 'badge-pending-supplier',
        pending_ship: 'badge-pending-ship',
        partial_ship: 'badge-partial',
        shipped: 'badge-shipped',
        received_done: 'badge-done',
        cancelled: 'badge-cancel',
        'return': 'badge-return'
      };
      return map[st] || 'badge-cancel';
    }

    function statusLabel(st) {
      const map = {
        pending_confirm: '待供应商确认',
        pending_ship: '待发货',
        partial_ship: '部分发货',
        shipped: '已发货',
        received_done: '收货完成',
        cancelled: '已取消',
        'return': '退货'
      };
      return map[st] || st;
    }

    function deriveOrderTotals(o) {
      let goodsAmt = o.lines.reduce((s, ln) => s + ln.unitPrice * ln.qty, 0);
      let totalShipped = o.shipments.reduce((s, sh) =>
        s + sh.allocations.reduce((t, al) => t + al.qty, 0), 0);
      return { goodsAmt, totalShipped };
    }

    function recomputeStatus(o) {
      /** 采购商已收货完成的演示单，不参与自动回算 */
      if (['cancelled', 'return', 'received_done'].includes(o.status)) return;
      const allShipped = o.lines.every(l => l.shippedQty >= l.qty);
      const anyShip = o.shipments.length > 0;
      if (allShipped) o.status = 'shipped';
      else if (anyShip && o.lines.some(l => l.shippedQty < l.qty)) o.status = 'partial_ship';
      else o.status = 'pending_ship';
    }

    function tabCounts() {
      const counts = {};
      TAB_KEYS.forEach(k => { counts[k] = 0; });
      counts.all = orders.length;
      orders.forEach(o => {
        TAB_KEYS.forEach(k => {
          if (k === 'all') return;
          if (tabMatches(k, o.status)) counts[k] += 1;
        });
      });
      return counts;
    }

    function renderTabs() {
      const counts = tabCounts();
      document.getElementById('orderTabs').innerHTML = TAB_KEYS.map(k => {
        const n = counts[k] ?? 0;
        return `<button type="button" class="tab ${activeTab===k?'active':''}" data-tab="${k}">${TAB_LABEL[k]}（${n}）</button>`;
      }).join('');
      document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          activeTab = btn.getAttribute('data-tab');
          renderTabs();
          renderOrderList();
        });
      });
    }

    /** 模拟接口：校验运单 → 回填承运商、发货时间 */
    function mockWaybillLookup(waybill) {
      const w = String(waybill || '').trim();
      if (!w || w.length < 8) return { ok: false, msg: '请输入不少于 8 位的运单号' };
      if (/^SF/i.test(w)) return { ok: true, carrier: '顺丰速运', shipTimeApi: fmtNow(), msg: '' };
      if (/^JT/i.test(w)) return { ok: true, carrier: '极兔速递', shipTimeApi: fmtNow(), msg: '' };
      if (/^JD/i.test(w) || /^JDVB/i.test(w)) return { ok: true, carrier: '京东物流', shipTimeApi: fmtNow(), msg: '' };
      if (/^YT/i.test(w)) return { ok: true, carrier: '圆通速递', shipTimeApi: fmtNow(), msg: '' };
      return { ok: true, carrier: '快递（承运商占位）', shipTimeApi: fmtNow(), msg: '' };
    }

    function fmtNow() {
      const d = new Date();
      return d.toISOString().slice(0, 19).replace('T', ' ');
    }

    function lineRemaining(ln) {
      return Math.max(0, ln.qty - ln.shippedQty);
    }

    function canShipOrder(o) {
      return o.status === 'pending_ship' || o.status === 'partial_ship';
    }

    /** 某商品行关联的发货批次（含该 lineId 的 allocation） */
    function getLineShipments(o, lineId) {
      return o.shipments.filter(sh =>
        sh.allocations.some(a => a.lineId === lineId && a.qty > 0)
      );
    }

    function getLatestLineShipment(o, lineId) {
      const list = getLineShipments(o, lineId);
      return list.length ? list[list.length - 1] : null;
    }

    /** 模拟 OCR：上传物流单后识别填报字段 */
    function mockOcrLogisticsSlip(fileName) {
      const seed = (fileName || '').length % 3;
      const samples = [
        { waybill: 'SF' + Date.now().toString().slice(-12), shipperName: '王明', shipperPhone: '13800138001' },
        { waybill: 'YT88776655443399', shipperName: '李芳', shipperPhone: '13900139002' },
        { waybill: 'JDVB20260421008877', shipperName: '赵志强', shipperPhone: '13600008888' }
      ];
      return samples[seed];
    }

    /** 模拟物流轨迹时间轴 */
    function mockWaybillTimeline(waybill, carrier, shipTimeApi) {
      const base = shipTimeApi || fmtNow();
      const nodes = [
        { time: base, desc: '快件已揽收', loc: '发货网点' },
        { time: addHours(base, 2), desc: '快件已发往【区域转运中心】', loc: '转运中心' },
        { time: addHours(base, 8), desc: '快件到达【区域转运中心】', loc: '转运中心' },
        { time: addHours(base, 20), desc: '快件已发出，下一站【目的地城市】', loc: '在途' },
        { time: addHours(base, 36), desc: '快件派送中', loc: '目的地派送站' }
      ];
      return nodes;
    }

    function addHours(isoStr, h) {
      const d = new Date(String(isoStr).replace(/-/g, '/'));
      if (isNaN(d.getTime())) return isoStr;
      d.setHours(d.getHours() + h);
      return d.toISOString().slice(0, 19).replace('T', ' ');
    }

    function renderLineActions(o, ln) {
      const rem = lineRemaining(ln);
      if (o.status === 'cancelled') {
        return '<span class="text-xs text-slate-400">—</span>';
      }
      const parts = [];
      if (canShipOrder(o) && rem > 0) {
        parts.push(`<button type="button" class="btn btn-primary btn-sm" data-action="ship-line" data-order="${escapeHtml(o.id)}" data-line="${escapeHtml(ln.lineId)}">登记发货</button>`);
      }
      if (ln.shippedQty > 0 && getLineShipments(o, ln.lineId).length > 0) {
        parts.push(`<button type="button" class="btn btn-ghost-line btn-sm" data-action="timeline" data-order="${escapeHtml(o.id)}" data-line="${escapeHtml(ln.lineId)}">查看物流</button>`);
        parts.push(`<button type="button" class="btn btn-ghost-line btn-sm" data-action="modify-waybill-line" data-order="${escapeHtml(o.id)}" data-line="${escapeHtml(ln.lineId)}">修改单号</button>`);
      }
      if (!parts.length) {
        if (o.status === 'return') return '<span class="text-xs text-slate-400">退货</span>';
        return '<span class="text-xs text-slate-400">—</span>';
      }
      return `<div class="line-actions">${parts.join('')}</div>`;
    }

    function renderOrderList() {
      renderTabs();
      const root = document.getElementById('orderListRoot');
      let filtered = orders.filter(o => !searchNo || o.id.toLowerCase().includes(searchNo.trim().toLowerCase()));
      if (activeTab !== 'all') filtered = filtered.filter(o => tabMatches(activeTab, o.status));

      if (!filtered.length) {
        root.innerHTML = '<div class="order-card empty-list">暂无订单</div>';
        return;

      root.innerHTML = filtered.map(o => renderOneOrderCard(o)).join('');
      bindInlineHandlers();

          openTimelineDlg(btn.getAttribute('data-order'), btn.getAttribute('data-line'));
        });
      });
      document.querySelectorAll('[data-action="modify-waybill-line"]').forEach(btn => {

    }

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function lineImageUrl(ln) {
      const seed = encodeURIComponent(ln.skuCode || ln.lineId || 'product');
      return 'https://picsum.photos/seed/' + seed + '/112/112';
    }

    /** ---- 发货弹窗 ---- */
    function openShipDlg(orderId, lineId) {
      const o = orders.find(x => x.id === orderId);
      if (!o) return;
      shipTargetOrderId = orderId;
      shipTargetLineId = lineId || null;
      lastWaybillValidation = null;
      document.getElementById('inpShipperName').value = '';
      document.getElementById('inpShipperPhone').value = '';
      document.getElementById('inpWaybill').value = '';
      document.getElementById('inpCarrier').value = '';
      document.getElementById('waybillValidateMsg').textContent = '';
      const preview = document.getElementById('uploadSlipPreview');
      preview.classList.remove('show');
      preview.innerHTML = '';
      const fileInp = document.getElementById('inpLogisticsSlip');
      if (fileInp) fileInp.value = '';

      const linesToShow = o.lines.filter(ln => lineRemaining(ln) > 0);

      document.getElementById('shipDlgLinesBody').innerHTML = linesToShow.map(ln => {
        const rem = lineRemaining(ln);
        const preCheck = lineId && ln.lineId === lineId ? 'checked' : '';
        return `
          <tr data-line="${ln.lineId}" data-qty="${rem}">
            <td style="text-align:center"><input type="checkbox" class="shipPick" ${preCheck} /></td>
            <td>${renderDlgProductCell(ln)}</td>
            <td>${renderDlgSupplierCell(o.supplierName)}</td>
            <td class="qty-readonly">${rem}</td>
          </tr>`;
      }).join('');

      if (!linesToShow.length) {
        document.getElementById('shipDlgLinesBody').innerHTML =
          '<tr><td colspan="4" style="text-align:center;color:#94a3b8;">本订单暂无待发商品</td></tr>';
      }

      document.getElementById('btnValidateWaybill').onclick = runWaybillValidate;
      document.getElementById('shipDlg').classList.add('show');
    }

    function closeShipDlg() {
      shipTargetOrderId = null;
      shipTargetLineId = null;
      document.getElementById('shipDlg').classList.remove('show');
    }

    function applyOcrResult(ocr) {
      document.getElementById('inpWaybill').value = ocr.waybill || '';
      document.getElementById('inpShipperName').value = ocr.shipperName || '';
      document.getElementById('inpShipperPhone').value = ocr.shipperPhone || '';
      runWaybillValidate();
    }

    function runWaybillValidate() {
      const w = document.getElementById('inpWaybill').value.trim();
      const res = mockWaybillLookup(w);
      const msgEl = document.getElementById('waybillValidateMsg');
      if (!res.ok) {
        lastWaybillValidation = null;
        msgEl.innerHTML = `<span style="color:#b91c1c">${escapeHtml(res.msg)}</span>`;
        document.getElementById('inpCarrier').value = '';
        return;
      }
      lastWaybillValidation = { carrier: res.carrier, shipTimeApi: res.shipTimeApi };
      document.getElementById('inpCarrier').value = res.carrier;
      msgEl.innerHTML = '<span style="color:#047857"><i class="fa-solid fa-check"></i> 校验成功（模拟接口），承运商已回填</span>';
    }

    function submitShipment() {
      if (!shipTargetOrderId) return;
      const o = orders.find(x => x.id === shipTargetOrderId);
      if (!o) return;

      const name = document.getElementById('inpShipperName').value.trim();
      const phone = document.getElementById('inpShipperPhone').value.trim();
      const waybill = document.getElementById('inpWaybill').value.trim();

      const rows = document.querySelectorAll('#shipDlgLinesBody tr[data-line]');
      const allocations = [];
      rows.forEach(tr => {
        const cb = tr.querySelector('.shipPick');
        if (!cb || !cb.checked) return;
        const lineId = tr.getAttribute('data-line');
        const ln = o.lines.find(l => l.lineId === lineId);
        if (!ln) return;
        const rem = lineRemaining(ln);
        if (rem < 1) return;
        allocations.push({ lineId, qty: rem });
      });
      if (!allocations.length) {
        alert('请至少勾选一条待发商品');
        return;
      }
      if (!name || !/^1\d{10}$/.test(phone.replace(/\s+/g,''))) {
        alert('请填写发货人姓名与合规手机号');
        return;
      }
      if (!waybill) {
        alert('请填写物流单号并完成校验'); return;
      }
      if (!lastWaybillValidation || document.getElementById('inpWaybill').value.trim() !== waybill ||
          document.getElementById('inpCarrier').value !== lastWaybillValidation.carrier) {
        alert('请先点击「校验」通过后再提交发货');
        return;
      }

      const shipmentId = 'sh-' + Date.now();
      o.shipments.push({
        shipmentId,
        waybill,
        carrier: lastWaybillValidation.carrier,
        shipTimeApi: lastWaybillValidation.shipTimeApi,
        shipperName: name,
        shipperPhone: phone.replace(/\s+/g,''),
        allocations: allocations.slice()
      });

      allocations.forEach(al => {
        const ln = o.lines.find(l => l.lineId === al.lineId);
        ln.shippedQty += al.qty;
      });
      recomputeStatus(o);

      alert('发货已登记（示意），已生成批次：' + shipmentId);
      closeShipDlg();
      renderOrderList();
    }

      modifyPending = null;
      document.getElementById('modifyWaybillDlg').classList.remove('show');
    }

    function applyModifyOcrResult(ocr) {
      document.getElementById('modifyWaybillInput').value = ocr.waybill || '';
      runModifyValidate();
    }

    function runModifyValidate() {
      if (!modifyCtx) return;
      const w = document.getElementById('modifyWaybillInput').value.trim();
      const res = mockWaybillLookup(w);
      const msgEl = document.getElementById('modifyWaybillMsg');
      if (!res.ok) {
        modifyPending = null;
        msgEl.innerHTML = `<span style="color:#b91c1c">${escapeHtml(res.msg)}</span>`;
        return;
      }
      modifyPending = { carrier: res.carrier, shipTimeApi: res.shipTimeApi };
      document.getElementById('modifyCarrier').value = res.carrier;
      document.getElementById('modifyShipTime').value = res.shipTimeApi;
      msgEl.innerHTML = '<span style="color:#047857">校验成功，承运商与时间已更新</span>';
    }

    function saveModifyWaybill() {
      if (!modifyCtx || !modifyPending) {
        alert('请先点击「校验」');
        return;
      }
      const o = orders.find(x => x.id === modifyCtx.orderId);
      if (!o) return;
      const sh = o.shipments.find(x => x.shipmentId === modifyCtx.shipmentId);
      if (!sh) return;
      const w = document.getElementById('modifyWaybillInput').value.trim();
      if (!w) {
        alert('请填写物流单号');
        return;
      }
      sh.waybill = w;
      sh.carrier = modifyPending.carrier;
      sh.shipTimeApi = modifyPending.shipTimeApi;
      alert('物流单号已更新（示意）');
      closeModifyWaybillDlg();
      renderOrderList();
    }

    document.getElementById('btnSearch').addEventListener('click', () => {
      searchNo = document.getElementById('orderSearchInput').value;
      renderOrderList();
    });
    document.getElementById('btnReset').addEventListener('click', () => {
      document.getElementById('orderSearchInput').value = '';
      searchNo = '';
      activeTab = 'all';
      renderOrderList();
    });

    document.getElementById('btnUploadSlip').addEventListener('click', () => {
      document.getElementById('inpLogisticsSlip').click();
    });
    document.getElementById('inpLogisticsSlip').addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const preview = document.getElementById('uploadSlipPreview');
      preview.classList.add('show');
      preview.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 正在识别物流单…';
      setTimeout(() => {
        const ocr = mockOcrLogisticsSlip(file.name);
        preview.innerHTML = `<i class="fa-solid fa-check"></i> 已识别：<strong>${escapeHtml(file.name)}</strong> → 运单号、发货人信息已填入，并已触发校验`;
        applyOcrResult(ocr);
      }, 600);
    });
    document.getElementById('btnModifyValidate').addEventListener('click', runModifyValidate);
    document.getElementById('btnModifyUploadSlip').addEventListener('click', () => {
      document.getElementById('inpModifyLogisticsSlip').click();
    });
    document.getElementById('inpModifyLogisticsSlip').addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const preview = document.getElementById('modifyUploadSlipPreview');
      preview.classList.add('show');
      preview.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 正在识别物流单…';
      setTimeout(() => {
        const ocr = mockOcrLogisticsSlip(file.name);
        preview.innerHTML = `<i class="fa-solid fa-check"></i> 已识别：<strong>${escapeHtml(file.name)}</strong> → 运单号已填入，并已触发校验`;
        applyModifyOcrResult(ocr);
      }, 600);
    });

    seedOrders();
    orders.forEach(recomputeStatus);
    renderOrderList();
  </script>
</body>
</html>
