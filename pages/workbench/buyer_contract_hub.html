<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合同签署 | 采购工作台</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background:#f8fafc; color:#0f172a; }
    .page-card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; box-shadow:0 8px 20px rgba(15,23,42,.04); }
    .stat-card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:18px; display:flex; align-items:center; justify-content:space-between; }
    .stat-icon { width:44px; height:44px; border-radius:14px; display:flex; align-items:center; justify-content:center; }
    .badge { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700; }
    .b-warn { background:#fffbeb; color:#b45309; }
    .b-blue { background:#eff6ff; color:#1d4ed8; }
    .b-green { background:#ecfdf5; color:#047857; }
    .b-slate { background:#f1f5f9; color:#475569; }
    .b-muted { background:#f4f4f5; color:#52525b; }
    .b-violet { background:#f5f3ff; color:#6d28d9; }
    .b-red { background:#fef2f2; color:#b91c1c; }
    .btn { height:32px; padding:0 12px; border-radius:8px; font-size:12px; font-weight:700; border:1px solid #dbe2ea; background:#fff; color:#475569; cursor:pointer; }
    .btn-link { border:none; background:none; color:#2563eb; padding:0 6px; height:auto; font-weight:600; }
    .btn-primary { background:#4f46e5; border-color:#4f46e5; color:#fff; }
    .btn-danger { background:#fef2f2; border-color:#fecaca; color:#b91c1c; }
    .btn-orange { background:linear-gradient(135deg,#ff7a18,#ff4d00); border:none; color:#fff; height:38px; padding:0 18px; font-weight:700; border-radius:8px; cursor:pointer; }
    .btn:disabled { opacity:.45; cursor:not-allowed; }
    th { background:#f8fafc; color:#64748b; font-size:13px; font-weight:700; }
    td, th { padding:12px 14px; border-bottom:1px solid #f1f5f9; text-align:left; }
    .hub-tab { padding:8px 16px; border-radius:10px 10px 0 0; font-size:14px; font-weight:700; border:1px solid transparent; border-bottom:none; cursor:pointer; background:#f1f5f9; color:#64748b; }
    .hub-tab.active { background:#fff; color:#ea580c; border-color:#e2e8f0; border-bottom-color:#fff; margin-bottom:-1px; position:relative; z-index:1; }
    .hub-tab-pane { display:none; }
    .hub-tab-pane.active { display:block; }
    .modal-overlay { position:fixed; inset:0; background:rgba(15,23,42,.45); z-index:100; display:none; align-items:center; justify-content:center; padding:16px; }
    .modal-overlay.show { display:flex; }
    /* 抽屉 z-index 为 200/210，嵌套弹窗须在其之上才能居中显示 */
    .modal-overlay.layer-above-drawer { z-index:250; }
    .modal-box { background:#fff; border-radius:14px; max-width:440px; width:100%; padding:20px; box-shadow:0 22px 48px rgba(15,23,42,.2); }
    .modal-box.ai-gen-modal { max-width:min(92vw,800px); padding:22px 24px; }
    .return-modal { max-width:min(92vw,480px); }
    .ai-gen-loading { display:none; margin-top:12px; font-size:13px; color:#64748b; align-items:center; gap:8px; }
    .ai-gen-loading.show { display:flex; }
    .ai-spin { width:16px; height:16px; border:2px solid #e2e8f0; border-top-color:#ff6a00; border-radius:50%; animation:spin .75s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .drawer-mask { position:fixed; inset:0; background:rgba(15,23,42,.45); z-index:200; opacity:0; pointer-events:none; transition:opacity .25s; }
    .drawer-mask.show { opacity:1; pointer-events:auto; }
    .contract-drawer { position:fixed; top:0; right:0; bottom:0; width:min(920px,96vw); background:#f8fafc; z-index:210; transform:translateX(100%); transition:transform .28s ease; display:flex; flex-direction:column; box-shadow:-12px 0 40px rgba(15,23,42,.12); }
    .contract-drawer.show { transform:translateX(0); }
    .drawer-head { background:#fff; border-bottom:1px solid #e2e8f0; padding:16px 20px; flex-shrink:0; }
    .drawer-head-row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .drawer-title { font-size:18px; font-weight:800; color:#0f172a; }
    .drawer-close { width:36px; height:36px; border-radius:8px; border:1px solid #e2e8f0; background:#fff; cursor:pointer; color:#64748b; }
    .drawer-actions { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
    .drawer-action-btn { height:36px; padding:0 18px; border-radius:8px; font-size:13px; font-weight:700; border:none; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
    .drawer-action-btn.confirm { background:#16a34a; color:#fff; }
    .drawer-action-btn.upload { background:#dc2626; color:#fff; }
    .drawer-action-btn.return { background:#fff; color:#b45309; border:1px solid #fcd34d; }
    .drawer-status-bar { background:#fff; border-bottom:1px solid #e2e8f0; padding:18px 20px; flex-shrink:0; }
    .drawer-status-no { font-size:13px; color:#64748b; margin-bottom:6px; }
    .drawer-status-title { font-size:22px; font-weight:800; color:#0f172a; margin-bottom:16px; }
    .process-steps { display:flex; align-items:flex-start; gap:0; overflow-x:auto; padding-bottom:4px; }
    .process-step { flex:1; min-width:140px; text-align:center; position:relative; }
    .process-step:not(:last-child)::after { content:''; position:absolute; top:18px; left:55%; width:90%; height:2px; background:#e2e8f0; z-index:0; }
    .process-step.done:not(:last-child)::after { background:#16a34a; }
    .process-icon { width:36px; height:36px; border-radius:50%; background:#f1f5f9; color:#94a3b8; display:inline-flex; align-items:center; justify-content:center; margin:0 auto 8px; position:relative; z-index:1; font-size:14px; }
    .process-step.done .process-icon { background:#dcfce7; color:#16a34a; }
    .process-step.current .process-icon { background:#eff6ff; color:#2563eb; box-shadow:0 0 0 3px #dbeafe; }
    .process-label { font-size:12px; font-weight:700; color:#475569; }
    .process-time { font-size:11px; color:#94a3b8; margin-top:4px; }
    .drawer-body { flex:1; overflow-y:auto; padding:16px 20px 24px; }
    .section-card { background:#fff; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:12px; overflow:hidden; }
    .section-head { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:#f8fafc; cursor:pointer; user-select:none; }
    .section-head-title { font-size:14px; font-weight:800; color:#0f172a; }
    .section-body { padding:16px; border-top:1px solid #f1f5f9; display:none; }
    .section-card.open .section-body { display:block; }
    .section-card.open .section-chevron { transform:rotate(180deg); }
    .section-chevron { transition:transform .2s; color:#94a3b8; }
    .info-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px 24px; font-size:13px; }
    .info-grid .label { color:#64748b; margin-bottom:2px; }
    .info-grid .value { color:#0f172a; font-weight:600; }
    .contract-file-row { display:flex; align-items:center; flex-wrap:wrap; gap:8px 12px; padding:10px 0; border-bottom:1px solid #f1f5f9; }
    .contract-file-row:last-child { border-bottom:none; }
    .file-tag { font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; }
    .file-tag.latest { background:#ecfdf5; color:#047857; }
    .file-tag.voided { background:#f4f4f5; color:#71717a; text-decoration:line-through; }
    .mini-table { width:100%; font-size:12px; border-collapse:collapse; }
    .mini-table th { background:#f8fafc; padding:8px 10px; font-size:12px; }
    .mini-table td { padding:8px 10px; border-bottom:1px solid #f1f5f9; }

    .compliance-overlay { position:fixed; inset:0; background:rgba(15,23,42,.55); z-index:300; display:none; align-items:center; justify-content:center; padding:12px; }
    .compliance-overlay.show { display:flex; }
    .compliance-modal { width:min(1280px,98vw); height:min(88vh,860px); background:#0f172a; border-radius:16px; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 28px 60px rgba(0,0,0,.35); }
    .compliance-head { padding:16px 20px; border-bottom:1px solid rgba(255,255,255,.08); display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-shrink:0; }
    .compliance-head-title { color:#f8fafc; font-size:18px; font-weight:800; }
    .compliance-head-sub { color:#94a3b8; font-size:12px; margin-top:4px; }
    .compliance-close { width:36px; height:36px; border-radius:8px; border:1px solid rgba(255,255,255,.15); background:transparent; color:#cbd5e1; cursor:pointer; flex-shrink:0; }
    .compliance-body { flex:1; display:grid; grid-template-columns:240px 1fr 320px; min-height:0; background:#1e293b; }
    .compliance-col { border-right:1px solid rgba(255,255,255,.06); display:flex; flex-direction:column; min-height:0; }
    .compliance-col:last-child { border-right:none; }
    .compliance-col-head { padding:12px 14px; font-size:13px; font-weight:700; color:#e2e8f0; border-bottom:1px solid rgba(255,255,255,.06); flex-shrink:0; }
    .compliance-col-body { flex:1; overflow-y:auto; padding:12px; }
    .clause-item { display:flex; align-items:center; justify-content:space-between; padding:8px 10px; border-radius:8px; font-size:12px; color:#cbd5e1; cursor:pointer; margin-bottom:4px; }
    .clause-item:hover, .clause-item.active { background:rgba(255,255,255,.08); color:#fff; }
    .clause-risk-count { min-width:20px; height:20px; border-radius:999px; background:#f97316; color:#fff; font-size:11px; font-weight:700; display:inline-flex; align-items:center; justify-content:center; }
    .clause-risk-count.zero { background:#334155; color:#94a3b8; }
    .contract-text-pane { background:#fff; margin:12px; border-radius:10px; padding:16px 18px; overflow-y:auto; flex:1; font-size:13px; line-height:1.75; color:#334155; }
    .contract-text-pane h4 { font-size:14px; font-weight:800; color:#0f172a; margin:16px 0 8px; }
    .contract-text-pane h4:first-child { margin-top:0; }
    .risk-stats { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
    .risk-stat { flex:1; min-width:80px; padding:10px; border-radius:8px; text-align:center; }
    .risk-stat.high { background:rgba(220,38,38,.15); }
    .risk-stat.mid { background:rgba(249,115,22,.15); }
    .risk-stat.low { background:rgba(59,130,246,.15); }
    .risk-stat-num { font-size:20px; font-weight:800; }
    .risk-stat.high .risk-stat-num { color:#f87171; }
    .risk-stat.mid .risk-stat-num { color:#fb923c; }
    .risk-stat.low .risk-stat-num { color:#60a5fa; }
    .risk-stat-label { font-size:11px; color:#94a3b8; margin-top:2px; }
    .risk-card { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:10px; padding:10px 12px; margin-bottom:8px; cursor:pointer; }
    .risk-card.active { border-color:#3b82f6; background:rgba(59,130,246,.12); }
    .risk-card-title { font-size:12px; font-weight:700; color:#f1f5f9; margin-bottom:4px; }
    .risk-card-meta { font-size:11px; color:#94a3b8; }
    .risk-detail-box { margin-top:12px; padding:12px; background:rgba(255,255,255,.04); border-radius:10px; border:1px solid rgba(255,255,255,.08); }
    .risk-detail-box h5 { font-size:12px; font-weight:700; color:#e2e8f0; margin:0 0 8px; }
    .risk-detail-box p { font-size:11px; color:#94a3b8; line-height:1.6; margin:0 0 8px; }
    .compliance-foot { padding:12px 20px; background:#0f172a; border-top:1px solid rgba(255,255,255,.08); display:flex; justify-content:space-between; align-items:center; gap:10px; flex-shrink:0; }
    .compliance-foot .btn { height:36px; padding:0 16px; }
    .compliance-foot-actions { display:flex; gap:10px; flex-shrink:0; }
    .compliance-loading { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#94a3b8; gap:12px; }
    .compliance-loading .ai-spin { width:32px; height:32px; border-width:3px; border-top-color:#3b82f6; }
  </style>
</head>
<body>
  <div class="p-5 max-w-[1680px] mx-auto">
    <div class="page-card p-5 mb-4 flex items-center gap-3">
      <div class="w-12 h-12 rounded-2xl bg-indigo-50 text-indigo-600 flex items-center justify-center"><i class="fas fa-file-signature text-xl"></i></div>
      <h1 class="text-2xl font-bold">合同签署</h1>
    </div>

    <div class="flex gap-1 mb-0 px-1">
      <button type="button" class="hub-tab active" data-hub-tab="templates" onclick="switchHubTab('templates')">合同模板管理</button>
      <button type="button" class="hub-tab" data-hub-tab="signing" onclick="switchHubTab('signing')">合同签署管理</button>
    </div>

    <div class="page-card p-5 border-t-0 rounded-tl-none">
      <div id="hubPane-templates" class="hub-tab-pane active">
        <div class="flex flex-wrap gap-3 mb-4 items-center">
          <button type="button" class="btn btn-primary" onclick="document.getElementById('tplUploadInput').click()"><i class="fas fa-upload mr-1"></i>上传模板</button>
          <input type="file" id="tplUploadInput" class="hidden" accept=".pdf,.doc,.docx" onchange="handleTplUpload(this)">
          <button type="button" class="btn-orange text-sm !h-[36px]" onclick="openAiTplModal()"><i class="fas fa-wand-magic-sparkles mr-1"></i>生成合同</button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr><th>模板名称</th><th>合同来源</th><th>上传/更新日期</th><th>默认模板</th><th>状态</th><th>操作</th></tr></thead>
            <tbody id="tplTableBody"></tbody>
          </table>
        </div>
      </div>

      <div id="hubPane-signing" class="hub-tab-pane">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-5">
          <div class="stat-card"><div><div class="text-sm text-slate-500">合同总数</div><div class="text-3xl font-bold mt-2" id="statTotal">0</div></div><div class="stat-icon bg-slate-100 text-slate-600"><i class="fas fa-layer-group"></i></div></div>
          <div class="stat-card"><div><div class="text-sm text-slate-500">采购单审批中</div><div class="text-3xl font-bold text-slate-700 mt-2" id="statPo">0</div></div><div class="stat-icon bg-slate-50 text-slate-600"><i class="fas fa-clipboard-list"></i></div></div>
          <div class="stat-card"><div><div class="text-sm text-slate-500">待供应商确认</div><div class="text-3xl font-bold text-amber-600 mt-2" id="statSupplier">0</div></div><div class="stat-icon bg-amber-50 text-amber-600"><i class="fas fa-building"></i></div></div>
          <div class="stat-card"><div><div class="text-sm text-slate-500">待处理</div><div class="text-3xl font-bold text-blue-600 mt-2" id="statMine">0</div></div><div class="stat-icon bg-blue-50 text-blue-600"><i class="fas fa-user-check"></i></div></div>
          <div class="stat-card"><div><div class="text-sm text-slate-500">已签署</div><div class="text-3xl font-bold text-green-600 mt-2" id="statSigned">0</div></div><div class="stat-icon bg-green-50 text-green-600"><i class="fas fa-circle-check"></i></div></div>
          <div class="stat-card"><div><div class="text-sm text-slate-500">已作废</div><div class="text-3xl font-bold text-zinc-600 mt-2" id="statVoided">0</div></div><div class="stat-icon bg-zinc-100 text-zinc-600"><i class="fas fa-ban"></i></div></div>
        </div>
        <div class="flex flex-wrap gap-3 mb-4">
          <input id="signKw" class="border border-slate-300 rounded-lg px-3 py-2 text-sm w-64" placeholder="关键词：合同名称" onkeydown="if(event.key==='Enter') renderSigningTable()">
          <select id="signStatus" class="border border-slate-300 rounded-lg px-3 py-2 text-sm">
            <option value="">全部状态</option>
            <option value="po-approving">采购单审批中</option>
            <option value="pending-supplier">待供应商确认</option>
            <option value="pending-confirm">待确认</option>
            <option value="contract-updated">合同更新</option>
            <option value="buyer-returned">采购方退回</option>
            <option value="supplier-returned">供应商退回</option>
            <option value="signed">已签署</option>
            <option value="voided">已作废</option>
          </select>
          <button type="button" class="btn btn-primary" onclick="renderSigningTable()">查询</button>
          <button type="button" class="btn" onclick="resetSigningFilter()">重置</button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr><th>序号</th><th>合同编号</th><th>合同名称</th><th>订单编号</th><th>供应商</th><th>签署状态</th><th>创建时间</th><th>操作</th></tr>
            </thead>
            <tbody id="signTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="aiTplModal" class="modal-overlay" onclick="if(event.target===this) closeAiTplModal()">
    <div class="modal-box ai-gen-modal" onclick="event.stopPropagation()">
      <div class="flex items-center gap-2 text-base font-bold text-slate-900 mb-4"><i class="fa-solid fa-wand-magic-sparkles text-violet-600"></i> AI 生成合同模板</div>
      <div class="flex flex-col sm:flex-row flex-wrap gap-3 items-stretch sm:items-end">
        <select id="aiTplTypeSelect" class="border border-slate-300 rounded-lg px-3 py-2 text-sm min-w-[160px]">
          <option value="">选择合同类型</option>
          <option value="办公用品采购合同">办公用品采购合同</option>
          <option value="IT设备采购合同">IT设备采购合同</option>
          <option value="服务类采购合同">服务类采购合同</option>
          <option value="框架采购协议">框架采购协议</option>
        </select>
        <input type="text" id="aiTplDescInput" class="border border-slate-300 rounded-lg px-3 py-2 text-sm flex-1 min-w-[200px]" placeholder="或输入合同描述...">
        <button type="button" class="btn-orange whitespace-nowrap" onclick="runAiTplGenerate()">生成</button>
      </div>
      <div id="aiTplLoading" class="ai-gen-loading"><span class="ai-spin"></span> AI 正在生成模板...</div>
    </div>
  </div>

  <!-- 退回至供应商 -->
  <div id="returnModal" class="modal-overlay layer-above-drawer" onclick="if(event.target===this) closeReturnModal()">
    <div class="modal-box return-modal" onclick="event.stopPropagation()">
      <div class="text-lg font-bold text-slate-900 mb-2">退回至供应商</div>
      <p class="text-sm text-slate-500 mb-3">请填写退回理由，合同将退回供应商重新处理。</p>
      <label class="block text-sm font-semibold text-slate-700 mb-1">退回理由 <span class="text-red-500">*</span></label>
      <textarea id="returnReason" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm min-h-[100px] mb-4" placeholder="例如：付款条款与采购单约定不一致，请修订后重新提交。"></textarea>
      <div class="flex justify-end gap-2">
        <button type="button" class="btn" onclick="closeReturnModal()">取消</button>
        <button type="button" class="btn btn-danger" onclick="submitReturnToSupplier()">确认退回</button>
      </div>
    </div>
  </div>

  <!-- 合同详情抽屉 -->
  <div id="drawerMask" class="drawer-mask" onclick="closeContractDrawer()"></div>
  <aside id="contractDrawer" class="contract-drawer">
    <div class="drawer-head">
      <div class="drawer-head-row">
        <div class="drawer-title">合同详情</div>
        <button type="button" class="drawer-close" onclick="closeContractDrawer()"><i class="fas fa-xmark"></i></button>
      </div>
      <div id="drawerActions" class="drawer-actions"></div>
    </div>
    <div class="drawer-status-bar">
      <div class="drawer-status-no" id="drawerContractNo">合同编号：—</div>
      <div class="drawer-status-title" id="drawerStatusTitle">—</div>
      <div class="process-steps" id="drawerProcessSteps"></div>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </aside>
  <input type="file" id="contractUploadInput" class="hidden" accept=".pdf,.doc,.docx" onchange="handleContractUpload(this)">

  <!-- 合同合规性校验 -->
  <div id="complianceOverlay" class="compliance-overlay" onclick="if(event.target===this) closeComplianceModal()">
    <div class="compliance-modal" onclick="event.stopPropagation()">
      <div class="compliance-head">
        <div>
          <div class="compliance-head-title"><i class="fas fa-shield-halved mr-2"></i>合同合规性校验</div>
          <div class="compliance-head-sub">结构化解析合同，定位风险，生成可执行修改建议</div>
        </div>
        <button type="button" class="compliance-close" onclick="closeComplianceModal()"><i class="fas fa-xmark"></i></button>
      </div>
      <div class="compliance-body" id="complianceBody">
        <div class="compliance-loading" style="grid-column:1/-1;background:#1e293b;"><span class="ai-spin"></span><span>正在解析合同并检测合规风险…</span></div>
      </div>
      <div class="compliance-foot">
        <button type="button" class="btn btn-primary" onclick="applyComplianceAndSign()">应用合同并签署</button>
        <div class="compliance-foot-actions">

      var items = c.orderItems || [];
      var itemsHtml = items.length ? '<table class="mini-table"><thead><tr><th>序号</th><th>订单编号</th><th>商品名称</th><th>规格型号</th><th>计量单位</th><th>单价</th><th>数量</th><th>小计</th></tr></thead><tbody>' +
        items.map(function (it, idx) { return '<tr><td>' + (idx+1) + '</td><td>' + escapeHtml(it.doc) + '</td><td>' + escapeHtml(it.name) + '</td><td>' + escapeHtml(it.spec) + '</td><td>' + escapeHtml(it.unit) + '</td><td>¥' + escapeHtml(it.price) + '</td><td>' + it.qty + '</td><td>¥' + escapeHtml(it.subtotal) + '</td></tr>'; }).join('') + '</tbody></table>' : '<p class="text-slate-500 text-sm">暂无明细</p>';
      var sections = [
        { title:'01 订单信息', body:'<div class="info-grid"><div><div class="label">订单编号</div><div class="value">' + escapeHtml(c.doc) + '</div></div><div><div class="label">采购单位</div><div class="value">' + escapeHtml(c.buyer) + '</div></div><div><div class="label">供应商名称</div><div class="value">' + escapeHtml(c.vendor) + '</div></div><div><div class="label">收货人</div><div class="value">' + escapeHtml(c.recipient || '—') + '</div></div><div><div class="label">联系电话</div><div class="value">' + escapeHtml(c.phone || '—') + '</div></div><div style="grid-column:1/-1"><div class="label">收货地址</div><div class="value">' + escapeHtml(c.address || '—') + '</div></div></div>' },
        { title:'02 合同信息', body:'<div class="info-grid mb-3"><div><div class="label">合同名称</div><div class="value">' + escapeHtml(c.name) + '</div></div><div><div class="label">商品总价</div><div class="value">' + escapeHtml((c.orderAmt || '').replace('¥','') || '—') + '</div></div><div><div class="label">币种</div><div class="value">' + escapeHtml(c.currency || '人民币') + '</div></div></div><div class="label mb-2" style="color:#64748b;font-weight:600;font-size:13px">合同文件</div>' + renderContractFilesHtml(c.contractFiles) },
        { title:'03 订单明细', body: itemsHtml },
        { title:'04 处理历史', body:'<table class="mini-table"><thead><tr><th>步骤</th><th>办理人</th><th>创建时间</th><th>被处理时间</th><th>处理意见</th></tr></thead><tbody>' + ((c.history && c.history.length) ? c.history.map(function (h) { return '<tr><td>' + escapeHtml(h.step) + '</td><td>' + escapeHtml(h.actor) + '</td><td>' + escapeHtml(h.created) + '</td><td>' + escapeHtml(h.processed) + '</td><td>' + escapeHtml(h.opinion) + '</td></tr>'; }).join('') : '<tr><td colspan="5" class="text-center text-slate-400 py-6">暂无数据</td></tr>') + '</tbody></table>' }
      ];
      return sections.map(function (sec, idx) {
        return '<div class="section-card' + (idx === 0 ? ' open' : '') + '" onclick="toggleSection(this, event)"><div class="section-head"><span class="section-head-title">' + sec.title + '</span><i class="fas fa-chevron-down section-chevron"></i></div><div class="section-body">' + sec.body + '</div></div>';
      }).join('');
    }

    function toggleSection(el, ev) { if (ev.target.closest('.btn-link')) return; el.classList.toggle('open'); }

    function renderBuyerDrawerActions(c) {
      var mode = buyerDrawerMode(c);
      var actionsEl = document.getElementById('drawerActions');
      if (!mode || drawerMode !== 'process') {
        actionsEl.innerHTML = '';
        actionsEl.style.display = 'none';
        return;
      }
      var html = '';
      if (mode === 'full') {
        html += '<button type="button" class="drawer-action-btn confirm" onclick="doConfirmSign()"><i class="fas fa-check"></i>确认签署</button>';
      }
      html += '<button type="button" class="drawer-action-btn upload" onclick="triggerContractUpload()"><i class="fas fa-file-contract"></i>更新合同</button>';
      html += '<button type="button" class="drawer-action-btn return" onclick="openReturnModal()"><i class="fas fa-rotate-left"></i>退回</button>';
      actionsEl.innerHTML = html;
      actionsEl.style.display = 'flex';
    }

    function refreshContractDrawer() {
      var c = getContract(drawerContractId);
      if (!c) return;
      document.getElementById('drawerContractNo').textContent = '合同编号：' + c.id;
      document.getElementById('drawerStatusTitle').textContent = buyerFacingLabel(c);
      document.getElementById('drawerProcessSteps').innerHTML = renderProcessSteps(c);
      document.getElementById('drawerBody').innerHTML = renderDrawerSections(c);
      renderBuyerDrawerActions(c);
    }

    function openContractDrawer(contractId, mode) {
      var c = getContract(contractId);
      if (!c) return;
      drawerContractId = contractId;
      drawerMode = mode || 'view';
      refreshContractDrawer();
      document.getElementById('drawerMask').classList.add('show');
      document.getElementById('contractDrawer').classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeContractDrawer() {
      document.getElementById('drawerMask').classList.remove('show');
      document.getElementById('contractDrawer').classList.remove('show');
      document.body.style.overflow = '';
      drawerContractId = '';
    }

    function doConfirmSign() {
      var c = getContract(drawerContractId);
      if (!c || buyerDrawerMode(c) !== 'full') return;
      if (!confirm('确认签署合同「' + c.name + '」？')) return;
      var now = new Date().toISOString().slice(0,19).replace('T',' ');
      c.status = 'signed'; c.label = '已签署';
      if (!c.history) c.history = [];
      c.history.unshift({ step:'采购方确认签署', actor:'采购方', created: now, processed: now, opinion:'确认签署，合同生效' });
      persistSigning(); closeContractDrawer(); renderSigningTable();
      alert('已确认签署（原型演示）。');
    }

    function openReturnModal() {
      document.getElementById('returnReason').value = '';
      document.getElementById('returnModal').classList.add('show');
      setTimeout(function () { document.getElementById('returnReason').focus(); }, 80);
    }
    function closeReturnModal() {
      document.getElementById('returnModal').classList.remove('show');
    }

    function submitReturnToSupplier() {
      var reason = document.getElementById('returnReason').value.trim();
      if (!reason) { alert('请填写退回理由'); return; }
      var c = getContract(drawerContractId);
      if (!c || !buyerNeedsProcess(c)) { closeReturnModal(); return; }
      if (!confirm('确认退回合同「' + c.name + '」至供应商？')) return;
      var now = new Date().toISOString().slice(0,19).replace('T',' ');
      c.status = 'buyer-returned'; c.label = '采购方退回';
      if (!c.history) c.history = [];
      c.history.unshift({ step:'采购方退回', actor:'采购方', created: now, processed: now, opinion: reason });
      persistSigning(); closeReturnModal(); closeContractDrawer(); renderSigningTable();
      alert('已退回至供应商（原型演示）。');
    }

    function triggerContractUpload() { document.getElementById('contractUploadInput').click(); }
    function handleContractUpload(inp) {
      var f = inp.files && inp.files[0];
      if (!f) return;
      pendingUploadFileName = f.name; inp.value = '';
      openComplianceModal();
    }

    function openComplianceModal() {
      document.getElementById('complianceBody').innerHTML = '<div class="compliance-loading" style="grid-column:1/-1;background:#1e293b;"><span class="ai-spin"></span><span>正在解析合同并检测合规风险…</span></div>';
      document.getElementById('complianceOverlay').classList.add('show');
      setTimeout(function () { renderComplianceContent(); }, 1800);
    }
    function closeComplianceModal() { document.getElementById('complianceOverlay').classList.remove('show'); }

    function cancelCompliance() {
      pendingUploadFileName = '';
      closeComplianceModal();
    }

    function reuploadCompliance() {
      closeComplianceModal();
      pendingUploadFileName = '';
      setTimeout(function () { triggerContractUpload(); }, 200);
    }

    function renderComplianceContent() {
      var high = complianceRisks.filter(function (r) { return r.level === '高风险'; }).length;
      var mid = complianceRisks.filter(function (r) { return r.level === '中风险'; }).length;
      var low = complianceRisks.filter(function (r) { return r.level === '低风险'; }).length;
      var selected = complianceRisks.find(function (r) { return r.id === selectedRiskId; }) || complianceRisks[0];
      var clauseHtml = complianceClauses.map(function (cl) {
        var cnt = complianceRisks.filter(function (r) { return r.clause === '第' + cl.id + '条'; }).length;
        return '<div class="clause-item' + (cl.id === selectedClauseId ? ' active' : '') + '" onclick="selectComplianceClause(' + cl.id + ')"><span>' + escapeHtml(cl.title) + '</span><span class="clause-risk-count' + (cnt ? '' : ' zero') + '">' + cnt + '</span></div>';
      }).join('');
      var riskCards = complianceRisks.map(function (r) {
        return '<div class="risk-card' + (r.id === selectedRiskId ? ' active' : '') + '" onclick="selectComplianceRisk(\'' + r.id + '\')"><div class="risk-card-title">' + escapeHtml(r.title) + '</div><div class="risk-card-meta">' + escapeHtml(r.level) + ' · ' + escapeHtml(r.type) + '</div></div>';
      }).join('');
      document.getElementById('complianceBody').innerHTML =
        '<div class="compliance-col"><div class="compliance-col-head">合同结构</div><div class="compliance-col-body"><div style="font-size:11px;color:#94a3b8;margin-bottom:10px;">' + escapeHtml(pendingUploadFileName || '上传合同') + '</div>' + clauseHtml + '</div></div>' +
        '<div class="compliance-col" style="background:#334155;"><div class="compliance-col-head">合同正文</div><div class="contract-text-pane"><h4>采购合同</h4><p>甲方（采购方）与乙方（供应商）就采购事宜达成如下协议：</p><h4>第3条 质量标准</h4><p>产品质量应符合<strong>行业标准</strong>及国家相关规范。</p><h4>第5条 付款方式</h4><p>甲方于合同签订后支付 50% 预付款，验收合格后支付剩余款项。</p><h4>第7条 售后服务</h4><p>乙方提供产品质保服务，具体响应时限双方另行约定。</p></div></div>' +
        '<div class="compliance-col"><div class="compliance-col-head">风险处理</div><div class="compliance-col-body"><div class="risk-stats"><div class="risk-stat high"><div class="risk-stat-num">' + high + '</div><div class="risk-stat-label">高风险</div></div><div class="risk-stat mid"><div class="risk-stat-num">' + mid + '</div><div class="risk-stat-label">中风险</div></div><div class="risk-stat low"><div class="risk-stat-num">' + low + '</div><div class="risk-stat-label">低风险</div></div></div>' + riskCards +
        '<div class="risk-detail-box"><h5>' + escapeHtml(selected.title) + '</h5><p><strong>条款：</strong>' + escapeHtml(selected.clause) + '</p><p><strong>风险描述：</strong>' + escapeHtml(selected.desc) + '</p><p><strong>修改建议：</strong>' + escapeHtml(selected.suggestion) + '</p></div></div></div>';
    }
    function selectComplianceClause(id) { selectedClauseId = id; var hit = complianceRisks.find(function (r) { return r.clause === '第' + id + '条'; }); if (hit) selectedRiskId = hit.id; renderComplianceContent(); }
    function selectComplianceRisk(id) { selectedRiskId = id; renderComplianceContent(); }

    function applyComplianceAndSign() {
      var c = getContract(drawerContractId);
      if (!c || !pendingUploadFileName) { closeComplianceModal(); return; }
      var now = new Date().toISOString().slice(0,19).replace('T',' ');
      var files = c.contractFiles || [];
      files.forEach(function (f) { if (f.status === 'latest') { f.status = 'voided'; f.tag = '作废'; } });
      files.unshift({ id:'f' + Date.now(), name: pendingUploadFileName, tag:'最新', status:'latest', uploadedAt: now });
      c.contractFiles = files;
      if (!c.history) c.history = [];
      var canSign = buyerDrawerMode(c) === 'full';
      if (canSign) {
        c.status = 'signed';
        c.label = '已签署';
        c.history.unshift({ step:'应用合同并签署', actor:'采购方', created: now, processed: now, opinion:'上传新版合同并通过合规性校验（检出 ' + complianceRisks.length + ' 项风险，已阅），确认签署' });
        persistSigning();
        closeComplianceModal();
        pendingUploadFileName = '';
        closeContractDrawer();
        renderSigningTable();
        alert('已应用新版合同并确认签署（原型演示）。');
      } else {
        c.status = 'contract-updated';
        c.label = '合同更新';
        c.lastUpdatedBy = 'buyer';
        c.history.unshift({ step:'更新合同', actor:'采购方', created: now, processed: now, opinion:'上传新版合同并通过合规性校验（检出 ' + complianceRisks.length + ' 项风险，已阅）' });
        persistSigning();
        closeComplianceModal();
        pendingUploadFileName = '';
        if (document.getElementById('contractDrawer').classList.contains('show')) refreshContractDrawer();
        renderSigningTable();
        alert('已应用新版合同（原型演示），状态为「合同更新」，待供应商处理。');
      }
    }

    function deleteSigning(contractId) {
      var c = getContract(contractId);
      if (!c || c.status !== 'voided') return;
      if (!confirm('确认从列表中删除该作废合同记录？')) return;
      signingContracts = signingContracts.filter(function (x) { return x.id !== contractId; });
      persistSigning(); renderSigningTable();
    }

    (function init() {
      var tab = sessionStorage.getItem('buyerContractHubTab') || 'signing';
      switchHubTab(tab);
      renderTemplates();
      renderSigningTable();
      var params = new URLSearchParams(location.search);
      var openId = params.get('id');
      var action = params.get('action') || 'view';
      if (openId) {
        setTimeout(function () {
          openContractDrawer(openId, action === 'process' ? 'process' : 'view');
          history.replaceState(null, '', location.pathname);
        }, 120);
      }
    })();
  </script>
</body>
</html>
