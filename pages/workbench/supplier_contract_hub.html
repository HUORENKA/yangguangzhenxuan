<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合同签署 | 供应商工作台</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background:#f8fafc; color:#0f172a; }
    .page-card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; box-shadow:0 8px 20px rgba(15,23,42,.04); }
    .stat-card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:18px; display:flex; align-items:center; justify-content:space-between; }
    .stat-icon { width:44px; height:44px; border-radius:14px; display:flex; align-items:center; justify-content:center; }
    .badge { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700; }
    .b-warn { background:#fffbeb; color:#b45309; }
    .b-blue { background:#eff6ff; color:#1d4ed8; }
    .b-green { background:#ecfdf5; color:#047857; }
    .b-muted { background:#f4f4f5; color:#52525b; }
    .b-violet { background:#f5f3ff; color:#6d28d9; }
    .b-slate { background:#f1f5f9; color:#475569; }
    .btn { height:32px; padding:0 12px; border-radius:8px; font-size:12px; font-weight:700; border:1px solid #dbe2ea; background:#fff; color:#475569; cursor:pointer; }
    .btn-primary { background:#4f46e5; border-color:#4f46e5; color:#fff; }
    .btn-danger { background:#fef2f2; border-color:#fecaca; color:#b91c1c; }
    .btn-orange { background:linear-gradient(135deg,#ff7a18,#ff4d00); border:none; color:#fff; height:38px; padding:0 18px; font-weight:700; border-radius:8px; cursor:pointer; }
    .btn:disabled { opacity:.45; cursor:not-allowed; }
    th { background:#f8fafc; color:#64748b; font-size:13px; font-weight:700; }
    td, th { padding:12px 14px; border-bottom:1px solid #f1f5f9; text-align:left; }
    .hub-tab { padding:8px 16px; border-radius:10px 10px 0 0; font-size:14px; font-weight:700; border:1px solid transparent; border-bottom:none; cursor:pointer; background:#f1f5f9; color:#64748b; }
    .hub-tab.active { background:#fff; color:#ea580c; border-color:#e2e8f0; border-bottom-color:#fff; margin-bottom:-1px; position:relative; z-index:1; }
    .hub-tab-pane { display:none; }
    .hub-tab-pane.active { display:block; }
    .modal-overlay { position:fixed; inset:0; background:rgba(15,23,42,.45); z-index:100; display:none; align-items:center; justify-content:center; padding:16px; }
    .modal-overlay.show { display:flex; }
    .modal-box { background:#fff; border-radius:14px; max-width:440px; width:100%; padding:20px; box-shadow:0 22px 48px rgba(15,23,42,.2); }
    .reject-modal { max-width:min(92vw,560px); }
    .reject-update-panel { display:none; margin-top:12px; border:1px dashed #cbd5e1; border-radius:12px; padding:12px; background:#fafafa; }
    .reject-update-panel.show { display:block; }
    .reject-method-pane { display:none; }
    .reject-method-pane.active { display:block; }
    .modal-box.ai-gen-modal { max-width:min(92vw,800px); padding:22px 24px; }
    .ai-gen-loading { display:none; margin-top:12px; font-size:13px; color:#64748b; align-items:center; gap:8px; }
    .ai-gen-loading.show { display:flex; }
    .ai-spin { width:16px; height:16px; border:2px solid #e2e8f0; border-top-color:#ff6a00; border-radius:50%; animation:spin .75s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="p-5 max-w-[1680px] mx-auto">
    <div class="page-card p-5 mb-4 flex items-center gap-3">
      <div class="w-12 h-12 rounded-2xl bg-indigo-50 text-indigo-600 flex items-center justify-center"><i class="fas fa-file-signature text-xl"></i></div>
      <h1 class="text-2xl font-bold">合同签署</h1>
    </div>

    <div class="flex gap-1 mb-0 px-1">
      <button type="button" class="hub-tab active" data-hub-tab="templates" onclick="switchHubTab('templates')">合同模板管理</button>
      <button type="button" class="hub-tab" data-hub-tab="signing" onclick="switchHubTab('signing')">合同签署管理</button>
    </div>

    <div class="page-card p-5 border-t-0 rounded-tl-none">
      <div id="hubPane-templates" class="hub-tab-pane active">
        <div class="flex flex-wrap gap-3 mb-4 items-center">
          <button type="button" class="btn btn-primary" onclick="document.getElementById('tplUploadInput').click()"><i class="fas fa-upload mr-1"></i>上传模板</button>
          <input type="file" id="tplUploadInput" class="hidden" accept=".pdf,.doc,.docx" onchange="handleTplUpload(this)">
          <button type="button" class="btn-orange text-sm !h-[36px]" onclick="openAiTplModal()"><i class="fas fa-wand-magic-sparkles mr-1"></i>生成合同</button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr><th>模板名称</th><th>合同来源</th><th>上传/更新日期</th><th>默认模板</th><th>状态</th><th>操作</th></tr>
            </thead>
            <tbody id="tplTableBody"></tbody>
          </table>
        </div>
      </div>

      <div id="hubPane-signing" class="hub-tab-pane">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5">
          <div class="stat-card"><div><div class="text-sm text-slate-500">合同总数</div><div class="text-3xl font-bold mt-2" id="statTotal">0</div></div><div class="stat-icon bg-slate-100 text-slate-600"><i class="fas fa-layer-group"></i></div></div>
          <div class="stat-card"><div><div class="text-sm text-slate-500">待我方确认</div><div class="text-3xl font-bold text-amber-600 mt-2" id="statMine">0</div></div><div class="stat-icon bg-amber-50 text-amber-600"><i class="fas fa-building"></i></div></div>
          <div class="stat-card"><div><div class="text-sm text-slate-500">待采购方确认</div><div class="text-3xl font-bold text-blue-600 mt-2" id="statBuyer">0</div></div><div class="stat-icon bg-blue-50 text-blue-600"><i class="fas fa-user-check"></i></div></div>
          <div class="stat-card"><div><div class="text-sm text-slate-500">已签署</div><div class="text-3xl font-bold text-green-600 mt-2" id="statSigned">0</div></div><div class="stat-icon bg-green-50 text-green-600"><i class="fas fa-circle-check"></i></div></div>
        </div>
        <div class="flex flex-wrap gap-3 mb-4">
          <input id="signKw" class="border border-slate-300 rounded-lg px-3 py-2 text-sm w-64" placeholder="关键词：合同编号 / 名称 / 采购单位" onkeydown="if(event.key==='Enter') renderSigningTable()">
          <select id="signStatus" class="border border-slate-300 rounded-lg px-3 py-2 text-sm">
            <option value="">全部状态</option>
            <option value="pending-supplier">待我方确认</option>
            <option value="pending-confirm">待采购方确认</option>
            <option value="signed">已签署</option>
          </select>
          <button type="button" class="btn btn-primary" onclick="renderSigningTable()">查询</button>
          <button type="button" class="btn" onclick="resetSigningFilter()">重置</button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr><th>合同编号</th><th>合同名称</th><th>采购单位</th><th>关联单据</th><th>状态</th><th>发起时间</th><th>操作</th></tr>
            </thead>
            <tbody id="signTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="aiTplModal" class="modal-overlay" onclick="if(event.target===this) closeAiTplModal()">
    <div class="modal-box ai-gen-modal" onclick="event.stopPropagation()">
      <div class="flex items-center gap-2 text-base font-bold text-slate-900 mb-4">
        <i class="fa-solid fa-wand-magic-sparkles text-violet-600"></i>
        AI 生成合同模板
      </div>
      <div class="flex flex-col sm:flex-row flex-wrap gap-3 items-stretch sm:items-end">
        <select id="aiTplTypeSelect" class="border border-slate-300 rounded-lg px-3 py-2 text-sm min-w-[160px] flex-shrink-0">
          <option value="">选择合同类型</option>
          <option value="办公用品采购合同">办公用品采购合同</option>
          <option value="IT设备采购合同">IT设备采购合同</option>
          <option value="服务类采购合同">服务类采购合同</option>
          <option value="框架采购协议">框架采购协议</option>
        </select>
        <input type="text" id="aiTplDescInput" class="border border-slate-300 rounded-lg px-3 py-2 text-sm flex-1 min-w-[200px]" placeholder="或输入合同描述...">
        <button type="button" class="btn-orange whitespace-nowrap" onclick="runAiTplGenerate()">生成</button>
      </div>
      <div id="aiTplLoading" class="ai-gen-loading"><span class="ai-spin"></span> AI 正在生成模板...</div>
    </div>
  </div>

  <div id="supplierRejectModal" class="modal-overlay" onclick="if(event.target===this) closeSupplierRejectModal()">
    <div class="modal-box reject-modal" onclick="event.stopPropagation()">
      <div class="text-lg font-bold text-slate-900 mb-2">退回合同</div>
      <p class="text-sm text-slate-500 mb-3">请核对下方「当前合同」信息。如需替换合同文本，可在该卡片内展开「更新合同」，从平台选用（支持预览）或上传新版本；然后填写退回理由。</p>
      <div class="rounded-lg border border-slate-200 bg-slate-50 p-3 mb-4">
        <div class="text-xs font-bold uppercase tracking-wide text-slate-500 mb-2">当前合同</div>
        <div id="supRejContractSummary" class="text-sm"></div>
        <div class="mt-3 pt-3 border-t border-slate-200">
          <button type="button" id="supRejToggleUpdateBtn" class="btn btn-primary" onclick="toggleSupRejUpdatePanel()"><i class="fas fa-file-contract mr-1"></i>更新合同</button>
          <div id="supRejUpdatePanel" class="reject-update-panel">
            <div class="text-sm font-semibold text-slate-800 mb-2">请选择更新方式</div>
            <div class="flex flex-wrap gap-2 mb-3">
              <button type="button" id="supRejMethodSystem" class="btn btn-primary" onclick="setSupRejUpdateMethod('system')">从系统选择</button>
              <button type="button" id="supRejMethodUpload" class="btn" onclick="setSupRejUpdateMethod('upload')">上传合同</button>
            </div>
            <div id="supRejPaneSystem" class="reject-method-pane active">
              <label class="block text-xs font-semibold text-slate-600 mb-1">平台内已有合同或模板</label>
              <div class="flex flex-wrap gap-2 items-stretch">
                <select id="supRejSystemSelect" class="flex-1 min-w-[200px] border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white" onchange="onSupRejSystemSelectChange()"></select>
                <button type="button" id="supRejSystemPreviewBtn" class="btn whitespace-nowrap self-center" onclick="previewSupRejSystemSelection()" disabled>预览</button>
              </div>
            </div>
            <div id="supRejPaneUpload" class="reject-method-pane">
              <input type="file" id="supRejUploadInput" class="hidden" accept=".pdf,.doc,.docx" onchange="handleSupRejUpload(this)">
              <button type="button" class="btn" onclick="document.getElementById('supRejUploadInput').click()"><i class="fas fa-folder-open mr-1"></i>选择文件</button>
              <span id="supRejUploadFileName" class="text-sm text-slate-600 ml-2 align-middle"></span>
              <p class="text-xs text-slate-500 mt-2 mb-0">支持 PDF、Word（.doc / .docx）。提交后将作为修订稿通知对方。</p>
            </div>
          </div>
        </div>
      </div>
      <label class="block text-sm font-semibold text-slate-700 mb-1">退回理由 <span class="text-red-500">*</span></label>
      <textarea id="supRejReason" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm min-h-[100px] mb-4" placeholder="例如：条款与采购单约定不一致，请修订后重新提交。"></textarea>
      <div class="flex justify-end gap-2">
        <button type="button" class="btn" onclick="closeSupplierRejectModal()">取消</button>
        <button type="button" class="btn btn-danger" onclick="submitSupplierReject()">确认退回</button>
      </div>
    </div>
  </div>

  <script>
    var tplSeed = 100;
    var defaultTemplates = [
      { id:'t1', name:'办公耗材采购合同（默认）', source:'upload', updated:'2026-01-20', isDefault:true, enabled:true },
      { id:'t2', name:'IT设备采购合同模板', source:'upload', updated:'2026-02-08', isDefault:false, enabled:true },
      { id:'t3', name:'采购框架协议模板（通用）', source:'ai', updated:'2026-03-12', isDefault:false, enabled:true }
    ];
    var templates = [];

    function normalizeTpl(row) {
      if (!row.source) row.source = 'upload';
      return row;
    }

    function loadTemplatesFromStorage() {
      try {
        var raw = sessionStorage.getItem('buyerContractTplMock');
        if (raw) return JSON.parse(raw).map(normalizeTpl);
      } catch (e) {}
      return defaultTemplates.map(function (x) { return Object.assign({}, x); }).map(normalizeTpl);
    }

    function persistTemplates() {
      try { sessionStorage.setItem('buyerContractTplMock', JSON.stringify(templates)); } catch (e) {}
    }

    var signingContractsDefaults = [
      { id:'HT20260427001', name:'商用台式机采购合同', vendor:'北京联想直营科技', buyer:'北京市海淀区政务服务中心', doc:'ORD20260427008', status:'pending-confirm', label:'待确认', started:'2026-04-27 09:30', orderSummary:'联想台式机 ×5 · 订单待发货', orderAmt:'¥52,990' },
      { id:'HT20260426018', name:'网络设备供货合同', vendor:'新华三官方旗舰店', buyer:'北京市海淀区政务服务中心', doc:'ORD20260426021', status:'pending-supplier', label:'待供应商确认', started:'2026-04-26 14:20', orderSummary:'交换机 ×2 · 已下单', orderAmt:'¥6,495' },
      { id:'HT20260425003', name:'机房布线施工合同', vendor:'中通服建设有限公司', buyer:'朝阳区信息化管理中心', doc:'PO20260425003', status:'po-approving', label:'采购单审批中', started:'2026-04-25 11:05', orderSummary:'布线工程 · 采购单审核中', orderAmt:'¥128,000' },
      { id:'HT20260421006', name:'办公耗材年度框架合同', vendor:'浙江得力办公用品有限公司', buyer:'北京市海淀区政务服务中心', doc:'PO20260421006', status:'signed', label:'已签署', started:'2026-04-21 16:00', orderSummary:'框架协议 · 关联多笔订单', orderAmt:'—' },
      { id:'HT20260418009', name:'物业服务补充协议', vendor:'绿城服务集团', buyer:'北京市海淀区政务服务中心', doc:'PO20260418009', status:'voided', label:'已作废', started:'2026-04-18 10:12', orderSummary:'物业服务 · 已终止', orderAmt:'—' },
      { id:'HT20260415002', name:'会议室改造工程合同', vendor:'中建装饰工程有限公司', buyer:'北京市财政局采购中心', doc:'PO20260415002', status:'pending-confirm', label:'待确认', started:'2026-04-15 08:45', orderSummary:'改造工程一期 · 待入场', orderAmt:'¥386,000' }
    ];

    var signingContracts = [];

    function normalizeSigning(row) {
      if (!row.buyer) row.buyer = '北京市海淀区政务服务中心';
      return row;
    }

    function loadSigningFromStorage() {
      try {
        var saved = sessionStorage.getItem('buyerContractSigningMock');
        if (saved) return JSON.parse(saved).map(normalizeSigning);
      } catch (e) {}
      return signingContractsDefaults.map(function (x) { return Object.assign({}, x); }).map(normalizeSigning);
    }

    function persistSigning() {
      try { sessionStorage.setItem('buyerContractSigningMock', JSON.stringify(signingContracts)); } catch (e) {}
    }

    templates = loadTemplatesFromStorage();
    signingContracts = loadSigningFromStorage();

    function switchHubTab(key) {
      document.querySelectorAll('.hub-tab').forEach(function (b) { b.classList.toggle('active', b.getAttribute('data-hub-tab') === key); });
      document.querySelectorAll('.hub-tab-pane').forEach(function (p) { p.classList.remove('active'); });
      var pane = document.getElementById('hubPane-' + key);
      if (pane) pane.classList.add('active');
      try { sessionStorage.setItem('supplierContractHubTab', key); } catch (e) {}
    }

    function supplierVisible(c) {
      return c.status !== 'po-approving' && c.status !== 'voided';
    }

    function supplierFacingLabel(c) {
      if (c.status === 'pending-supplier') return '待我方确认';
      if (c.status === 'pending-confirm') return '待采购方确认';
      return c.label;
    }

    function badgeClass(st) {
      if (st === 'pending-supplier') return 'b-warn';
      if (st === 'pending-confirm') return 'b-blue';
      if (st === 'signed') return 'b-green';
      return 'b-muted';
    }

    function sourceBadge(src) {
      if (src === 'ai') return '<span class="badge b-violet">AI生成</span>';
      return '<span class="badge b-slate">用户上传</span>';
    }

    function renderTemplates() {
      var tbody = document.getElementById('tplTableBody');
      if (!tbody) return;
      tbody.innerHTML = templates.map(function (t) {
        var def = t.isDefault ? '<span class="badge b-green">是</span>' : '<span class="text-slate-400">否</span>';
        var st = t.enabled ? '<span class="badge b-blue">启用</span>' : '<span class="badge b-muted">停用</span>';
        return '<tr><td class="font-semibold">' + escapeHtml(t.name) + '</td><td>' + sourceBadge(t.source) + '</td><td>' + escapeHtml(t.updated) + '</td><td>' + def + '</td><td>' + st + '</td><td class="space-x-1 whitespace-nowrap">' +
          '<button type="button" class="btn" onclick="renameTpl(\'' + t.id + '\')">重命名</button>' +
          '<button type="button" class="btn" onclick="previewTpl(\'' + t.id + '\')">预览</button>' +
          '<button type="button" class="btn" onclick="downloadTpl(\'' + t.id + '\')">下载</button>' +
          (!t.isDefault ? '<button type="button" class="btn btn-primary" onclick="setDefaultTpl(\'' + t.id + '\')">设为默认</button>' : '') +
          '<button type="button" class="btn btn-danger" onclick="deleteTpl(\'' + t.id + '\')">删除</button>' +
          '</td></tr>';
      }).join('');
    }

    function escapeHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function handleTplUpload(inp) {
      var f = inp.files && inp.files[0];
      if (!f) return;
      var name = f.name.replace(/\.\w+$/, '');
      templates.unshift({ id:'t' + (++tplSeed), name:name || '未命名模板', source:'upload', updated:new Date().toISOString().slice(0,10), isDefault:false, enabled:true });
      inp.value = '';
      persistTemplates();
      renderTemplates();
      alert('已添加模板（原型）：' + name);
    }

    function openAiTplModal() {
      document.getElementById('aiTplModal').classList.add('show');
      document.getElementById('aiTplLoading').classList.remove('show');
      document.getElementById('aiTplDescInput').value = '';
      document.getElementById('aiTplTypeSelect').value = '';
    }
    function closeAiTplModal() {
      document.getElementById('aiTplModal').classList.remove('show');
      document.getElementById('aiTplLoading').classList.remove('show');
    }

    function runAiTplGenerate() {
      var type = document.getElementById('aiTplTypeSelect').value.trim();
      var txt = document.getElementById('aiTplDescInput').value.trim();
      if (!type && !txt) {
        alert('请先选择合同类型或输入描述');
        return;
      }
      var loading = document.getElementById('aiTplLoading');
      loading.classList.add('show');
      var base = type || txt.slice(0, 14);
      setTimeout(function () {
        loading.classList.remove('show');
        var name = 'AI生成_' + base.replace(/\s/g,'').slice(0, 18) + '_模板';
        templates.unshift({ id:'t' + (++tplSeed), name:name, source:'ai', updated:new Date().toISOString().slice(0,10), isDefault:false, enabled:true });
        persistTemplates();
        renderTemplates();
        closeAiTplModal();
        alert('已生成模板（原型）：' + name);
      }, 1600);
    }

    function renameTpl(id) {
      var t = templates.find(function (x) { return x.id === id; });
      if (!t) return;
      var next = window.prompt('请输入新的模板名称', t.name || '');
      if (next === null) return;
      next = String(next).trim();
      if (!next) {
        alert('模板名称不能为空');
        return;
      }
      t.name = next;
      t.updated = new Date().toISOString().slice(0, 10);
      persistTemplates();
      renderTemplates();
    }

    function previewTpl(id) {
      var t = templates.find(function (x) { return x.id === id; });
      if (t) alert('预览模板：' + t.name);
    }
    function downloadTpl(id) {
      var t = templates.find(function (x) { return x.id === id; });
      if (t) alert('下载模板：' + t.name);
    }
    function setDefaultTpl(id) {
      templates.forEach(function (x) { x.isDefault = (x.id === id); });
      persistTemplates();
      renderTemplates();
    }
    function deleteTpl(id) {
      if (!confirm('确认删除该模板？')) return;
      templates = templates.filter(function (x) { return x.id !== id; });
      persistTemplates();
      renderTemplates();
    }

    function visibleSupplierContracts() {
      return signingContracts.filter(supplierVisible);
    }

    function updateSigningStats() {
      var list = visibleSupplierContracts();
      document.getElementById('statTotal').textContent = String(list.length);
      document.getElementById('statMine').textContent = String(list.filter(function (c) { return c.status === 'pending-supplier'; }).length);
      document.getElementById('statBuyer').textContent = String(list.filter(function (c) { return c.status === 'pending-confirm'; }).length);
      document.getElementById('statSigned').textContent = String(list.filter(function (c) { return c.status === 'signed'; }).length);
    }

    var supplierRejectTargetId = '';
    var supRejUpdateMethod = 'system';

    function fillSupRejContractSummary() {
      var el = document.getElementById('supRejContractSummary');
      var c = signingContracts.find(function (x) { return x.id === supplierRejectTargetId; });
      if (!el) return;
      if (!c) {
        el.innerHTML = '<p class="text-slate-500 m-0">未找到合同信息</p>';
        return;
      }
      el.innerHTML =
        '<div class="grid grid-cols-1 sm:grid-cols-2 gap-x-4 gap-y-2">' +
        '<div><span class="text-slate-500">合同编号</span><span class="font-semibold text-slate-900 ml-2">' + escapeHtml(c.id) + '</span></div>' +
        '<div><span class="text-slate-500">状态</span><span class="ml-2">' + escapeHtml(supplierFacingLabel(c)) + '</span></div>' +
        '<div class="sm:col-span-2"><span class="text-slate-500">合同名称</span><span class="font-semibold text-slate-900 ml-2">' + escapeHtml(c.name) + '</span></div>' +
        '<div><span class="text-slate-500">供应商</span><span class="ml-2">' + escapeHtml(c.vendor) + '</span></div>' +
        '<div><span class="text-slate-500">关联单据</span><span class="ml-2">' + escapeHtml(c.doc) + '</span></div>' +
        '</div>';
    }

    function resetSupRejUpdatePanel() {
      supRejUpdateMethod = 'system';
      var panel = document.getElementById('supRejUpdatePanel');
      var btn = document.getElementById('supRejToggleUpdateBtn');
      if (panel) panel.classList.remove('show');
      if (btn) btn.innerHTML = '<i class="fas fa-file-contract mr-1"></i>更新合同';
      var sel = document.getElementById('supRejSystemSelect');
      if (sel) sel.innerHTML = '';
      var inp = document.getElementById('supRejUploadInput');
      if (inp) inp.value = '';
      var fn = document.getElementById('supRejUploadFileName');
      if (fn) fn.textContent = '';
      setSupRejUpdateMethod('system');
      onSupRejSystemSelectChange();
    }

    function toggleSupRejUpdatePanel() {
      var panel = document.getElementById('supRejUpdatePanel');
      var btn = document.getElementById('supRejToggleUpdateBtn');
      if (!panel || !btn) return;
      var opening = !panel.classList.contains('show');
      templates = loadTemplatesFromStorage();
      if (opening) {
        panel.classList.add('show');
        btn.innerHTML = '<i class="fas fa-chevron-up mr-1"></i>收起更新';
        populateSupRejSystemSelect();
        setSupRejUpdateMethod('system');
      } else {
        panel.classList.remove('show');
        btn.innerHTML = '<i class="fas fa-file-contract mr-1"></i>更新合同';
        var sel = document.getElementById('supRejSystemSelect');
        if (sel) sel.innerHTML = '';
        var inp = document.getElementById('supRejUploadInput');
        if (inp) inp.value = '';
        var fn = document.getElementById('supRejUploadFileName');
        if (fn) fn.textContent = '';
        onSupRejSystemSelectChange();
      }
    }

    function populateSupRejSystemSelect() {
      var sel = document.getElementById('supRejSystemSelect');
      if (!sel) return;
      sel.innerHTML = '<option value="">请选择平台内的合同或模板…</option>';
      signingContracts.forEach(function (sc) {
        if (!supplierVisible(sc)) return;
        if (sc.id === supplierRejectTargetId) return;
        var opt = document.createElement('option');
        opt.value = 'sign:' + sc.id;
        opt.textContent = '合同 · ' + sc.id + ' · ' + sc.name;
        sel.appendChild(opt);
      });
      templates.forEach(function (t) {
        var opt = document.createElement('option');
        opt.value = 'tpl:' + t.id;
        opt.textContent = '模板 · ' + t.name;
        sel.appendChild(opt);
      });
      onSupRejSystemSelectChange();
    }

    function setSupRejUpdateMethod(m) {
      supRejUpdateMethod = m;
      var bs = document.getElementById('supRejMethodSystem');
      var bu = document.getElementById('supRejMethodUpload');
      var ps = document.getElementById('supRejPaneSystem');
      var pu = document.getElementById('supRejPaneUpload');
      if (bs && bu) {
        bs.classList.toggle('btn-primary', m === 'system');
        bu.classList.toggle('btn-primary', m === 'upload');
      }
      if (ps && pu) {
        ps.classList.toggle('active', m === 'system');
        pu.classList.toggle('active', m === 'upload');
      }
      onSupRejSystemSelectChange();
    }

    function onSupRejSystemSelectChange() {
      var sel = document.getElementById('supRejSystemSelect');
      var previewBtn = document.getElementById('supRejSystemPreviewBtn');
      if (!previewBtn) return;
      previewBtn.disabled = !(sel && sel.value && supRejUpdateMethod === 'system');
    }

    function previewSupRejSystemSelection() {
      var sel = document.getElementById('supRejSystemSelect');
      var v = sel && sel.value;
      if (!v) {
        alert('请先在下拉框中选择合同或模板');
        return;
      }
      var idx = v.indexOf(':');
      var kind = idx === -1 ? '' : v.slice(0, idx);
      var id = idx === -1 ? v : v.slice(idx + 1);
      if (kind === 'sign') {
        var c = signingContracts.find(function (x) { return x.id === id; });
        if (c) {
          alert('预览合同正文（原型）：' + c.id + ' · ' + c.name + '\n实际系统将打开在线预览 / PDF。');
        } else {
          alert('未找到所选合同');
        }
      } else if (kind === 'tpl') {
        var t = templates.find(function (x) { return x.id === id; });
        if (t) {
          alert('预览模板（原型）：' + t.name + '\n实际系统将打开模板预览。');
        } else {
          alert('未找到所选模板');
        }
      }
    }

    function handleSupRejUpload(inp) {
      var f = inp.files && inp.files[0];
      var el = document.getElementById('supRejUploadFileName');
      if (el) el.textContent = f ? f.name : '';
    }

    function openSupplierRejectModal(contractId) {
      var c = signingContracts.find(function (x) { return x.id === contractId; });
      if (!c || c.status !== 'pending-supplier') return;
      supplierRejectTargetId = contractId;
      templates = loadTemplatesFromStorage();
      document.getElementById('supRejReason').value = '';
      resetSupRejUpdatePanel();
      fillSupRejContractSummary();
      document.getElementById('supplierRejectModal').classList.add('show');
    }

    function closeSupplierRejectModal() {
      document.getElementById('supplierRejectModal').classList.remove('show');
      resetSupRejUpdatePanel();
      supplierRejectTargetId = '';
    }

    function submitSupplierReject() {
      var reason = document.getElementById('supRejReason').value.trim();
      if (!reason) { alert('请填写退回理由'); return; }
      var c = signingContracts.find(function (x) { return x.id === supplierRejectTargetId; });
      if (!c || c.status !== 'pending-supplier') { closeSupplierRejectModal(); return; }
      var panel = document.getElementById('supRejUpdatePanel');
      var upd = panel && panel.classList.contains('show');
      var updHint = '';
      if (upd) {
        if (supRejUpdateMethod === 'system') {
          var v = document.getElementById('supRejSystemSelect').value;
          if (!v) {
            alert('请从系统中选择一份合同或模板，或切换为「上传合同」上传文件');
            return;
          }
          var selEl = document.getElementById('supRejSystemSelect');
          var opt = selEl && selEl.selectedOptions && selEl.selectedOptions[0];
          updHint = '\n（合同文本更新：' + (opt ? opt.textContent : v) + '）';
        } else {
          var inp = document.getElementById('supRejUploadInput');
          if (!inp || !inp.files || !inp.files[0]) {
            alert('请先上传合同文件，或切换为「从系统选择」');
            return;
          }
          updHint = '\n（合同文本更新：已上传「' + inp.files[0].name + '」）';
        }
      } else {
        updHint = '\n（未指定合同文本更新）';
      }
      if (!confirm('确认退回合同「' + c.name + '」？' + updHint + '\n合同将标记为已作废。')) return;
      c.status = 'voided';
      c.label = '已作废';
      persistSigning();
      closeSupplierRejectModal();
      renderSigningTable();
      alert('已退回（原型演示）。');
    }

    function doSupplierConfirm(contractId) {
      var c = signingContracts.find(function (x) { return x.id === contractId; });
      if (!c || c.status !== 'pending-supplier') return;
      if (!confirm('确认合同「' + c.name + '」并无误？提交后将进入「待采购方确认」。')) return;
      c.status = 'pending-confirm';
      c.label = '待确认';
      persistSigning();
      renderSigningTable();
      alert('已确认提交（原型演示）。');
    }

    function downloadSigningContract(contractId) {
      var c = signingContracts.find(function (x) { return x.id === contractId; });
      if (!c) return;
      if (c.status === 'signed') {
        alert('下载已签署合同（原型）：' + c.name + '\n实际系统将下载 PDF / 打包件。');
      } else if (c.status === 'pending-supplier' || c.status === 'pending-confirm') {
        alert('下载合同稿（原型）：' + c.name + '\n实际系统将提供当前版本 PDF / Word。');
      }
    }

    function btnSupplierSigningOps(c) {
      var parts = [];
      parts.push('<button type="button" class="btn" onclick="goDetail(\'' + c.id + '\')">查看</button>');
      if (c.status === 'pending-supplier') {
        parts.push('<button type="button" class="btn" onclick="downloadSigningContract(\'' + c.id + '\')">下载</button>');
        parts.push('<button type="button" class="btn btn-primary" onclick="doSupplierConfirm(\'' + c.id + '\')">确认</button>');
        parts.push('<button type="button" class="btn btn-danger" onclick="openSupplierRejectModal(\'' + c.id + '\')">退回</button>');
      }
      if (c.status === 'pending-confirm') {
        parts.push('<button type="button" class="btn btn-primary" onclick="downloadSigningContract(\'' + c.id + '\')">下载</button>');
      }
      if (c.status === 'signed') {
        parts.push('<button type="button" class="btn btn-primary" onclick="downloadSigningContract(\'' + c.id + '\')">下载</button>');
      }
      return parts.join('');
    }

    function goDetail(contractId) {
      location.href = 'supplier_contract_detail.html?id=' + encodeURIComponent(contractId);
    }

    function renderSigningTable() {
      var kw = (document.getElementById('signKw').value || '').trim().toLowerCase();
      var st = document.getElementById('signStatus').value;
      var filtered = signingContracts.filter(function (c) {
        if (!supplierVisible(c)) return false;
        if (st && c.status !== st) return false;
        if (!kw) return true;
        var blob = (c.id + ' ' + c.name + ' ' + (c.buyer || '') + ' ' + (c.vendor || '')).toLowerCase();
        return blob.indexOf(kw) !== -1;
      });
      updateSigningStats();
      var tbody = document.getElementById('signTableBody');
      tbody.innerHTML = filtered.map(function (c) {
        var lab = supplierFacingLabel(c);
        return '<tr><td class="font-semibold">' + escapeHtml(c.id) + '</td><td>' + escapeHtml(c.name) + '</td><td>' + escapeHtml(c.buyer || '—') + '</td><td>' + escapeHtml(c.doc) + '</td>' +
          '<td><span class="badge ' + badgeClass(c.status) + '">' + escapeHtml(lab) + '</span></td><td>' + escapeHtml(c.started) + '</td><td class="space-x-1 whitespace-nowrap">' + btnSupplierSigningOps(c) + '</td></tr>';
      }).join('');
      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-slate-500 py-10">暂无数据</td></tr>';
      }
    }

    function resetSigningFilter() {
      document.getElementById('signKw').value = '';
      document.getElementById('signStatus').value = '';
      renderSigningTable();
    }

    (function init() {
      var tab = sessionStorage.getItem('supplierContractHubTab') || 'templates';
      switchHubTab(tab);
      renderTemplates();
      renderSigningTable();
    })();
  </script>
</body>
</html>
