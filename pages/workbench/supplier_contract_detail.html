<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合同详情 | 供应商工作台</title>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var id = params.get('id') || '';
      var target = 'supplier_contract_hub.html';
      if (id) {
        var c = null;
        try {
          var raw = sessionStorage.getItem('buyerContractSigningMock');
          if (raw) c = JSON.parse(raw).find(function (x) { return x.id === id; });
        } catch (e) {}
        var action = 'view';
        if (c) {
          if (c.status === 'pending-supplier' || c.status === 'buyer-returned' || (c.status === 'contract-updated' && c.lastUpdatedBy === 'buyer')) action = 'process';
        }
        target += '?id=' + encodeURIComponent(id) + '&action=' + action;
      }
      location.replace(target);
    })();
  </script>
</head>
<body></body>
</html>
