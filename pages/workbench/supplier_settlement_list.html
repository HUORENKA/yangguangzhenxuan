<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>采购订单结算 | 供应商工作台</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background:#f8fafc; color:#0f172a; }
    .page-card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; box-shadow:0 8px 20px rgba(15,23,42,.04); }
    .stat-card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:18px; display:flex; align-items:center; justify-content:space-between; }
    .stat-icon { width:44px; height:44px; border-radius:14px; display:flex; align-items:center; justify-content:center; }
    .badge { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700; }
    .b-warn { background:#fffbeb; color:#b45309; } .b-blue { background:#eff6ff; color:#1d4ed8; } .b-purple { background:#f5f3ff; color:#6d28d9; } .b-green { background:#ecfdf5; color:#047857; }
    .btn { height:32px; padding:0 12px; border-radius:8px; font-size:12px; font-weight:700; border:1px solid #dbe2ea; background:#fff; color:#475569; }
    .btn-primary { background:#0d9488; border-color:#0d9488; color:#fff; }
    th { background:#f8fafc; color:#64748b; font-size:13px; font-weight:700; }
    td, th { padding:14px 16px; border-bottom:1px solid #f1f5f9; text-align:left; }
    .dialog { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(15,23,42,.45); z-index:20; }
    .dialog.show { display:flex; }
  </style>
</head>
<body>
  <div class="p-5 max-w-[1680px] mx-auto">
    <div class="page-card p-5 mb-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-2xl bg-teal-50 text-teal-600 flex items-center justify-center"><i class="fas fa-calculator text-xl"></i></div>
        <div><h1 class="text-2xl font-bold">采购订单结算</h1><p class="text-sm text-slate-500 mt-1">发起采购订单结算、上传发票、确认收款并跟踪付款状态。</p></div>
      </div>
      <button class="btn btn-primary" onclick="openSettleDialog()">发起结算</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-5">
      <div class="stat-card"><div><div class="text-sm text-slate-500">结算总额</div><div class="text-2xl font-bold text-red-600 mt-2">¥358.4万</div></div><div class="stat-icon bg-red-50 text-red-600"><i class="fas fa-yen-sign"></i></div></div>
      <div class="stat-card"><div><div class="text-sm text-slate-500">待结算</div><div class="text-3xl font-bold text-amber-600 mt-2">7</div></div><div class="stat-icon bg-amber-50 text-amber-600"><i class="fas fa-paper-plane"></i></div></div>
      <div class="stat-card"><div><div class="text-sm text-slate-500">待开票</div><div class="text-3xl font-bold text-orange-600 mt-2">8</div></div><div class="stat-icon bg-orange-50 text-orange-600"><i class="fas fa-receipt"></i></div></div>
      <div class="stat-card"><div><div class="text-sm text-slate-500">待付款</div><div class="text-3xl font-bold text-purple-600 mt-2">5</div></div><div class="stat-icon bg-purple-50 text-purple-600"><i class="fas fa-credit-card"></i></div></div>
      <div class="stat-card"><div><div class="text-sm text-slate-500">已完成</div><div class="text-3xl font-bold text-green-600 mt-2">42</div></div><div class="stat-icon bg-green-50 text-green-600"><i class="fas fa-check-double"></i></div></div>
    </div>

    <div class="page-card p-4 mb-5 flex flex-wrap gap-3">
      <input class="border border-slate-300 rounded-lg px-3 py-2 text-sm w-64" placeholder="搜索结算单号 / 采购单位">
      <select class="border border-slate-300 rounded-lg px-3 py-2 text-sm"><option>全部状态</option><option>待结算</option><option>待开票</option><option>待付款</option><option>已完成</option></select>
      <button class="btn">查询</button><button class="btn">重置</button>
    </div>

    <div class="page-card overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr><th>结算单号</th><th>采购单位</th><th>关联订单数</th><th>结算金额</th><th>发票状态</th><th>付款状态</th><th>结算状态</th><th>操作</th></tr></thead>
        <tbody>
          <tr><td class="font-semibold">JS20260427001</td><td>北京市政务服务中心</td><td>3</td><td class="font-bold text-red-600">¥86,400</td><td><span class="badge b-warn">待开票</span></td><td><span class="badge b-blue">待付款</span></td><td>待处理</td><td><button class="btn btn-primary" onclick="openInvoiceDialog()">上传发票</button> <button class="btn">详情</button></td></tr>
          <tr><td class="font-semibold">JS20260426008</td><td>海淀区教育装备中心</td><td>1</td><td class="font-bold text-red-600">¥6,495</td><td><span class="badge b-green">已开票</span></td><td><span class="badge b-purple">付款中</span></td><td>待收款</td><td><button class="btn btn-primary" onclick="alert('已确认收款，结算单完成。')">确认收款</button></td></tr>
          <tr><td class="font-semibold">JS20260421006</td><td>朝阳区行政服务局</td><td>8</td><td class="font-bold text-red-600">¥126,400</td><td><span class="badge b-green">已开票</span></td><td><span class="badge b-green">已付款</span></td><td>已完成</td><td><button class="btn">下载结算单</button></td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="dialog" id="settleDialog">
    <div class="page-card p-5 w-[520px]">
      <h3 class="text-lg font-bold mb-3">发起结算</h3>
      <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm leading-7 mb-4">已选择 3 个待结算订单，应结金额 ¥86,400，扣减金额 ¥0，实结金额 ¥86,400。</div>
      <textarea class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" rows="3" placeholder="结算备注"></textarea>
      <div class="flex justify-end gap-2 mt-5"><button class="btn" onclick="closeSettleDialog()">取消</button><button class="btn btn-primary" onclick="closeSettleDialog(); alert('结算申请已提交。')">确认发起</button></div>
    </div>
  </div>
  <div class="dialog" id="invoiceDialog">
    <div class="page-card p-5 w-[460px]">
      <h3 class="text-lg font-bold mb-3">上传发票</h3>
      <input class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm mb-3" placeholder="发票号码">
      <input class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm mb-3" placeholder="发票金额">
      <button class="btn w-full">选择发票文件</button>
      <div class="flex justify-end gap-2 mt-5"><button class="btn" onclick="closeInvoiceDialog()">取消</button><button class="btn btn-primary" onclick="closeInvoiceDialog(); alert('发票上传成功。')">确认上传</button></div>
    </div>
  </div>
  <script>
    function openSettleDialog(){ document.getElementById('settleDialog').classList.add('show'); }
    function closeSettleDialog(){ document.getElementById('settleDialog').classList.remove('show'); }
    function openInvoiceDialog(){ document.getElementById('invoiceDialog').classList.add('show'); }
    function closeInvoiceDialog(){ document.getElementById('invoiceDialog').classList.remove('show'); }
  </script>
</body>
</html>
