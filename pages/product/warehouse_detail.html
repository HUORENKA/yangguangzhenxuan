<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>库内商品 | 仓库管理</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../assets/custom.css">
  <style>
    @layer utilities {
      .text-primary { color: #E2231A; }
    }
    body {
      background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
    }
    .page-card {
      background: #ffffff;
      border: 1px solid rgba(15, 23, 42, 0.06);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
    }
    .toolbar-input,
    .toolbar-select {
      width: 100%;
      border: 1px solid #dbe2ea;
      border-radius: 10px;
      background: #ffffff;
      padding: 10px 14px;
      font-size: 14px;
      color: #334155;
      transition: all 0.2s ease;
    }
    .toolbar-input:focus,
    .toolbar-select:focus {
      outline: none;
      border-color: #E2231A;
      box-shadow: 0 0 0 4px rgba(226, 35, 26, 0.08);
    }
    .table-wrap {
      overflow: hidden;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
    }
    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .action-btn-primary {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: #ffffff;
    }
    .action-btn-secondary {
      border: 1px solid #dbe2ea;
      color: #475569;
      background: #ffffff;
    }
    .wd-mini-btn {
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      border: 1px solid transparent;
    }
    .wd-mini-secondary {
      background: #f1f5f9;
      color: #334155;
      border-color: #e2e8f0;
    }
    .wd-mini-outline {
      background: #fff;
      color: #b91c1c;
      border-color: #fecaca;
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.48);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 90;
    }
    .modal-overlay.show {
      display: flex;
    }
    .modal-sheet {
      width: min(520px, 100%);
      max-height: min(86vh, 720px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 18px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.18);
    }
    .modal-sheet.wide {
      width: min(880px, 100%);
    }
    .modal-sheet-head {
      padding: 18px 20px;
      border-bottom: 1px solid #f1f5f9;
      font-size: 17px;
      font-weight: 800;
      color: #0f172a;
      flex-shrink: 0;
    }
    .modal-sheet-body {
      padding: 18px 20px;
      overflow-y: auto;
      flex: 1;
    }
    .modal-sheet-foot {
      padding: 14px 20px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .modal-foot-btn {
      padding: 9px 18px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }
    .modal-foot-cancel {
      background: #fff;
      border: 1px solid #dbe2ea;
      color: #475569;
    }
    .modal-foot-save {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: #fff;
    }
    .readonly-banner {
      border: 1px solid #fed7aa;
      background: linear-gradient(90deg, #fffbeb 0%, #ffffff 100%);
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 13px;
      color: #9a3412;
      font-weight: 600;
    }
  </style>
</head>
<body class="text-slate-800">
  <div class="max-w-[1680px] mx-auto p-5">
    <div class="flex flex-col lg:flex-row lg:items-start lg:justify-between gap-4 mb-5">
      <div>
        <div class="text-sm text-slate-500 mb-2">
          <a href="../workbench/workbench_home.html" class="hover:text-primary transition-colors">工作台</a>
          <span class="mx-2">/</span>
          <a href="./warehouse_manage.html" class="hover:text-primary transition-colors">仓库管理</a>
          <span class="mx-2">/</span>
          <span id="wdCrumbLeaf">库内商品</span>
        </div>
        <h1 class="text-3xl font-bold text-slate-900" id="wdWarehouseTitle">仓库</h1>
        <p class="text-sm text-slate-500 mt-1" id="wdWarehouseSub">—</p>
      </div>
      <div class="flex flex-wrap gap-3 items-center">
        <a id="wdBackLink" href="./warehouse_manage.html" class="action-btn action-btn-secondary">
          <i class="fas fa-arrow-left"></i><span>返回列表</span>
        </a>
      </div>
    </div>

    <div id="wdReadonlyBanner" class="readonly-banner mb-4 hidden" role="status">
      <i class="fas fa-eye mr-2"></i>当前仓库已禁用：仅支持查看库存，不可修改或转移。
    </div>

    <div class="page-card p-5 mb-5">
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-8 gap-3">
        <div class="md:col-span-2 xl:col-span-2">
          <label class="block text-xs font-medium text-slate-500 mb-1">商品名称或 SKU</label>
          <input id="wdSearchInput" class="toolbar-input" placeholder="关键词模糊查询" />
        </div>
        <div class="min-w-0">
          <label class="block text-xs font-medium text-slate-500 mb-1" for="wdFilterCat1">一级类目</label>
          <select id="wdFilterCat1" class="toolbar-select min-w-0"></select>
        </div>
        <div class="min-w-0">
          <label class="block text-xs font-medium text-slate-500 mb-1" for="wdFilterCat2">二级类目</label>
          <select id="wdFilterCat2" class="toolbar-select min-w-0"></select>
        </div>
        <div class="min-w-0">
          <label class="block text-xs font-medium text-slate-500 mb-1" for="wdFilterCat3">三级类目</label>
          <select id="wdFilterCat3" class="toolbar-select min-w-0"></select>
        </div>
        <div class="md:col-span-2 xl:col-span-3 flex flex-wrap gap-3 items-end">
          <button type="button" id="wdSearchBtn" class="action-btn action-btn-primary flex-1 min-w-[120px]">
            <i class="fas fa-magnifying-glass"></i><span>查询</span>
          </button>
          <button type="button" id="wdBatchTransferBtn" class="action-btn action-btn-secondary flex-1 min-w-[140px]" disabled>
            <i class="fas fa-right-left"></i><span>批量转移库存</span>
          </button>
        </div>
      </div>
    </div>

    <div class="page-card p-5">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4">
        <div class="text-sm text-slate-500" id="wdTableSummary">共 0 条 SKU</div>
      </div>
      <div class="table-wrap">
        <div class="overflow-x-auto">
          <table class="min-w-full bg-white">
            <thead class="bg-slate-50 text-slate-500 text-sm">
              <tr>
                <th class="text-left px-4 py-4 font-semibold w-12">
                  <input type="checkbox" id="wdMasterCb" class="h-4 w-4 rounded border-slate-300" title="全选" />
                </th>
                <th class="text-left px-5 py-4 font-semibold">商品信息</th>
                <th class="text-left px-5 py-4 font-semibold">SKU</th>
                <th class="text-left px-5 py-4 font-semibold">品类</th>
                <th class="text-left px-5 py-4 font-semibold tabular-nums">本仓库存</th>
                <th class="text-left px-5 py-4 font-semibold">操作</th>
              </tr>
            </thead>
            <tbody id="wdTableBody" class="text-sm text-slate-700"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- 修改库存 -->
  <div id="wdStockOverlay" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-sheet-head">修改库存</div>
      <div class="modal-sheet-body space-y-4">
        <input type="hidden" id="wdStockPid" />
        <div class="text-sm text-slate-600" id="wdStockProductLabel">—</div>
        <div class="flex justify-between gap-4 text-sm">
          <span class="text-slate-500">当前数量</span>
          <span class="font-bold tabular-nums text-slate-900" id="wdStockCurrent">0</span>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-2">调整为（支持 0）</label>
          <input type="number" id="wdStockInput" min="0" step="1" class="toolbar-input tabular-nums" />
        </div>
      </div>
      <div class="modal-sheet-foot">
        <button type="button" class="modal-foot-btn modal-foot-cancel" id="wdStockCancel">取消</button>
        <button type="button" class="modal-foot-btn modal-foot-save" id="wdStockSave">保存</button>
      </div>
    </div>
  </div>

  <!-- 批量 / 单行转移 -->
  <div id="wdTransferOverlay" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-sheet wide" onclick="event.stopPropagation()">
      <div class="modal-sheet-head">转移库存</div>
      <div class="modal-sheet-body space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-2">目标仓库（已禁用仓库不可选）</label>
          <select id="wdTransferTarget" class="toolbar-select"></select>
        </div>
        <div class="overflow-x-auto border border-slate-200 rounded-xl">
          <table class="min-w-full text-sm">
            <thead class="bg-slate-50 text-slate-500">
              <tr>
                <th class="text-left px-3 py-2 font-semibold">商品 / SKU</th>
                <th class="text-center px-3 py-2 font-semibold whitespace-nowrap">当前仓库数量</th>
                <th class="text-center px-3 py-2 font-semibold whitespace-nowrap">转移数量</th>
                <th class="text-center px-3 py-2 font-semibold whitespace-nowrap">目标仓现有</th>
                <th class="text-center px-3 py-2 font-semibold whitespace-nowrap">转移后目标仓数量</th>
              </tr>
            </thead>
            <tbody id="wdTransferTbody"></tbody>
          </table>
        </div>
        <p class="text-xs text-slate-500">单笔转移可多行填写；转移数量不能超过当前仓库库存；默认为 0 的行不参与提交。</p>
      </div>
      <div class="modal-sheet-foot">
        <button type="button" class="modal-foot-btn modal-foot-cancel" id="wdTransferCancel">取消</button>
        <button type="button" class="modal-foot-btn modal-foot-save" id="wdTransferConfirm">确认转移</button>
      </div>
    </div>
  </div>

  <script src="../../assets/platform_categories_data.js"></script>
  <script src="./warehouse_store.js"></script>
  <script src="./warehouse_detail_app.js"></script>
</body>
</html>
