<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品标签库 | 标签管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../assets/custom.css">
  <link rel="stylesheet" href="admin_tag_common.css">
</head>
<body class="tag-admin-page" data-entity-type="product">
  <div class="tag-page-inner">
    <div class="tag-page-hero">
      <div class="tag-page-hero-icon"><i class="fas fa-box"></i></div>
      <div>
        <div class="text-sm text-slate-500 mb-0.5">标签管理 / <span class="text-slate-800 font-medium">商品标签库</span></div>
        <h1>商品标签库</h1>
        <p>基于标签库配置「商品标签」生成，展示各 SKU 打标结果；支持查看详情与人工修改（系统直取除外）</p>
      </div>
    </div>
    <div class="tag-main-card">
      <div class="tag-panel-body">
        <div class="filter-row">
          <input type="text" id="filterSku" placeholder="SKU / 商品名称">
          <input type="text" id="filterSupplier" placeholder="供应商">
          <select id="filterCatL1">
            <option value="">一级分类（全部）</option>
            <option>办公耗材</option>
            <option>办公设备</option>
          </select>
          <select id="filterCatL2">
            <option value="">二级分类（全部）</option>
          </select>
          <select id="filterCatL3">
            <option value="">三级分类（全部）</option>
          </select>
          <select id="filterStatus">
            <option value="">打标状态（全部）</option>
            <option value="自动打标完成">打标正常</option>
            <option value="人工复核">待人工复核</option>
            <option value="自动打标失败">打标异常</option>
          </select>
          <button type="button" class="btn btn-primary btn-sm" id="btnFilterQuery">查询</button>
          <button type="button" class="btn btn-outline btn-sm" id="btnFilterReset">重置</button>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th class="w-12">序</th>
                <th>SKU</th>
                <th>商品名称</th>
                <th>三级类目</th>
                <th>供应商</th>
                <th>打标状态</th>
                <th>待复核项</th>
                <th>最近打标</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="entityListBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="entityModal" hidden>
    <div class="modal-box lg">
      <div class="modal-header" id="entityModalTitle">商品标签详情</div>
      <div class="modal-body" id="entityModalBody"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" id="btnCloseEntityModal">关闭</button>
      </div>
    </div>
  </div>
  <script src="admin_tag_shared.js"></script>
  <script src="admin_tag_entity_lib_app.js"></script>
</body>
</html>
