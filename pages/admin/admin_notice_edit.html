<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑公告 | 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../assets/custom.css">
  <style>
    @layer utilities { .text-primary { color: #E2231A; } .bg-primary { background-color: #E2231A; } }
    body { font-family: "Microsoft YaHei", sans-serif; background: #f8fafc; color: #334155; }
    .admin-content { min-height: 100vh; }
    .action-btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
    .action-btn-primary { background: #E2231A; color: white; }
    .action-btn-secondary { background: white; color: #334155; border: 1px solid #cbd5e1; }
    .form-card { background: white; border: 1px solid #e2e8f0; border-radius: 14px; padding: 24px; border-top: 4px solid #E2231A; }
    .warn-banner { background: #fff7ed; border: 1px solid #fdba74; color: #9a3412; font-size: 13px; padding: 12px 14px; border-radius: 10px; margin-bottom: 16px; }
    .scope-multi-wrap { border: 1px solid #e2e8f0; border-radius: 12px; background: linear-gradient(180deg, #fafbfc 0%, #ffffff 48%); padding: 14px 16px 16px; }
    .scope-multi-grid { display: grid; gap: 10px; grid-template-columns: 1fr; }
    @media (min-width: 480px) { .scope-multi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    .scope-chip { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; transition: border-color .15s ease, box-shadow .15s ease, background .15s ease; }
    .scope-chip:hover { border-color: #fecaca; box-shadow: 0 1px 4px rgba(226, 35, 26, 0.07); }
    .scope-chip:has(input:checked) { border-color: #fb923c; background: #fff7f7; box-shadow: 0 0 0 1px rgba(226, 35, 26, 0.15); }
    .scope-chip input { width: 1rem; height: 1rem; border-radius: 4px; accent-color: #E2231A; flex-shrink: 0; }
    .scope-chip span { font-size: 13px; font-weight: 600; color: #334155; }
    @media (min-width: 480px) { .scope-multi-grid .scope-chip:nth-child(5) { grid-column: 1 / -1; } }
  </style>
</head>
<body>
  <main class="admin-content">
    <div class="p-6 max-w-[900px] mx-auto">
      <div class="flex flex-wrap items-center gap-3 mb-6">
        <a id="backList" href="admin_notice.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 no-underline">
          <i class="fas fa-arrow-left"></i>返回列表
        </a>
        <span id="pageModeLabel" class="text-sm text-slate-500"></span>
      </div>

      <div id="lockBanner" class="warn-banner hidden">
        <i class="fas fa-lock mr-1"></i><strong>已发布</strong>的公告不可编辑。请先在列表中执行「下线」，再返回编辑。
      </div>

      <div class="form-card">
        <h1 id="formTitle" class="text-lg font-bold text-slate-900 mb-6">发布公告</h1>

        <div class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">公告标题 <span class="text-red-500">*</span></label>
            <input id="fieldTitle" type="text" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="请输入公告标题">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">公告类型 <span class="text-red-500">*</span></label>
            <select id="fieldType" class="w-full max-w-md border border-slate-300 rounded-lg px-3 py-2 text-sm">
              <option>平台通知</option>
              <option>活动通知</option>
              <option>政策公告</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">发布范围 <span class="text-red-500">*</span></label>
            <div id="fieldScopeGroup" class="scope-multi-wrap">
              <p class="text-xs text-slate-500 mb-3 flex items-start gap-1.5 leading-relaxed">
                <i class="fas fa-map-location-dot text-[#E2231A] mt-0.5 shrink-0" aria-hidden="true"></i>
                <span>支持<strong>多选</strong>，可同时勾选多个分站或专区；与列表筛选项口径一致。</span>
              </p>
              <div class="scope-multi-grid">
                <label class="scope-chip"><input type="checkbox" name="fieldScope" value="全平台"><span>全平台</span></label>
                <label class="scope-chip"><input type="checkbox" name="fieldScope" value="北京分站"><span>北京分站</span></label>
                <label class="scope-chip"><input type="checkbox" name="fieldScope" value="华东分站"><span>华东分站</span></label>
                <label class="scope-chip"><input type="checkbox" name="fieldScope" value="华北分站"><span>华北分站</span></label>
                <label class="scope-chip"><input type="checkbox" name="fieldScope" value="医疗卫生专区"><span>医疗卫生专区</span></label>
              </div>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <input id="fieldPin" type="checkbox" class="rounded border-slate-300 text-red-600 focus:ring-red-500">
            <label for="fieldPin" class="text-sm font-medium text-slate-700">置顶展示（同发布范围内与其他置顶公告共同参与排序）</label>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">正文 <span class="text-red-500">*</span></label>
            <textarea id="fieldBody" rows="10" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm resize-y" placeholder="支持纯文本示意；正式系统可替换为富文本编辑器。"></textarea>
          </div>
        </div>

        <div id="formActions" class="mt-8 flex flex-wrap gap-3">
          <button type="button" class="action-btn action-btn-secondary" onclick="alert('原型：已保存草稿')"><i class="fas fa-save"></i>保存草稿</button>
          <button type="button" class="action-btn action-btn-secondary" onclick="openNoticeEditPreviewModal()"><i class="fas fa-eye"></i>预览</button>
          <button type="button" class="action-btn action-btn-primary" onclick="alert('原型：已提交并发布')"><i class="fas fa-paper-plane"></i>保存并发布</button>
        </div>
      </div>
    </div>

    <div id="noticeEditPreviewModal" class="fixed inset-0 z-[100] hidden" aria-modal="true" role="dialog" aria-labelledby="noticeEditPreviewHeading">
      <div class="absolute inset-0 bg-slate-900/45" onclick="closeNoticeEditPreviewModal()"></div>
      <div class="absolute left-1/2 top-1/2 w-full max-w-md -translate-x-1/2 -translate-y-1/2 px-4">
        <div class="relative rounded-xl bg-white shadow-xl border border-slate-200 p-6">
          <div class="flex items-start gap-3">
            <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-red-50 text-[#E2231A]">
              <i class="fas fa-window-restore text-lg"></i>
            </div>
            <div class="min-w-0 flex-1">
              <h2 id="noticeEditPreviewHeading" class="text-lg font-bold text-slate-900">预览说明</h2>
              <p class="mt-3 text-sm leading-relaxed text-slate-600">正式环境中，「预览」将在<strong class="text-slate-800">新窗口或新标签页</strong>打开前台<strong>公告详情页</strong>，以当前编辑内容渲染展示效果。</p>
              <p class="mt-2 text-xs text-slate-500">本页为静态原型，此处用弹窗仅演示交互，不实际跳转。</p>
            </div>
          </div>
          <div class="mt-6 flex justify-end">
            <button type="button" class="action-btn action-btn-primary justify-center px-5" onclick="closeNoticeEditPreviewModal()">知道了</button>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script>
    (function () {
      window.openNoticeEditPreviewModal = function () {
        document.getElementById('noticeEditPreviewModal').classList.remove('hidden');
      };
      window.closeNoticeEditPreviewModal = function () {
        document.getElementById('noticeEditPreviewModal').classList.add('hidden');
      };

      var params = new URLSearchParams(location.search);
      var id = params.get('id');

      var draftData = {
        title: '医疗专区供应商资质复核提醒',
        type: '政策公告',
        scope: ['医疗卫生专区'],
        pin: false,
        body: '请各供应商在专区公示期内完成资质材料更新（原型占位）。'
      };

      var lockBanner = document.getElementById('lockBanner');
      var formActions = document.getElementById('formActions');
      var pageModeLabel = document.getElementById('pageModeLabel');

      function setScopeChecks(values) {
        document.querySelectorAll('#fieldScopeGroup input[name="fieldScope"]').forEach(function (cb) {
          cb.checked = values.indexOf(cb.value) !== -1;
        });
      }
      function disableScopeChecks() {
        document.querySelectorAll('#fieldScopeGroup input[name="fieldScope"]').forEach(function (cb) {
          cb.disabled = true;
        });
      }

      function disableForm() {
        ['fieldTitle', 'fieldType', 'fieldBody', 'fieldPin'].forEach(function (fid) {
          document.getElementById(fid).disabled = true;
        });
        disableScopeChecks();
      }

      if (!id) {
        document.getElementById('formTitle').textContent = '发布公告';
        pageModeLabel.textContent = '新建';
        return;
      }

      if (id === 'n1-published' || id === 'n2-published') {
        document.getElementById('formTitle').textContent = '编辑公告（不可编辑）';
        pageModeLabel.textContent = '已发布 · 只读';
        lockBanner.classList.remove('hidden');
        if (id === 'n1-published') {
          document.getElementById('fieldTitle').value = '关于五一期间物流时效调整的通知';
          document.getElementById('fieldType').value = '平台通知';
          setScopeChecks(['全平台']);
          document.getElementById('fieldPin').checked = true;
          document.getElementById('fieldBody').value = '（已发布公告不可修改，请先下线。）';
        } else {
          document.getElementById('fieldTitle').value = '北京分站办公耗材专项采购活动';
          document.getElementById('fieldType').value = '活动通知';
          setScopeChecks(['北京分站']);
          document.getElementById('fieldPin').checked = false;
          document.getElementById('fieldBody').value = '（已发布公告不可修改，请先下线。）';
        }
        disableForm();
        formActions.innerHTML = '<button type="button" class="action-btn action-btn-secondary" onclick="openNoticeEditPreviewModal()"><i class="fas fa-eye"></i>预览</button><span class="text-sm text-slate-500 py-2">无可执行操作，请返回列表下线后再编辑。</span>';
        return;
      }

      if (id === 'n3-draft') {
        document.getElementById('formTitle').textContent = '编辑公告';
        pageModeLabel.textContent = '草稿 · 可编辑';
        document.getElementById('fieldTitle').value = draftData.title;
        document.getElementById('fieldType').value = draftData.type;
        setScopeChecks(draftData.scope);
        document.getElementById('fieldPin').checked = draftData.pin;
        document.getElementById('fieldBody').value = draftData.body;
        return;
      }

      pageModeLabel.textContent = '编辑';
    })();

    (function () {
      if (new URLSearchParams(location.search).get('embed') !== '1') return;
      var b = document.getElementById('backList');
      var h = b.getAttribute('href');
      b.setAttribute('href', h + (h.indexOf('?') > -1 ? '&' : '?') + 'embed=1');
    })();
  </script>
</body>
</html>
