<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公告预览 | 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../assets/custom.css">
  <style>
    body { font-family: "Microsoft YaHei", sans-serif; background: #f8fafc; color: #334155; }
    .admin-content { min-height: 100vh; }
    .tag { display: inline-flex; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .notice-strip { background: linear-gradient(90deg, #fff1f1 0%, #fff8f8 100%); border: 1px solid #fecaca; color: #991b1b; font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; }
    .detail-card { background: white; border: 1px solid #e2e8f0; border-radius: 14px; padding: 24px; border-top: 4px solid #E2231A; }
    .detail-body { font-size: 15px; line-height: 1.8; color: #334155; margin-top: 20px; white-space: pre-line; }
  </style>
</head>
<body>
  <main class="admin-content">
    <div class="p-6 max-w-[900px] mx-auto">
      <div class="mb-6">
        <a id="backList" href="admin_notice.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 no-underline">
          <i class="fas fa-arrow-left"></i>返回公告列表
        </a>
      </div>

      <p class="notice-strip"><i class="fas fa-bullhorn mr-1"></i><strong>平台公告预览</strong>（与新闻资讯预览分离；前台展示效果以实际系统为准。）</p>

      <div class="detail-card">
        <div class="flex flex-wrap items-start justify-between gap-4">
          <h1 id="detailTitle" class="text-xl font-bold text-slate-900 leading-snug">关于五一期间物流时效调整的通知</h1>
          <span id="detailStatus" class="tag bg-green-100 text-green-700">已发布</span>
        </div>
        <div id="detailMeta" class="text-sm text-slate-500 mt-4 flex flex-wrap gap-x-6 gap-y-2"></div>
        <div id="detailBody" class="detail-body">各采购单位、供应商：\n\n因节假日运力调整，五一期间部分线路物流时效可能延长 1～2 个工作日，请合理安排下单与收货计划。具体以订单物流详情为准。\n\n（静态原型示意文案。）</div>
      </div>
    </div>
  </main>
  <script>
    (function () {
      var samples = {
        n1: {
          title: '关于五一期间物流时效调整的通知',
          statusClass: 'tag bg-green-100 text-green-700',
          statusText: '已发布',
          meta: '公告类型：平台通知　发布范围：全平台　发布时间：2026-04-25 10:00　阅读量：2,845',
          body: '各采购单位、供应商：\n\n因节假日运力调整，五一期间部分线路物流时效可能延长 1～2 个工作日，请合理安排下单与收货计划。具体以订单物流详情为准。\n\n（静态原型示意文案。）'
        },
        n2: {
          title: '北京分站办公耗材专项采购活动',
          statusClass: 'tag bg-green-100 text-green-700',
          statusText: '已发布',
          meta: '公告类型：活动通知　发布范围：北京分站　发布时间：2026-04-20 09:30　阅读量：968',
          body: '活动规则与参与方式详见正文附件说明（原型占位）。'
        },
        n3: {
          title: '医疗专区供应商资质复核提醒',
          statusClass: 'tag bg-slate-100 text-slate-600',
          statusText: '草稿',
          meta: '公告类型：政策公告　发布范围：医疗卫生专区　发布时间：未发布',
          body: '草稿预览：正式发布后用户可见。'
        }
      };
      var id = new URLSearchParams(location.search).get('id') || 'n1';
      var d = samples[id] || samples.n1;
      document.getElementById('detailTitle').textContent = d.title;
      var st = document.getElementById('detailStatus');
      st.className = d.statusClass;
      st.textContent = d.statusText;
      document.getElementById('detailMeta').textContent = d.meta;
      document.getElementById('detailBody').textContent = d.body;

      if (new URLSearchParams(location.search).get('embed') === '1') {
        var b = document.getElementById('backList');
        var h = b.getAttribute('href');
        b.setAttribute('href', h + (h.indexOf('?') > -1 ? '&' : '?') + 'embed=1');
      }
    })();
  </script>
</body>
</html>
