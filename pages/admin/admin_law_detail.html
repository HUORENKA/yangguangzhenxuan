<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>法规详情 | 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../assets/custom.css">
  <style>
    body { font-family: "Microsoft YaHei", sans-serif; background: #f8fafc; color: #334155; }
    .admin-content { min-height: 100vh; }
    .tag { display: inline-flex; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .detail-card { background: white; border: 1px solid #e2e8f0; border-radius: 14px; padding: 24px; }
    .detail-body { font-size: 15px; line-height: 1.8; color: #334155; margin-top: 20px; white-space: pre-line; }
  </style>
</head>
<body>
  <main class="admin-content">
    <div class="p-6 max-w-[900px] mx-auto">
      <div class="mb-6">
        <a id="backList" href="admin_law_list.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 no-underline">
          <i class="fas fa-arrow-left"></i>返回列表
        </a>
      </div>
      <div class="detail-card">
        <div class="flex flex-wrap items-start justify-between gap-4">
          <h1 id="detailTitle" class="text-xl font-bold text-slate-900 leading-snug">《政府采购法实施条例》要点导读</h1>
          <span id="detailStatus" class="tag bg-green-100 text-green-700">已发布</span>
        </div>
        <div id="detailMeta" class="text-sm text-slate-500 mt-4 flex flex-wrap gap-x-6 gap-y-2"></div>
        <div id="detailBody" class="detail-body"></div>
      </div>
    </div>
  </main>
  <script>
    (function () {
      var samples = {
        'published-1': {
          title: '《政府采购法实施条例》要点导读',
          statusClass: 'tag bg-green-100 text-green-700',
          statusText: '已发布',
          meta: '文号：国令第 658 号（示例）　发文机关：国务院　发布范围：全平台　发布时间：2026-04-01 14:00　阅读量：8,420',
          body: '第一条至第五条……（以下为静态原型示意，正文可挂载政策原文链接或富文本解读。）\n\n请以正式公开发布文本为准。'
        },
        'draft-1': {
          title: '框架协议采购合规指引（草稿）',
          statusClass: 'tag bg-slate-100 text-slate-600',
          statusText: '草稿',
          meta: '文号：待定　发布范围：华东分站　尚未发布',
          body: '此处为草稿正文占位；正式发布前请核对文号、施行日期及适用范围。'
        },
        'offline-1': {
          title: '电子卖场管理办法（站内转载版）',
          statusClass: 'tag bg-amber-100 text-amber-800',
          statusText: '已下架',
          meta: '文号：财库〔2024〕XX 号（示例）　发布范围：全平台　原发布时间：2026-02-15 09:30　阅读量：5,102',
          body: '下架后前台用户不可见；运营可更新转载说明或附件后重新发布。（静态原型。）'
        }
      };
      var id = new URLSearchParams(location.search).get('id');
      var d = samples[id] || samples['published-1'];
      document.getElementById('detailTitle').textContent = d.title;
      var st = document.getElementById('detailStatus');
      st.className = d.statusClass;
      st.textContent = d.statusText;
      document.getElementById('detailMeta').textContent = d.meta;
      document.getElementById('detailBody').textContent = d.body;

      if (new URLSearchParams(location.search).get('embed') === '1') {
        var b = document.getElementById('backList');
        var h = b.getAttribute('href');
        b.setAttribute('href', h + (h.indexOf('?') > -1 ? '&' : '?') + 'embed=1');
      }
    })();
  </script>
</body>
</html>
