      document.getElementById('ptEvidence').innerHTML = d.evidence;

      var tbody = document.getElementById('cgsTbody');
      tbody.innerHTML = '';
      d.slips.forEach(function (s) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td class="font-mono font-semibold">' + s.no + '</td>' +
          '<td class="font-semibold">' + s.amt + '</td>' +
          '<td>' + (s.buyer || '—') + '</td>' +
          '<td>' + (s.verified || '—') + '</td>' +
          '<td><span class="text-xs text-slate-500">' + (s.lock || '锁定') + '</span></td>';
        tbody.appendChild(tr);
      });

      var pw = document.getElementById('payStatusWrap');
      pw.innerHTML = '<span class="inline-flex px-2 py-1 rounded text-xs font-semibold ' + (d.pay.badge || 'bg-slate-100 text-slate-700') + '">' + d.pay.status + '</span>';
      document.getElementById('payVoucher').innerHTML = d.pay.voucher;
      document.getElementById('paySerial').textContent = d.pay.serial || '—';

      var ht = document.getElementById('histTbody');
      ht.innerHTML = '';
      if (!d.history || !d.history.length) {
        ht.innerHTML = '<tr><td colspan="6" class="text-center text-slate-500 py-6">暂无处理记录</td></tr>';
      } else {
        d.history.forEach(function (row, idx) {
          var tr = document.createElement('tr');
          if (idx === d.history.length - 1 && String(row[3]).trim() === '--') tr.className = 'bg-blue-50/50';
          tr.innerHTML = '<td>' + row[0] + '</td><td>' + row[1] + '</td><td>' + row[2] + '</td><td>' + row[3] + '</td><td>' + row[4] + '</td><td>' + row[5] + '</td>';
          ht.appendChild(tr);
        });
      }

      function setBodyPadding(showBar) {
        document.body.classList.toggle('pb-28', !!showBar);
        document.body.classList.toggle('pb-6', !showBar);
      }

      function wireUpload(btn, kind) {
        btn.addEventListener('click', function () {
          fileInput.dataset.ptNo = no;
          fileInput.dataset.kind = kind;
          fileInput.click();
        });
      }

      fileInput.addEventListener('change', function () {
        var f = this.files && this.files[0];
        if (!f) return;
        var label = this.dataset.kind === 'invoice' ? '发票' : '文件';
        alert('平台结算单 ' + (this.dataset.ptNo || '') + '：已选择' + label + '「' + f.name + '」（原型不上送）');
        this.value = '';
      });

      var actions = d.op || [];
      inner.innerHTML = '';
      if (!actions.length) {
        bar.classList.add('hidden');
        setBodyPadding(false);
      } else {
        bar.classList.remove('hidden');
        setBodyPadding(true);
        actions.forEach(function (key) {
          var btn = document.createElement('button');
          btn.type = 'button';
          if (key === 'editDraft') {
            btn.className = 'btn';
            btn.textContent = '编辑草稿';
            btn.addEventListener('click', function () {
              location.href = 'operator_platform_settlement_edit.html?no=' + encodeURIComponent(no);
            });
          } else if (key === 'submitApprove') {
            btn.className = 'btn btn-primary';
            btn.textContent = '提交审批';
            btn.addEventListener('click', function () { alert('已提交审批（原型）'); });
          } else if (key === 'uploadInvoice') {
            btn.className = 'btn btn-primary';
            btn.textContent = '上传发票';
            wireUpload(btn, 'invoice');
          } else if (key === 'confirmReceipt') {
            btn.className = 'btn btn-primary';
            btn.textContent = '确认收款';
            btn.addEventListener('click', function () { alert('已确认收款（原型）'); });
          } else if (key === 'downloadInvoice') {
            btn.className = 'btn';
            btn.textContent = '下载发票';
            btn.addEventListener('click', function () {
              alert('下载平台结算单 ' + no + ' 已归档服务费发票（原型演示）。');
            });
          }
          inner.appendChild(btn);
        });
      }
    })();
  </script>
</body>
</html>
