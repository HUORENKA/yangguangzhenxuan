<script>
  (function () {
    var embedded = new URLSearchParams(location.search).get('embed') === '1';
    if (embedded) {
      document.documentElement.classList.add('admin-embed-mode');
      document.querySelectorAll('a[href]').forEach(function (a) {
        var h = a.getAttribute('href');
        if (!h || /^https?:\/\//i.test(h) || h.indexOf('javascript:') === 0 || h.charAt(0) === '#') return;
        if (h.indexOf('embed=') !== -1) return;
        if (h.indexOf('.html') === -1) return;
        a.setAttribute('href', h + (h.indexOf('?') > -1 ? '&' : '?') + 'embed=1');
      });
    }
    window.withAdminEmbed = function (href) {
      if (!embedded) return href;
      var q = href.indexOf('?');
      var base = q === -1 ? href : href.slice(0, q);
      var params = new URLSearchParams(q === -1 ? '' : href.slice(q + 1));
      params.set('embed', '1');
      var s = params.toString();
      return s ? base + '?' + s : base + '?embed=1';
    };
  })();
</script>

  }
  function buyerAuditHref(id) {
    return withAdminEmbed('admin_buyer_settle.html?id=' + encodeURIComponent(id));
  }
  function buyerNeedsAudit(b) {
    if (['reviewing', 'pending'].includes(b.onlineStatus)) return true;
    return b.onlineStatus === 'offline' && !b.auditPass;
  }
  function buyerCanOnline(b) {
    return b.onlineStatus === 'offline' && b.auditPass === true;
  }

  function getOnlineBadge(status) {
    const map = {
      online: '<span class="mini-badge badge-success"><i class="fas fa-circle"></i>已上线</span>',
      offline: '<span class="mini-badge badge-neutral"><i class="fas fa-circle"></i>已下线</span>',
      reviewing: '<span class="mini-badge badge-progress"><i class="fas fa-spinner fa-spin"></i>审核中</span>',
      pending: '<span class="mini-badge badge-warn"><i class="fas fa-clock"></i>待整改上线</span>',
    };
    return map[status] || map.offline;
  }

  function getOperationCell(b) {
    let btns = `<button type="button" class="table-op-btn" onclick="window.location.href='${buyerDetailHref(b.id)}'"><i class="fas fa-file-lines"></i>查看详情</button>`;
    if (buyerNeedsAudit(b)) {
      btns += `<button type="button" class="table-op-btn" onclick="window.location.href='${buyerAuditHref(b.id)}'" style="border-color:#fed7aa;background:#fff7ed;color:#c2410c;"><i class="fas fa-clipboard-check"></i>审核</button>`;
    }
    if (b.onlineStatus === 'online') {
      btns += `<button type="button" class="table-op-btn danger" onclick="confirmOffline('${b.id}')"><i class="fas fa-arrow-down"></i>下线</button>`;
    }
    if (buyerCanOnline(b)) {
      btns += `<button type="button" class="table-op-btn success" onclick="confirmOnline('${b.id}')"><i class="fas fa-arrow-up"></i>上线</button>`;
    }
    return `<div class="flex flex-wrap gap-1.5">${btns}</div>`;
  }

  function renderTable() {
    const tbody = document.getElementById('buyerTableBody');
    document.getElementById('tableCount').textContent = `共 ${filteredData.length} 条`;

    if (!filteredData.length) {
      tbody.innerHTML = `
        <tr>
          <td colspan="10" class="empty-state">
            <div class="icon-wrap"><i class="fas fa-users-slash"></i></div>
            <div class="text-base font-semibold text-slate-700 mb-2">暂无匹配采购商</div>
            <div class="text-sm">请调整筛选条件，或点击「采购商入驻」新增。</div>
          </td>
        </tr>`;
      return;
    }

    tbody.innerHTML = filteredData.map(b => `
      <tr class="border-t border-slate-100 hover:bg-slate-50 transition-colors">
        <td class="px-4 py-4">
          <input type="checkbox" class="row-checkbox w-4 h-4 accent-red-600"
            data-id="${b.id}" ${selectedIds.has(b.id) ? 'checked' : ''}
            onchange="toggleRow('${b.id}',this.checked)">
        </td>
        <td class="px-4 py-4">
          <div class="font-semibold text-slate-900">${b.name}</div>
          <div class="text-xs text-slate-400 mt-0.5">${b.id} · ${b.contact}</div>
        </td>
        <td class="px-4 py-4">
          <span class="inline-flex px-2 py-1 rounded-lg bg-violet-50 text-violet-700 text-xs font-semibold">${b.station}</span>
        </td>
        <td class="px-4 py-4">${b.buyerType}</td>
        <td class="px-4 py-4 font-mono text-xs text-slate-600">${b.creditCode}</td>
        <td class="px-4 py-4 text-slate-600">${b.contact} ${maskPhone(b.applicantMobile)}</td>
        <td class="px-4 py-4 text-red-600 font-semibold">${b.amountLabel}</td>
        <td class="px-4 py-4 text-slate-600">${b.settleDate}</td>
        <td class="px-4 py-4">${getOnlineBadge(b.onlineStatus)}</td>
        <td class="px-4 py-4">${getOperationCell(b)}</td>
      </tr>
    `).join('');
  }

  function maskPhone(p) {
    if (!p || p.length < 11) return '';
    return p.slice(0, 3) + '****' + p.slice(-4);
  }

  function applyFilter() {
    const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
    const station = document.getElementById('stationFilter').value;
    const btype = document.getElementById('typeFilter').value;
    const status = document.getElementById('statusFilter').value;

    filteredData = buyersData.filter(b => {
      if (keyword) {
        const blob = `${b.name} ${b.id} ${b.creditCode} ${b.contact} ${b.applicantMobile} ${b.station}`.toLowerCase();
        if (!blob.includes(keyword)) return false;
      }
      if (station && b.station !== station) return false;
      if (btype && b.buyerType !== btype) return false;
      if (status && b.onlineStatus !== status) return false;
      return true;
    });
    renderTable();
  }

  function resetFilter() {
    document.getElementById('searchInput').value = '';
    document.getElementById('stationFilter').value = '';
    document.getElementById('typeFilter').value = '';
    document.getElementById('statusFilter').value = '';
    filteredData = [...buyersData];
    renderTable();
  }

  function filterByStatus(status) {
    document.getElementById('statusFilter').value = status;
    applyFilter();
  }

  function toggleSelectAll(cb) {
    document.querySelectorAll('.row-checkbox').forEach(el => {
      el.checked = cb.checked;
      if (cb.checked) selectedIds.add(el.dataset.id);
      else selectedIds.delete(el.dataset.id);
    });
    updateBatchBtn();
  }

  function toggleRow(id, checked) {
    checked ? selectedIds.add(id) : selectedIds.delete(id);
    updateBatchBtn();
  }

  function updateBatchBtn() {
    document.getElementById('batchOfflineBtn').style.display = selectedIds.size ? 'inline-flex' : 'none';
  }

  function batchOffline() {
    showDialog({
      title: '批量下线确认',
      message: `已选择 ${selectedIds.size} 家采购商，确定批量下线吗？\n下线后相关单位账号将无法登录采购端（演示）。`,
      type: 'warn',
      confirmText: '确认下线',
      cancelText: '取消',
      onConfirm: () => {
        selectedIds.forEach(id => {
          const b = buyersData.find(x => x.id === id);
          if (b) b.onlineStatus = 'offline';
        });
        selectedIds.clear();
        filteredData = [...buyersData];
        renderTable();
        showDialog({ title: '操作成功', message: '已成功下线所选采购商。', type: 'success', confirmText: '确定' });
      }
    });
  }

  function confirmOffline(id) {
    const b = buyersData.find(x => x.id === id);
    if (!b) return;
    showDialog({
      title: '下线确认',
      message: `确定将【${b.name}】下线吗？\n下线后该采购单位将无法登录采购端（演示）。`,
      type: 'warn',
      confirmText: '确认下线',
      cancelText: '取消',
      onConfirm: () => {
        b.onlineStatus = 'offline';
        filteredData = [...buyersData];
        renderTable();
        showDialog({ title: '已下线', message: `【${b.name}】已成功下线。`, type: 'success', confirmText: '确定' });
      }
    });
  }

  function confirmOnline(id) {
    const b = buyersData.find(x => x.id === id);
    if (!b) return;
    showDialog({
      title: '上线确认',
      message: `确定将【${b.name}】上线吗？\n上线后可正常使用采购功能（演示）。`,
      type: 'info',
      confirmText: '确认上线',
      cancelText: '取消',
      onConfirm: () => {
        b.onlineStatus = 'online';
        filteredData = [...buyersData];
        renderTable();
        showDialog({ title: '已上线', message: `【${b.name}】已成功上线。`, type: 'success', confirmText: '确定' });
      }
    });
  }

  function showDialog({ title = '提示', message = '', type = 'info', confirmText = '确定', cancelText = '', onConfirm = null }) {
    const typeMap = {
      info: { cls: 'info', icon: 'fa-circle-info' },
      success: { cls: 'success', icon: 'fa-circle-check' },
      warn: { cls: 'warn', icon: 'fa-triangle-exclamation' },
      error: { cls: 'error', icon: 'fa-circle-xmark' },
    };
    const t = typeMap[type] || typeMap.info;
    document.getElementById('dialogIcon').className = `dialog-icon ${t.cls}`;
    document.getElementById('dialogIcon').innerHTML = `<i class="fas ${t.icon}"></i>`;
    document.getElementById('dialogTitle').textContent = title;
    document.getElementById('dialogBody').textContent = message;
    document.getElementById('dialogConfirmBtn').textContent = confirmText;
    const cancelBtn = document.getElementById('dialogCancelBtn');
    if (cancelText) { cancelBtn.style.display = 'inline-flex'; cancelBtn.textContent = cancelText; }
    else { cancelBtn.style.display = 'none'; }
    dialogOnConfirm = onConfirm;
    document.getElementById('dialogOverlay').classList.add('show');
  }

  function closeDialog(action) {
    document.getElementById('dialogOverlay').classList.remove('show');
    if (action === 'confirm' && typeof dialogOnConfirm === 'function') dialogOnConfirm();
    dialogOnConfirm = null;
  }

  function exportData() {
    showDialog({ title: '导出数据', message: '正在生成采购商数据报表（演示）\n真实环境中将下载 Excel 文件。', type: 'info', confirmText: '确定' });
  }

  function prevPage() {}
  function nextPage() {}

  function toggleSidebar() {
    const sidebar = document.getElementById('adminSidebar');
    const icon = document.getElementById('sidebarToggleIcon');
    sidebar.classList.toggle('collapsed');
    icon.classList.toggle('fa-chevron-left');
    icon.classList.toggle('fa-chevron-right');
    localStorage.setItem('adminSidebarCollapsed', sidebar.classList.contains('collapsed'));
  }

  document.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('adminSidebarCollapsed');
    if (saved === 'true') {
      document.getElementById('adminSidebar').classList.add('collapsed');
      document.getElementById('sidebarToggleIcon').classList.replace('fa-chevron-left', 'fa-chevron-right');
    }
    renderTable();
  });
</script>
</body>
</html>
