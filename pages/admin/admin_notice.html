<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>平台公告管理 | 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../assets/custom.css">
  <style>
    @layer utilities{.text-primary{color:#E2231A}.bg-primary{background-color:#E2231A}}
    body{font-family:"Microsoft YaHei",sans-serif;background:#f8fafc;color:#334155}.admin-content{min-height:100vh}.action-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 14px;border-radius:10px;font-size:14px;font-weight:600}.action-btn-primary{background:#E2231A;color:white}.action-btn-secondary{background:white;color:#334155;border:1px solid #cbd5e1}.table-wrap{overflow-x:auto;border:1px solid #e2e8f0;border-radius:14px;background:white}th{background:#f8fafc;color:#64748b;font-size:13px;font-weight:700;padding:12px 16px;white-space:nowrap;text-align:left}td{padding:13px 16px;border-top:1px solid #f1f5f9;font-size:14px;white-space:nowrap}.link-btn{color:#2563eb;font-size:13px;margin-right:10px}.danger{color:#dc2626}.tag{display:inline-flex;padding:3px 8px;border-radius:999px;font-size:12px;font-weight:600}
  </style>
</head>
<body>
  <main class="admin-content"><div class="p-6 max-w-[1680px] mx-auto">
    <div class="flex items-center justify-between mb-6">
      <div><div class="text-sm text-slate-500 mb-1">管理后台 / <span class="text-slate-800 font-medium">平台公告管理</span></div><h1 class="text-2xl font-bold text-slate-900">平台公告管理</h1><p class="text-sm text-slate-500 mt-1">维护平台公告，支持按分站范围发布。</p></div>
      <div class="flex gap-3"><button class="action-btn action-btn-secondary"><i class="fas fa-download"></i>导出数据</button><button class="action-btn action-btn-primary"><i class="fas fa-plus"></i>新增公告</button></div>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-5 mb-5">
      <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
        <input class="border border-slate-300 rounded-lg px-3 py-2 text-sm md:col-span-2" placeholder="搜索公告标题">
        <select class="border border-slate-300 rounded-lg px-3 py-2 text-sm"><option>全部类型</option><option>平台通知</option><option>政策公告</option><option>系统维护</option></select>
        <select class="border border-slate-300 rounded-lg px-3 py-2 text-sm"><option>全部分站</option><option>全平台</option><option>北京分站</option></select>
        <button class="action-btn action-btn-primary justify-center"><i class="fas fa-search"></i>查询</button>
      </div>
    </div>
    <div class="table-wrap"><table class="w-full">
      <thead><tr><th>公告标题</th><th>类型</th><th>发布分站</th><th>发布时间</th><th>有效期</th><th>状态</th><th>阅读量</th><th>操作</th></tr></thead>
      <tbody>
        <tr><td>关于五一期间物流时效调整的通知</td><td>平台通知</td><td><span class="tag bg-red-100 text-red-700">全平台</span></td><td>2026-04-25 10:00</td><td>2026-04-25 至 2026-05-08</td><td><span class="tag bg-green-100 text-green-700">已发布</span></td><td>2,845</td><td><button class="link-btn">查看</button><button class="link-btn">编辑</button><button class="link-btn">下线</button><button class="link-btn danger">删除</button></td></tr>
        <tr><td>北京分站办公耗材专项采购活动</td><td>活动通知</td><td><span class="tag bg-blue-100 text-blue-700">北京分站</span></td><td>2026-04-20 09:30</td><td>2026-04-20 至 2026-05-20</td><td><span class="tag bg-green-100 text-green-700">已发布</span></td><td>968</td><td><button class="link-btn">查看</button><button class="link-btn">编辑</button><button class="link-btn">下线</button><button class="link-btn danger">删除</button></td></tr>
        <tr><td>医疗专区供应商资质复核提醒</td><td>政策公告</td><td><span class="tag bg-purple-100 text-purple-700">医疗卫生专区</span></td><td>-</td><td>2026-05-01 至 2026-06-01</td><td><span class="tag bg-slate-100 text-slate-600">草稿</span></td><td>0</td><td><button class="link-btn">查看</button><button class="link-btn">编辑</button><button class="link-btn">发布</button><button class="link-btn danger">删除</button></td></tr>
      </tbody>
    </table></div>
  </div></main>
</body>
</html>
