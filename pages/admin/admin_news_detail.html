<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资讯详情 | 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../assets/custom.css">
  <style>
    body { font-family: "Microsoft YaHei", sans-serif; background: #f8fafc; color: #334155; }
    .admin-content { min-height: 100vh; }
    .tag { display: inline-flex; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .detail-card { background: white; border: 1px solid #e2e8f0; border-radius: 14px; padding: 24px; }
    .detail-body { font-size: 15px; line-height: 1.8; color: #334155; margin-top: 20px; white-space: pre-line; }
  </style>
</head>
<body>
  <main class="admin-content">
    <div class="p-6 max-w-[900px] mx-auto">
      <div class="mb-6">
        <a id="backList" href="admin_news_list.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 no-underline">
          <i class="fas fa-arrow-left"></i>返回列表
        </a>
      </div>
      <div class="detail-card">
        <div class="flex flex-wrap items-start justify-between gap-4">
          <h1 id="detailTitle" class="text-xl font-bold text-slate-900 leading-snug">国采平台 2026 年服务升级说明</h1>
          <span id="detailStatus" class="tag bg-green-100 text-green-700">已上架</span>
        </div>
        <div id="detailMeta" class="text-sm text-slate-500 mt-4 flex flex-wrap gap-x-6 gap-y-2"></div>
        <p id="detailSummary" class="text-sm text-slate-500 mt-2">摘要：本次升级聚焦结算时效、商品审核协同与消息触达能力，详见正文。</p>
        <div id="detailBody" class="detail-body">尊敬的各入驻单位：\n\n为持续保障交易合规与体验，平台将于近期分批上线结算节点可视化、商品上架 AI 预警说明与站内信模板优化等功能。具体排期以站内公告为准。\n\n（本文为静态原型示意文案。）</div>
      </div>
    </div>
  </main>
  <script>
    (function () {
      var samples = {
        'published-1': {
          title: '国采平台 2026 年服务升级说明',
          statusClass: 'tag bg-green-100 text-green-700',
          statusText: '已上架',
          meta: '发布范围：全平台　上架时间：2026-04-18 09:00　阅读量：12,560',
          summary: '摘要：本次升级聚焦结算时效、商品审核协同与消息触达能力，详见正文。',
          body: '尊敬的各入驻单位：\n\n为持续保障交易合规与体验，平台将于近期分批上线结算节点可视化、商品上架 AI 预警说明与站内信模板优化等功能。\n\n（静态原型示意。）'
        },
        'draft-1': {
          title: '区域分站供应链数字化实践（草稿）',
          statusClass: 'tag bg-slate-100 text-slate-600',
          statusText: '草稿',
          meta: '发布范围：华东分站　尚未上架',
          summary: '摘要：草稿态示例，可在编辑页修改后保存或上架。',
          body: '此处为草稿正文占位，保存草稿后运营可随时继续编辑。'
        },
        'offline-1': {
          title: '采购商常见问题与合规要点汇编',
          statusClass: 'tag bg-amber-100 text-amber-800',
          statusText: '已下架',
          meta: '发布范围：全平台　原上架：2026-03-10 11:20　阅读量：3,210',
          summary: '摘要：已下架内容可重新编辑并再次上架。',
          body: '下架后前台不可见；运营可编辑后重新上架。（静态原型。）'
        }
      };
      var id = new URLSearchParams(location.search).get('id');
      var d = samples[id] || samples['published-1'];
      document.getElementById('detailTitle').textContent = d.title;
      var st = document.getElementById('detailStatus');
      st.className = d.statusClass;
      st.textContent = d.statusText;
      document.getElementById('detailMeta').textContent = d.meta;
      document.getElementById('detailSummary').textContent = d.summary;
      document.getElementById('detailBody').textContent = d.body;

      if (new URLSearchParams(location.search).get('embed') === '1') {
        var b = document.getElementById('backList');
        var h = b.getAttribute('href');
        b.setAttribute('href', h + (h.indexOf('?') > -1 ? '&' : '?') + 'embed=1');
      }
    })();
  </script>
</body>
</html>
