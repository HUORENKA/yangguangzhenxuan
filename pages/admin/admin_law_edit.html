<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑法规 | 管理后台</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../assets/custom.css">
  <style>
    @layer utilities { .text-primary { color: #E2231A; } .bg-primary { background-color: #E2231A; } }
    body { font-family: "Microsoft YaHei", sans-serif; background: #f8fafc; color: #334155; }
    .admin-content { min-height: 100vh; }
    .action-btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
    .action-btn-primary { background: #E2231A; color: white; }
    .action-btn-secondary { background: white; color: #334155; border: 1px solid #cbd5e1; }
    .form-card { background: white; border: 1px solid #e2e8f0; border-radius: 14px; padding: 24px; border-top: 4px solid #E2231A; }
    .warn-banner { background: #fff7ed; border: 1px solid #fdba74; color: #9a3412; font-size: 13px; padding: 12px 14px; border-radius: 10px; margin-bottom: 16px; }
    .scope-multi-wrap { border: 1px solid #e2e8f0; border-radius: 12px; background: linear-gradient(180deg, #fafbfc 0%, #ffffff 48%); padding: 14px 16px 16px; }
    .scope-multi-grid { display: grid; gap: 10px; grid-template-columns: 1fr; }
    @media (min-width: 480px) { .scope-multi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    .scope-chip { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; transition: border-color .15s ease, box-shadow .15s ease, background .15s ease; }
    .scope-chip:hover { border-color: #fecaca; box-shadow: 0 1px 4px rgba(226, 35, 26, 0.07); }
    .scope-chip:has(input:checked) { border-color: #fb923c; background: #fff7f7; box-shadow: 0 0 0 1px rgba(226, 35, 26, 0.15); }
    .scope-chip input { width: 1rem; height: 1rem; border-radius: 4px; accent-color: #E2231A; flex-shrink: 0; }
    .scope-chip span { font-size: 13px; font-weight: 600; color: #334155; }
    @media (min-width: 480px) { .scope-multi-grid .scope-chip:nth-child(4) { grid-column: 1 / -1; } }
  </style>
</head>
<body>
  <main class="admin-content">
    <div class="p-6 max-w-[900px] mx-auto">
      <div class="flex items-center gap-4 mb-6">
        <a id="backList" href="admin_law_list.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 no-underline">
          <i class="fas fa-arrow-left"></i>返回列表
        </a>
        <span id="pageModeLabel" class="text-sm text-slate-500"></span>
      </div>

      <div id="lockBanner" class="warn-banner hidden">
        <i class="fas fa-lock mr-1"></i><strong>已发布</strong>的法规不可编辑。请先在列表中执行「下架」，再返回编辑。
      </div>

      <div class="form-card">
        <h1 id="formTitle" class="text-lg font-bold text-slate-900 mb-6">发布法规</h1>

        <div class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">法规标题 <span class="text-red-500">*</span></label>
            <input id="fieldTitle" type="text" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="请输入法规或政策标题">
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">文号</label>
              <input id="fieldDocNo" type="text" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="如：国令第 XXX 号、财库〔〕号">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">发文机关</label>
              <input id="fieldIssuer" type="text" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="请输入发文机关">
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">发布范围 <span class="text-red-500">*</span></label>
            <div id="fieldScopeGroup" class="scope-multi-wrap">
              <p class="text-xs text-slate-500 mb-3 flex items-start gap-1.5 leading-relaxed">
                <i class="fas fa-map-location-dot text-[#E2231A] mt-0.5 shrink-0" aria-hidden="true"></i>
                <span>支持<strong>多选</strong>，法规可投放至多个分站或专区；与列表筛选项一致。</span>
              </p>
              <div class="scope-multi-grid">
                <label class="scope-chip"><input type="checkbox" name="fieldScope" value="全平台"><span>全平台</span></label>
                <label class="scope-chip"><input type="checkbox" name="fieldScope" value="华东分站"><span>华东分站</span></label>
                <label class="scope-chip"><input type="checkbox" name="fieldScope" value="华北分站"><span>华北分站</span></label>
                <label class="scope-chip"><input type="checkbox" name="fieldScope" value="医疗卫生专区"><span>医疗卫生专区</span></label>
              </div>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">施行日期</label>
            <input id="fieldEffective" type="date" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm max-w-xs">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">法规正文文件 <span class="text-red-500">*</span></label>
            <p class="text-xs text-slate-500 mb-2">请上传 PDF、Word 等；单个文件建议不超过 50MB（原型不实际上传）。</p>
            <div id="uploadZone" class="rounded-xl border-2 border-dashed border-slate-200 bg-slate-50 px-6 py-8 text-center">
              <input type="file" id="fieldBodyFile" class="sr-only" accept=".pdf,.doc,.docx,application/pdf">
              <i class="fas fa-file-arrow-up text-2xl text-slate-400 mb-2 block"></i>
              <p class="text-sm text-slate-600 mb-3">拖拽文件到此处，或点击下方按钮选择</p>
              <button type="button" id="btnPickFile" class="action-btn action-btn-secondary text-sm" onclick="document.getElementById('fieldBodyFile').click()"><i class="fas fa-folder-open"></i>选择文件</button>
              <p id="fieldBodyFileName" class="mt-3 text-sm font-medium text-slate-700 break-all">未选择文件</p>
            </div>
          </div>
        </div>

        <div id="formActions" class="mt-8 flex flex-wrap gap-3">
          <button type="button" class="action-btn action-btn-secondary" onclick="alert('原型：已保存草稿')"><i class="fas fa-save"></i>保存草稿</button>
          <button type="button" class="action-btn action-btn-secondary" onclick="openLawEditPreviewModal()"><i class="fas fa-eye"></i>预览</button>
          <button type="button" class="action-btn action-btn-primary" onclick="alert('原型：已提交并发布')"><i class="fas fa-paper-plane"></i>保存并发布</button>
        </div>
      </div>
    </div>

    <div id="lawEditPreviewModal" class="fixed inset-0 z-[100] hidden" aria-modal="true" role="dialog" aria-labelledby="lawEditPreviewHeading">
      <div class="absolute inset-0 bg-slate-900/45" onclick="closeLawEditPreviewModal()"></div>
      <div class="absolute left-1/2 top-1/2 w-full max-w-md -translate-x-1/2 -translate-y-1/2 px-4">
        <div class="relative rounded-xl bg-white shadow-xl border border-slate-200 p-6">
          <div class="flex items-start gap-3">
            <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-red-50 text-[#E2231A]">
              <i class="fas fa-window-restore text-lg"></i>
            </div>
            <div class="min-w-0 flex-1">
              <h2 id="lawEditPreviewHeading" class="text-lg font-bold text-slate-900">预览说明</h2>
              <p class="mt-3 text-sm leading-relaxed text-slate-600">正式环境中，「预览」将在<strong class="text-slate-800">新窗口或新标签页</strong>打开前台<strong>法规详情页</strong>（或法规文件在线预览），以当前表单与上传文件为准展示效果。</p>
              <p class="mt-2 text-xs text-slate-500">本页为静态原型，此处用弹窗仅演示交互，不实际跳转。</p>
            </div>
          </div>
          <div class="mt-6 flex justify-end">
            <button type="button" class="action-btn action-btn-primary justify-center px-5" onclick="closeLawEditPreviewModal()">知道了</button>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script>
    (function () {
      window.openLawEditPreviewModal = function () {
        document.getElementById('lawEditPreviewModal').classList.remove('hidden');
      };
      window.closeLawEditPreviewModal = function () {
        document.getElementById('lawEditPreviewModal').classList.add('hidden');
      };

      var params = new URLSearchParams(location.search);
      var id = params.get('id');

      var draftData = {
        title: '框架协议采购合规指引（草稿）',
        docNo: '',
        issuer: '财政部（示例）',
        scope: ['华东分站', '华北分站'],
        effective: '',
        fileName: '框架协议采购合规指引（草稿）.pdf'
      };
      var offlineData = {
        title: '电子卖场管理办法（站内转载版）',
        docNo: '财库〔2024〕XX 号（示例）',
        issuer: '财政部（示例）',
        scope: ['全平台'],
        effective: '2024-01-01',
        fileName: '电子卖场管理办法-转载版.docx'
      };

      function setScopeChecks(values) {
        document.querySelectorAll('#fieldScopeGroup input[name="fieldScope"]').forEach(function (cb) {
          cb.checked = values.indexOf(cb.value) !== -1;
        });
      }
      function disableScopeChecks() {
        document.querySelectorAll('#fieldScopeGroup input[name="fieldScope"]').forEach(function (cb) {
          cb.disabled = true;
        });
      }

      var lockBanner = document.getElementById('lockBanner');
      var formActions = document.getElementById('formActions');
      var pageModeLabel = document.getElementById('pageModeLabel');

      if (!id) {
        document.getElementById('formTitle').textContent = '发布法规';
        pageModeLabel.textContent = '新建';
        return;
      }

      if (id === 'published-1') {
        document.getElementById('formTitle').textContent = '编辑法规（不可编辑）';
        pageModeLabel.textContent = '已发布 · 只读';
        lockBanner.classList.remove('hidden');
        document.getElementById('fieldTitle').value = '《政府采购法实施条例》要点导读';
        document.getElementById('fieldDocNo').value = '国令第 658 号（示例）';
        document.getElementById('fieldIssuer').value = '国务院';
        setScopeChecks(['全平台']);
        document.getElementById('fieldEffective').value = '2015-03-01';
        document.getElementById('fieldBodyFileName').textContent = '政府采购法实施条例要点导读-已发布.pdf（示例）';
        ['fieldTitle', 'fieldDocNo', 'fieldIssuer', 'fieldEffective'].forEach(function (fid) {
          document.getElementById(fid).disabled = true;
        });
        disableScopeChecks();
        document.getElementById('fieldBodyFile').disabled = true;
        document.getElementById('btnPickFile').disabled = true;
        document.getElementById('uploadZone').classList.add('opacity-75');
        formActions.innerHTML = '<button type="button" class="action-btn action-btn-secondary" onclick="openLawEditPreviewModal()"><i class="fas fa-eye"></i>预览</button><span class="text-sm text-slate-500 py-2">无可执行操作，请返回列表下架后再编辑。</span>';
        return;
      }

      if (id === 'draft-1') {
        document.getElementById('formTitle').textContent = '编辑法规';
        pageModeLabel.textContent = '草稿 · 可编辑';
        document.getElementById('fieldTitle').value = draftData.title;
        document.getElementById('fieldDocNo').value = draftData.docNo;
        document.getElementById('fieldIssuer').value = draftData.issuer;
        setScopeChecks(draftData.scope);
        document.getElementById('fieldEffective').value = draftData.effective;
        document.getElementById('fieldBodyFileName').textContent = draftData.fileName;
        return;
      }

      if (id === 'offline-1') {
        document.getElementById('formTitle').textContent = '编辑法规';
        pageModeLabel.textContent = '已下架 · 可编辑';
        document.getElementById('fieldTitle').value = offlineData.title;
        document.getElementById('fieldDocNo').value = offlineData.docNo;
        document.getElementById('fieldIssuer').value = offlineData.issuer;
        setScopeChecks(offlineData.scope);
        document.getElementById('fieldEffective').value = offlineData.effective;
        document.getElementById('fieldBodyFileName').textContent = offlineData.fileName;
        return;
      }

      pageModeLabel.textContent = '编辑';
    })();

    document.getElementById('fieldBodyFile').addEventListener('change', function () {
      if (this.disabled) return;
      if (this.files && this.files[0]) {
        document.getElementById('fieldBodyFileName').textContent = this.files[0].name;
      }
    });

    (function () {
      if (new URLSearchParams(location.search).get('embed') !== '1') return;
      var b = document.getElementById('backList');
      var h = b.getAttribute('href');
      b.setAttribute('href', h + (h.indexOf('?') > -1 ? '&' : '?') + 'embed=1');
    })();
  </script>
</body>
</html>
