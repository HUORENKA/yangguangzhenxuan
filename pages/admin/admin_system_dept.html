<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>部门管理 | 系统管理 | 管理后台</title>

  <link rel="stylesheet" href="../../assets/custom.css">
  <link rel="stylesheet" href="../../assets/system_rbac.css">
  <style>
    @layer utilities { .text-primary { color: #E2231A; } }
    body { background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%); color: #0f172a; }
    .admin-sidebar { position: fixed; left: 0; top: 0; width: 240px; height: 100vh; background: #1e293b; color: white; transition: width 0.3s; z-index: 100; overflow-y: auto; }
    .admin-sidebar.collapsed { width: 64px; }
    .admin-sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; }
    .admin-sidebar-logo { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 16px; white-space: nowrap; }
    .admin-sidebar.collapsed .admin-sidebar-logo span { opacity: 0; width: 0; overflow: hidden; }
    .admin-sidebar-toggle { background: rgba(255,255,255,0.1); border: none; color: white; width: 32px; height: 32px; border-radius: 4px; cursor: pointer; }
    .admin-menu-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: rgba(255,255,255,0.8); text-decoration: none; white-space: nowrap; }
    .admin-menu-item:hover { background: rgba(255,255,255,0.1); color: white; }
    .admin-menu-item.active { background: rgba(226,35,26,0.2); color: white; border-left: 3px solid #E2231A; }
    .admin-menu-item i { width: 20px; text-align: center; }
    .admin-sidebar.collapsed .admin-menu-item span { opacity: 0; width: 0; overflow: hidden; }
    .admin-content { margin-left: 240px; transition: margin-left 0.3s; min-height: 100vh; }
    .admin-sidebar.collapsed ~ .admin-content { margin-left: 64px; }
    .page-card { background: #fff; border: 1px solid rgba(15,23,42,0.06); border-radius: 18px; box-shadow: 0 12px 30px rgba(15,23,42,0.05); }
    .action-btn { display: inline-flex; align-items: center; gap: 8px; border-radius: 12px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
    .action-btn-primary { color: #fff; background: linear-gradient(135deg, #ef4444, #dc2626); }
    .action-btn-secondary { color: #475569; background: #fff; border: 1px solid #dbe2ea; }
    .action-btn-danger { color: #b91c1c; background: #fff; border: 1px solid #fecaca; }
    .filter-input { height: 38px; padding: 0 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 13px; width: 100%; }
    .btn-sm { height: 34px; padding: 0 14px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid #dbe2ea; background: #fff; }
    .btn-sm-primary { background: linear-gradient(135deg,#ef4444,#dc2626); color: #fff; border: none; }
    html.admin-embed-mode .admin-sidebar { display: none !important; }
    html.admin-embed-mode .admin-content { margin-left: 0 !important; }
  </style>
</head>
<body>
<script>
  (function () {
    var embedded = new URLSearchParams(location.search).get('embed') === '1';
    if (embedded) {
      document.documentElement.classList.add('admin-embed-mode');
      document.querySelectorAll('a[href]').forEach(function (a) {
        var h = a.getAttribute('href');
        if (!h || /^https?:\/\//i.test(h) || h.indexOf('javascript:') === 0 || h.charAt(0) === '#') return;
        if (h.indexOf('embed=') !== -1 || h.indexOf('.html') === -1) return;
        a.setAttribute('href', h + (h.indexOf('?') > -1 ? '&' : '?') + 'embed=1');
      });
    }
  })();
</script>

<div class="admin-sidebar" id="adminSidebar">
  <div class="admin-sidebar-header">
    <div class="admin-sidebar-logo"><i class="fas fa-cog"></i><span>管理后台</span></div>
    <button type="button" class="admin-sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-chevron-left" id="sidebarToggleIcon"></i></button>
  </div>
  <nav class="admin-menu">
    <a href="admin_dashboard.html" class="admin-menu-item"><i class="fas fa-home"></i><span>工作台首页</span></a>
    <a href="admin_station.html" class="admin-menu-item"><i class="fas fa-sitemap"></i><span>分站管理</span></a>
    <a href="admin_supplier_manage.html" class="admin-menu-item"><i class="fas fa-store"></i><span>供应商管理</span></a>
    <a href="admin_buyer_manage.html" class="admin-menu-item"><i class="fas fa-users"></i><span>采购商管理</span></a>
    <a href="admin_product_audit_list.html" class="admin-menu-item"><i class="fas fa-boxes-stacked"></i><span>商品上架审核</span></a>
    <a href="admin_notice.html" class="admin-menu-item"><i class="fas fa-bullhorn"></i><span>平台公告管理</span></a>
    <a href="admin_po.html" class="admin-menu-item"><i class="fas fa-file-invoice"></i><span>采购单管理</span></a>
    <a href="admin_orders.html" class="admin-menu-item"><i class="fas fa-shopping-bag"></i><span>订单管理</span></a>
    <a href="admin_settlement.html" class="admin-menu-item"><i class="fas fa-calculator"></i><span>结算管理</span></a>
    <div class="admin-menu-group-title">系统管理</div>
    <a href="admin_system_user.html" class="admin-menu-item"><i class="fas fa-user-gear"></i><span>用户管理</span></a>
    <a href="admin_system_role.html" class="admin-menu-item"><i class="fas fa-user-shield"></i><span>角色管理</span></a>
    <a href="admin_system_dept.html" class="admin-menu-item active"><i class="fas fa-building"></i><span>部门管理</span></a>
    <a href="admin_cockpit.html" class="admin-menu-item" target="_blank"><i class="fas fa-tachometer-alt"></i><span>数据驾驶舱</span></a>
  </nav>
</div>

<div class="admin-content">
  <div class="p-6 max-w-[1920px] mx-auto">
    <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
      <div class="text-sm text-slate-500 mb-1">
        <a href="admin_dashboard.html" class="hover:text-primary">管理后台</a>
        <span class="mx-2">/</span><span id="breadcrumbScope">供应商管理</span>
        <span class="mx-2">/</span><span class="font-medium text-slate-700">部门管理</span>
      </div>
      <h1 class="text-2xl font-bold text-slate-900" id="pageTitle">部门列表</h1>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      <div class="lg:col-span-5 page-card p-4">
        <div class="flex flex-wrap gap-2 mb-3 items-center">
          <button type="button" class="action-btn action-btn-primary" onclick="startAddDept()"><i class="fas fa-plus"></i>新增部门</button>
          <div class="relative flex-1 min-w-[120px]">
            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
            <input type="text" id="deptSearch" class="filter-input pl-8" placeholder="搜索部门名称" oninput="renderDeptTree()">
          </div>
          <button type="button" class="action-btn action-btn-secondary" onclick="expandAll(true)"><i class="fas fa-angles-down"></i>展开</button>
          <button type="button" class="action-btn action-btn-secondary" onclick="expandAll(false)"><i class="fas fa-angles-up"></i>折叠</button>
        </div>
        <div id="deptTreePanel"></div>
      </div>

      <div class="lg:col-span-7 page-card p-6">
        <div class="flex flex-wrap justify-between items-center gap-2 mb-5">
          <h2 class="text-lg font-bold text-slate-800" id="formTitle">部门信息</h2>
          <div class="flex flex-wrap gap-2" id="formToolbar">
            <button type="button" class="action-btn action-btn-danger" id="btnDeleteDept" style="display:none;" onclick="deleteDept()"><i class="fas fa-trash"></i>删除</button>
          </div>
        </div>

        <div id="formEmpty" class="dept-form-empty">
          <i class="fas fa-hand-pointer text-3xl mb-3"></i>
          <p>请在左侧选择部门，或点击「新增部门」</p>
        </div>

        <form id="deptForm" style="display:none;" onsubmit="return saveDept(event)">
          <input type="hidden" id="fDeptId">
          <input type="hidden" id="fParentId">
          <input type="hidden" id="formMode" value="view">
          <div class="rbac-form-item">
            <label>上级部门</label>
            <div id="parentDeptCascader"></div>
          </div>
          <div class="rbac-form-item">
            <label><span class="req">*</span>部门名称</label>
            <input type="text" id="fLabel" class="rbac-form-input" placeholder="请输入部门名称" required>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div class="rbac-form-item">
              <label>显示顺序</label>
              <input type="number" id="fSort" class="rbac-form-input" value="1" min="0">
            </div>
            <div class="rbac-form-item">
              <label>部门状态</label>
              <div class="rbac-radio-group pt-2">
                <label><input type="radio" name="fDeptStatus" value="0" checked> 正常</label>
                <label><input type="radio" name="fDeptStatus" value="1"> 停用</label>
              </div>
            </div>
          </div>
          <div class="flex justify-end gap-2 mt-6 pt-4 border-t border-slate-100">
            <button type="button" class="btn-sm" onclick="cancelForm()">取消</button>
            <button type="submit" class="btn-sm btn-sm-primary">保存</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="../../assets/system_rbac_data.js"></script>
<script src="../../assets/system_rbac_ui.js"></script>
<script>
  var SCOPE = SystemRbac.getPageScope();
  var SCOPE_LABEL = SystemRbac.getScopeLabel(SCOPE);
  var depts = [];
  var selectedId = '';
  var treeExpanded = true;

  function initPageMeta() {
    var bc = document.getElementById('breadcrumbScope');
    var title = document.getElementById('pageTitle');
    if (bc) bc.textContent = SCOPE_LABEL + '管理';
    if (title) title.textContent = SCOPE_LABEL + '管理 / 部门列表';
    document.title = SCOPE_LABEL + '管理 / 部门管理 | 管理后台';
  }

  function loadDepts() {
    depts = SystemRbac.getDepts(SCOPE);
    renderDeptTree();
  }

  function renderDeptTree() {
    var kw = document.getElementById('deptSearch').value;
    SystemRbacUi.renderDeptManageTree(document.getElementById('deptTreePanel'), depts, {
      selectedId: selectedId,
      keyword: kw,
      expanded: treeExpanded,
      onSelect: function (id) {
        selectedId = id;
        document.getElementById('formMode').value = 'view';
        showDeptForm(id);
        renderDeptTree();
      }
    });
  }

  function expandAll(flag) {
    treeExpanded = flag;
    SystemRbacUi.toggleDeptTreeExpand(document.getElementById('deptTreePanel'), flag);
    renderDeptTree();
  }

  var parentCascaderEl = null;

  function initParentCascader(parentId) {
    parentCascaderEl = document.getElementById('parentDeptCascader');
    SystemRbacUi.renderDeptCascader(parentCascaderEl, depts, parentId || '0', {
      allowRoot: true,
      placeholder: '请选择上级部门',
      getPath: function (id) { return SystemRbac.getDeptPath(depts, id); },
      onChange: function (id) {
        document.getElementById('fParentId').value = id || '0';
      }
    });
  }

  function showDeptForm(id) {
    var node = id ? SystemRbac.findDeptNode(depts, id) : null;
    var mode = document.getElementById('formMode').value;
    document.getElementById('formEmpty').style.display = 'none';
    document.getElementById('deptForm').style.display = '';
    document.getElementById('btnDeleteDept').style.display = (node && mode === 'view') ? '' : 'none';

    if (mode === 'add') {
      document.getElementById('formTitle').textContent = '新增部门';
      document.getElementById('fDeptId').value = '';
      document.getElementById('fParentId').value = id || '0';
      initParentCascader(id || '0');
      document.getElementById('fLabel').value = '';
      document.getElementById('fSort').value = '1';
      document.querySelector('input[name="fDeptStatus"][value="0"]').checked = true;
      setFormReadonly(false);
      return;
    }

    if (!node) return;
    document.getElementById('formTitle').textContent = '编辑部门';
    document.getElementById('fDeptId').value = node.id;
    document.getElementById('fParentId').value = node.parentId || '0';
    initParentCascader(node.parentId || '0');
    document.getElementById('fLabel').value = node.label;
    document.getElementById('fSort').value = node.sort != null ? node.sort : 1;
    document.querySelector('input[name="fDeptStatus"][value="' + (node.status || '0') + '"]').checked = true;
    setFormReadonly(false);
  }

  function setFormReadonly(ro) {
    ['fLabel', 'fSort'].forEach(function (id) {
      document.getElementById(id).readOnly = ro;
    });
    document.querySelectorAll('input[name="fDeptStatus"]').forEach(function (r) { r.disabled = ro; });
  }

  function startAddDept() {
    var parent = selectedId || (depts[0] && depts[0].id) || '';
    if (!parent && !depts.length) {
      document.getElementById('formMode').value = 'add';
      selectedId = '0';
      showDeptForm('0');
      return;
    }
    if (!selectedId) {
      SystemRbacUi.toast('请先选择上级部门', 'warn');
      return;
    }
    document.getElementById('formMode').value = 'add';
    showDeptForm(selectedId);
  }

  function cancelForm() {
    document.getElementById('formMode').value = 'view';
    if (selectedId) showDeptForm(selectedId);
    else {
      document.getElementById('deptForm').style.display = 'none';
      document.getElementById('formEmpty').style.display = '';
      document.getElementById('btnDeleteDept').style.display = 'none';
    }
  }

  function saveDept(e) {
    e.preventDefault();
    var mode = document.getElementById('formMode').value;
    var label = document.getElementById('fLabel').value.trim();
    if (!label) { SystemRbacUi.toast('请填写部门名称', 'warn'); return false; }

    var payload = {
      label: label,
      sort: parseInt(document.getElementById('fSort').value, 10) || 1,
      status: document.querySelector('input[name="fDeptStatus"]:checked').value,
      children: []
    };

    if (mode === 'add') {
      var parentId = document.getElementById('fParentId').value;
      payload.id = SystemRbac.genId('d_' + SCOPE.slice(0, 2));
      payload.parentId = parentId === '0' ? '0' : parentId;
      if (parentId === '0') {
        depts.push(payload);
      } else {
        var parent = SystemRbac.findDeptNode(depts, parentId);
        if (!parent) { SystemRbacUi.toast('上级部门不存在', 'warn'); return false; }
        if (!parent.children) parent.children = [];
        parent.children.push(payload);
      }
      selectedId = payload.id;
      SystemRbacUi.toast('新增成功', 'success');
    } else {
      var id = document.getElementById('fDeptId').value;
      var node = SystemRbac.findDeptNode(depts, id);
      if (!node) return false;
      node.label = payload.label;
      node.sort = payload.sort;
      node.status = payload.status;
      SystemRbacUi.toast('保存成功', 'success');
    }

    SystemRbac.saveDepts(SCOPE, depts);
    document.getElementById('formMode').value = 'view';
    loadDepts();
    showDeptForm(selectedId);
    return false;
  }

  function deleteDept() {
    var id = document.getElementById('fDeptId').value;
    if (!id) return;
    var node = SystemRbac.findDeptNode(depts, id);
    if (!node) return;
    if (node.children && node.children.length) {
      SystemRbacUi.toast('存在下级部门，无法删除', 'warn');
      return;
    }
    var userCount = SystemRbac.countUsersInDept(SCOPE === 'buyer' ? 'buyer' : 'supplier', id, false, SCOPE);
    if (userCount > 0) {
      SystemRbacUi.toast('该部门下还有 ' + userCount + ' 个用户，无法删除', 'warn');
      return;
    }
    if (!confirm('确定删除部门「' + node.label + '」？')) return;
    SystemRbac.removeDeptById(depts, id);
    SystemRbac.saveDepts(SCOPE, depts);
    selectedId = '';
    document.getElementById('deptForm').style.display = 'none';
    document.getElementById('formEmpty').style.display = '';
    document.getElementById('btnDeleteDept').style.display = 'none';
    loadDepts();
    SystemRbacUi.toast('已删除', 'success');
  }

  function toggleSidebar() {
    document.getElementById('adminSidebar').classList.toggle('collapsed');
  }

  document.addEventListener('DOMContentLoaded', function () {
    initPageMeta();
    loadDepts();
    if (depts[0]) {
      selectedId = depts[0].id;
      showDeptForm(selectedId);
      renderDeptTree();
    }
  });
</script>
</body>
</html>
