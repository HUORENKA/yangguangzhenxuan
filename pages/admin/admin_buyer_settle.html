<script>
(function () {
  var embedded = new URLSearchParams(location.search).get('embed') === '1';
  if (embedded) {
    document.documentElement.classList.add('admin-embed-mode');
    document.querySelectorAll('a[href]').forEach(function (a) {
      var h = a.getAttribute('href');
      if (!h || /^https?:\/\//i.test(h) || h.indexOf('javascript:') === 0 || h.charAt(0) === '#') return;
      if (h.indexOf('.html') === -1) return;
      if (h.indexOf('embed=') !== -1) return;
      a.setAttribute('href', h + (h.indexOf('?') > -1 ? '&' : '?') + 'embed=1');
    });
  }
  window.withAdminEmbed = function (href) {
    if (!embedded) return href;
    var q = href.indexOf('?');
    var base = q === -1 ? href : href.slice(0, q);
    var params = new URLSearchParams(q === -1 ? '' : href.slice(q + 1));
    params.set('embed', '1');
    var s = params.toString();
    return s ? base + '?' + s : base + '?embed=1';
  };
})();
</script>

<script>
let dialogConfirmHandler = null;
var buyerLicenseUploaded = false;

function markBuyerLicenseUploaded() {
  buyerLicenseUploaded = true;
  var hint = document.getElementById('buyerLicenseHint');
  hint.innerHTML = '<span class="text-green-600 font-semibold"><i class="fas fa-circle-check"></i> 演示：已标记营业执照已上传</span>';
  var z = document.getElementById('buyerLicenseZone');
  z.style.borderColor = '#86efac';
  z.style.background = '#f0fdf4';
}

function showDialog(opts) {
  var title = opts.title || '提示';
  var message = opts.message || '';
  var type = opts.type || 'info';
  var cancelText = opts.cancelText || '';
  var confirmText = opts.confirmText || '确定';
  var icons = {
    info: ['info', 'fa-circle-info'],
    success: ['success', 'fa-circle-check'],
    warn: ['warn', 'fa-triangle-exclamation'],
    error: ['warn', 'fa-circle-xmark']
  };
  var ic = icons[type] || icons.info;
  document.getElementById('dialogIcon').className = 'dialog-icon ' + ic[0];
  document.getElementById('dialogIcon').innerHTML = '<i class="fas ' + ic[1] + '"></i>';
  document.getElementById('dialogTitle').textContent = title;
  document.getElementById('dialogBody').textContent = message;
  document.getElementById('dialogConfirmBtn').textContent = confirmText;
  var c = document.getElementById('dialogCancelBtn');
  if (cancelText) {
    c.style.display = 'inline-flex';
    c.textContent = cancelText;
  } else {
    c.style.display = 'none';
  }
  dialogConfirmHandler = opts.onConfirm || null;
  document.getElementById('dialogOverlay').classList.add('show');
}

function closeDialog(confirmed) {
  document.getElementById('dialogOverlay').classList.remove('show');
  if (confirmed && typeof dialogConfirmHandler === 'function') {
    dialogConfirmHandler();
  }
  dialogConfirmHandler = null;
}

document.getElementById('dialogCancelBtn').onclick = function () {
  dialogConfirmHandler = null;
  document.getElementById('dialogOverlay').classList.remove('show');
};

function toggleSidebar() {
  var sidebar = document.getElementById('adminSidebar');
  var icon = document.getElementById('sidebarToggleIcon');
  sidebar.classList.toggle('collapsed');
  icon.classList.toggle('fa-chevron-left');
  icon.classList.toggle('fa-chevron-right');
  localStorage.setItem('adminSidebarCollapsed', sidebar.classList.contains('collapsed'));
}

function validateBuyerAccountBlock() {
  if (!(document.getElementById('settleStation').value || '').trim()) {
    showDialog({ title: '提示', message: '请选择入驻分站（必选）。', type: 'warn' });
    return false;
  }
  var nm = (document.getElementById('applicantName').value || '').trim();
  if (!nm) {
    showDialog({ title: '提示', message: '请填写申请人姓名。', type: 'warn' });
    return false;
  }
  var mb = (document.getElementById('applicantMobile').value || '').trim();
  if (!/^1\d{10}$/.test(mb)) {
    showDialog({ title: '提示', message: '请填写正确的申请人手机号（11位）。', type: 'warn' });
    return false;
  }
  if (!(document.getElementById('applicantSmsCode').value || '').trim()) {
    showDialog({ title: '提示', message: '请填写短信验证码。', type: 'warn' });
    return false;
  }
  var p1 = document.getElementById('applicantPwd').value || '';
  var p2 = document.getElementById('applicantPwdConfirm').value || '';
  if (p1.length < 6) {
    showDialog({ title: '提示', message: '请设置不少于 6 位的登录密码。', type: 'warn' });
    return false;
  }
  if (p1 !== p2) {
    showDialog({ title: '提示', message: '两次输入的登录密码不一致。', type: 'warn' });
    return false;
  }
  if (!(document.getElementById('buyerOrgName').value || '').trim()) {
    showDialog({ title: '提示', message: '请填写采购商名称。', type: 'warn' });
    return false;
  }
  if (!(document.getElementById('buyerType').value || '').trim()) {
    showDialog({ title: '提示', message: '请选择采购商类型。', type: 'warn' });
    return false;
  }
  if (!(document.getElementById('buyerCreditCode').value || '').trim()) {
    showDialog({ title: '提示', message: '请填写统一社会信用代码。', type: 'warn' });
    return false;
  }
  if (!(document.getElementById('entContact').value || '').trim()) {
    showDialog({ title: '提示', message: '请填写企业联系人。', type: 'warn' });
    return false;
  }
  if (!/^1\d{10}$/.test((document.getElementById('entPhone').value || '').trim())) {
    showDialog({ title: '提示', message: '请填写正确的企业联系电话（11位）。', type: 'warn' });
    return false;
  }
  return true;
}

function sendRegisterSmsBuyer() {
  var mb = (document.getElementById('applicantMobile').value || '').trim();
  if (!/^1\d{10}$/.test(mb)) {
    showDialog({ title: '提示', message: '请先填写正确的申请人手机号。', type: 'warn' });
    return;
  }
  var btn = document.getElementById('btnSendSmsRegisterBuyer');
  if (btn.dataset.counting === '1') return;
  btn.dataset.counting = '1';
  var sec = 60;
  btn.disabled = true;
  if (btn._smsTimer) clearInterval(btn._smsTimer);
  var tick = function () {
    btn.innerHTML = '<i class="fas fa-paper-plane"></i><span>' + sec + 's</span>';
    sec--;
    if (sec <= 0) {
      clearInterval(btn._smsTimer);
      btn._smsTimer = null;
      btn.dataset.counting = '';
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane"></i><span>发送验证码</span>';
    }
  };
  tick();
  btn._smsTimer = setInterval(tick, 1000);
  showDialog({ title: '演示', message: '已向手机号 ' + mb + ' 发送采购商注册场景验证码（静态原型）。', type: 'info' });
}

function submitBuyerOnboarding() {
  if (!validateBuyerAccountBlock()) return;
  if (!buyerLicenseUploaded) {
    showDialog({ title: '提示', message: '请先上传采购单位营业执照（点击上传区域模拟）。', type: 'warn' });
    return;
  }
  showDialog({
    title: '确认提交',
    message: '将以当前内容提交采购商入驻审核，确认后继续。',
    type: 'info',
    cancelText: '取消',
    confirmText: '确认提交',
    onConfirm: function () {
      showDialog({
        title: '已提交',
        message: '采购商入驻资料已记入运营侧待审队列。\n前台用户需待审核通过后，方可使用手机号与密码登录。',
        type: 'success',
        onConfirm: function () {
          window.location.href = withAdminEmbed('admin_buyer_manage.html');
        }
      });
    }
  });
}

function openRejectBuyerModal() {
  var ta = document.getElementById('rejectBuyerReasonInput');
  if (ta) ta.value = '';
  updateRejectBuyerReasonCount();
  document.getElementById('rejectBuyerOverlay').classList.add('show');
}

function closeRejectBuyerModal() {
  document.getElementById('rejectBuyerOverlay').classList.remove('show');
}

function updateRejectBuyerReasonCount() {
  var ta = document.getElementById('rejectBuyerReasonInput');
  var el = document.getElementById('rejectBuyerReasonCount');
  if (ta && el) el.textContent = String((ta.value || '').length);
}

function submitRejectBuyer() {
  var v = document.getElementById('rejectBuyerReasonInput').value.trim();
  if (!v) {
    showDialog({ title: '提示', message: '请填写驳回理由。', type: 'warn' });
    return;
  }
  closeRejectBuyerModal();
  showDialog({
    title: '已驳回入驻申请',
    message: '已向采购单位发送驳回通知（演示）。\n\n驳回理由：\n' + v,
    type: 'info',
    confirmText: '返回采购商列表',
    onConfirm: function () {
      window.location.href = withAdminEmbed('admin_buyer_manage.html');
    }
  });
}

function passBuyerApplication() {
  if (!validateBuyerAccountBlock()) return;
  if (!buyerLicenseUploaded) {
    showDialog({ title: '提示', message: '请先确认采购单位营业执照已上传后再通过入驻申请。', type: 'warn' });
    return;
  }
  showDialog({
    title: '通过入驻申请',
    message: '确认通过后该采购单位将正式上线，可使用注册手机号登录采购端（演示）。',
    type: 'info',
    cancelText: '取消',
    confirmText: '确认通过',
    onConfirm: function () {
      showDialog({
        title: '审核已通过',
        message: '已通过采购商入驻申请（演示）。',
        type: 'success',
        confirmText: '返回采购商列表',
        onConfirm: function () {
          window.location.href = withAdminEmbed('admin_buyer_manage.html');
        }
      });
    }
  });
}

document.addEventListener('DOMContentLoaded', function () {
  var saved = localStorage.getItem('adminSidebarCollapsed');
  if (saved === 'true') {
    document.getElementById('adminSidebar').classList.add('collapsed');
    document.getElementById('sidebarToggleIcon').classList.replace('fa-chevron-left', 'fa-chevron-right');
  }
  var bid = new URLSearchParams(location.search).get('id');
  var hintEl = document.getElementById('buyerEditHint');
  if (bid && hintEl) {
    hintEl.textContent = '演示：办理采购商 ' + bid + ' 的入驻审核（真实环境将加载对应资料）。';
    hintEl.classList.remove('hidden');
  }
  var auditBar = document.getElementById('buyerAuditActions');
  var draftBtn = document.getElementById('buyerSubmitDraftBtn');
  if (bid && auditBar && draftBtn) {
    draftBtn.classList.add('hidden');
    auditBar.classList.remove('hidden');
    auditBar.classList.add('flex');
  }
  var rta = document.getElementById('rejectBuyerReasonInput');
  if (rta) rta.addEventListener('input', updateRejectBuyerReasonCount);
});

document.getElementById('dialogOverlay').addEventListener('click', function (e) {
  if (e.target.id === 'dialogOverlay') dialogConfirmHandler = null, this.classList.remove('show');
});

document.getElementById('dialogConfirmBtn').onclick = function () {
  var fn = dialogConfirmHandler;
  document.getElementById('dialogOverlay').classList.remove('show');
  dialogConfirmHandler = null;
  if (typeof fn === 'function') fn();
};
</script>
