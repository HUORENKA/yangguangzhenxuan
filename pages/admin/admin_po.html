<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>采购单管理 | 管理后台</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: "Microsoft YaHei", sans-serif; background: #f8fafc; color: #334155; }
    .admin-content { min-height: 100vh; }
    html.admin-embed-mode .admin-sidebar { display: none !important; }
    html.admin-embed-mode .admin-content { margin-left: 0 !important; }
    .stat-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 18px;
    }
    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      background: #E2231A;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    .action-btn:hover { filter: brightness(1.03); }
    .action-btn-ghost {
      background: white;
      color: #475569;
      border: 1px solid #dbe2ea;
    }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      background: white;
    }
    th {
      background: #f8fafc;
      color: #64748b;
      font-size: 13px;
      font-weight: 700;
      padding: 12px 16px;
      white-space: nowrap;
      text-align: left;
    }
    td {
      padding: 13px 16px;
      border-top: 1px solid #f1f5f9;
      font-size: 14px;
      vertical-align: top;
    }
    td.nowrap-cell { white-space: nowrap; }
    .tag {
      display: inline-flex;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
  </style>
</head>
<body>
<script>
  (function () {
    var embedded = new URLSearchParams(location.search).get('embed') === '1';
    if (!embedded) return;
    document.documentElement.classList.add('admin-embed-mode');
    document.querySelectorAll('a[href]').forEach(function (a) {
      var h = a.getAttribute('href');
      if (!h || /^https?:\/\//i.test(h) || h.indexOf('javascript:') === 0 || h.charAt(0) === '#') return;
      if (h.indexOf('embed=') !== -1) return;
      if (h.indexOf('.html') === -1) return;
      a.setAttribute('href', h + (h.indexOf('?') > -1 ? '&' : '?') + 'embed=1');
    });
  })();
</script>

<main class="admin-content">
  <div class="p-6 max-w-[1680px] mx-auto">
    <div class="mb-6">
      <div class="text-sm text-slate-500 mb-1">
        <a href="admin_dashboard.html" class="hover:text-[#E2231A] transition-colors">管理后台</a>
        <span class="mx-1">/</span>
        <span class="text-slate-800 font-medium">采购单管理</span>
      </div>
      <div>
        <h1 class="text-2xl font-bold text-slate-900">采购单管理</h1>
        <p class="text-sm text-slate-500 mt-1">全平台采购单监管视图，仅支持查看。</p>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">
      <div class="stat-card">
        <div class="text-sm text-slate-500">采购单总数</div>
        <div class="text-3xl font-bold text-slate-900 mt-2">12,860</div>
      </div>
      <div class="stat-card">
        <div class="text-sm text-slate-500">待审核采购单</div>
        <div class="text-3xl font-bold text-orange-500 mt-2">386</div>
      </div>
      <div class="stat-card">
        <div class="text-sm text-slate-500">已通过采购单</div>
        <div class="text-3xl font-bold text-green-600 mt-2">11,240</div>
      </div>
      <div class="stat-card">
        <div class="text-sm text-slate-500">驳回采购单</div>
        <div class="text-3xl font-bold text-red-600 mt-2">324</div>
      </div>
      <div class="stat-card">
        <div class="text-sm text-slate-500">采购单总金额</div>
        <div class="text-3xl font-bold text-blue-600 mt-2">¥8,520万</div>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm p-5 mb-5 border border-slate-100">
      <div class="text-xs font-bold text-slate-400 uppercase tracking-wide mb-3">筛查条件</div>
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-12 gap-4 items-end">
        <div class="xl:col-span-4">
          <label class="block text-xs text-slate-500 mb-1">关键字</label>
          <input id="fltKeyword" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm"
            placeholder="采购单号 / 采购方 / 供应商">
        </div>
        <div class="xl:col-span-3">
          <label class="block text-xs text-slate-500 mb-1">分站</label>
          <select id="fltStation" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white">
            <option value="">全部分站</option>
          </select>
        </div>
        <div class="xl:col-span-3">
          <label class="block text-xs text-slate-500 mb-1">采购单状态</label>
          <select id="fltStatus" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white">
            <option value="">全部状态</option>
            <option value="pending">待审核</option>
            <option value="passed">已通过</option>
            <option value="rejected">已驳回</option>
          </select>
        </div>
      </div>
      <div class="flex flex-wrap gap-3 mt-4">
        <button type="button" class="action-btn" onclick="applyPoFilters(true)"><i class="fas fa-search"></i>查询</button>
        <button type="button" class="action-btn action-btn-ghost" onclick="resetPoFilters()">重置</button>
        <span id="fltResultTip" class="text-sm text-slate-500 self-center"></span>
      </div>
    </div>

    <div class="table-wrap">
      <table class="w-full">
        <thead>
          <tr>
            <th>采购单号</th>
            <th>所属分站</th>
            <th>采购方</th>
            <th>供应商</th>
            <th>商品数量</th>
            <th>采购金额</th>
            <th>采购单状态</th>
            <th>创建时间</th>
          </tr>
        </thead>
        <tbody id="poTableBody"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
  function fmtMoney(n) {
    return '¥' + n.toLocaleString('zh-CN');
  }

  var PO_DEMO_ROWS = [
    {
      po: 'PO20260427001', station: '北京分站', buyer: '北京市某某局采购中心', supplier: '得力办公旗舰店',
      qty: 18, amt: 128600, status: 'passed', created: '2026-04-27 09:30'
    },
    {
      po: 'PO20260426018', station: '医疗卫生专区', buyer: '某某公立医院', supplier: '惠普设备专营店',
      qty: 6, amt: 86400, status: 'pending', created: '2026-04-26 16:20'
    },
    {
      po: 'PO20260425102', station: '北京分站', buyer: '北京市某某局采购中心', supplier: '华东数码设备有限公司',
      qty: 120, amt: 1860000, status: 'pending', created: '2026-04-25 10:15'
    },
    {
      po: 'PO20260425072', station: '教育装备专区', buyer: '海淀区某某高级中学', supplier: '晨光文具供应商',
      qty: 42, amt: 34860, status: 'rejected', created: '2026-04-25 11:02'
    },
    {
      po: 'PO20260424055', station: '教育装备专区', buyer: '海淀区某某高级中学', supplier: '晨光文具供应商',
      qty: 8, amt: 5980, status: 'passed', created: '2026-04-24 14:30'
    },
    {
      po: 'PO20260423088', station: '医疗卫生专区', buyer: '某某区疾控中心', supplier: '国械标准耗材专营',
      qty: 220, amt: 412000, status: 'pending', created: '2026-04-23 09:00'
    }
  ];

  function statusLabel(s) {
    if (s === 'pending') return { text: '待审核', cls: 'bg-orange-100 text-orange-700' };
    if (s === 'passed') return { text: '已通过', cls: 'bg-green-100 text-green-700' };
    if (s === 'rejected') return { text: '已驳回', cls: 'bg-red-100 text-red-700' };
    return { text: s, cls: 'bg-slate-100 text-slate-600' };
  }

  function buildStationOptions() {
    var sel = document.getElementById('fltStation');
    var set = {};
    PO_DEMO_ROWS.forEach(function (r) { set[r.station] = 1; });
    Object.keys(set).sort().forEach(function (st) {
      var o = document.createElement('option');
      o.value = st;
      o.textContent = st;
      sel.appendChild(o);
    });
  }

  function rowMatchesFilters(row) {
    var kw = (document.getElementById('fltKeyword').value || '').trim().toLowerCase();
    if (kw) {
      var blob = (row.po + row.buyer + row.supplier).toLowerCase();
      if (blob.indexOf(kw) === -1) return false;
    }
    var st = document.getElementById('fltStation').value;
    if (st && row.station !== st) return false;
    var fs = document.getElementById('fltStatus').value;
    if (fs && row.status !== fs) return false;
    return true;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderPoTable(scrollTop) {
    var tb = document.getElementById('poTableBody');
    var filtered = PO_DEMO_ROWS.filter(rowMatchesFilters);
    tb.innerHTML = '';

    filtered.forEach(function (row) {
      var stinfo = statusLabel(row.status);
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="nowrap-cell font-mono text-sm font-semibold text-slate-800">' + escapeHtml(row.po) + '</td>' +
        '<td class="nowrap-cell">' + escapeHtml(row.station) + '</td>' +
        '<td style="white-space:normal;max-width:200px;">' + escapeHtml(row.buyer) + '</td>' +
        '<td style="white-space:normal;max-width:200px;">' + escapeHtml(row.supplier) + '</td>' +
        '<td class="nowrap-cell">' + row.qty + '</td>' +
        '<td class="nowrap-cell text-red-600 font-semibold">' + fmtMoney(row.amt) + '</td>' +
        '<td class="nowrap-cell"><span class="tag ' + stinfo.cls + '">' + stinfo.text + '</span></td>' +
        '<td class="nowrap-cell text-slate-500 text-sm">' + escapeHtml(row.created) + '</td>';
      tb.appendChild(tr);
    });

    var tip = document.getElementById('fltResultTip');
    tip.textContent = '共 ' + filtered.length + ' 条（演示数据 ' + PO_DEMO_ROWS.length + ' 条）';
    if (scrollTop) window.scrollTo({ top: document.querySelector('.table-wrap').offsetTop - 24, behavior: 'smooth' });
  }

  function applyPoFilters(scroll) {
    renderPoTable(!!scroll);
  }

  function resetPoFilters() {
    document.getElementById('fltKeyword').value = '';
    document.getElementById('fltStation').value = '';
    document.getElementById('fltStatus').value = '';
    renderPoTable(false);
  }

  buildStationOptions();
  renderPoTable(false);
</script>
</body>
</html>
