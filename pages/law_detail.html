<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>法规详情 | 国采e购</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --brand: #2563eb;
      --brand-dark: #1d4ed8;
      --text: #0f172a;
      --sub: #64748b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #f8fafc;
      color: var(--text);
    }
    .page-main { max-width: 900px; margin: 0 auto; padding: 20px 20px 56px; }
    .back-row { margin-bottom: 16px; }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      color: var(--sub);
      text-decoration: none;
    }
    .back-link:hover { color: var(--brand); }
    .law-card {
      background: #fffefb;
      border: 1px solid rgba(218, 206, 192, 0.55);
      border-radius: 18px;
      padding: 26px 22px 28px;
      box-shadow: 0 8px 28px rgba(48, 36, 26, 0.07);
    }
    .law-title { font-size: 22px; font-weight: 800; margin: 0 0 14px; line-height: 1.4; }
    .law-meta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 16px;
      font-size: 13px;
      color: var(--sub);
      margin-bottom: 22px;
    }
    .law-badge {
      padding: 4px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }
    .law-badge.valid { background: #f0fdf4; color: #15803d; }
    .law-badge.updated { background: #fff7ed; color: #c2410c; }
    .law-actions {
      display: flex;
      flex-wrap: nowrap;
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px dashed rgba(226, 232, 240, 0.95);
    }
    .btn-parse {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      box-shadow: 0 8px 22px rgba(37, 99, 235, 0.28);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-parse:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(37, 99, 235, 0.35);
    }
    .btn-parse:disabled {
      opacity: 0.92;
      cursor: default;
      transform: none;
    }
    .parse-anchor {
      margin-bottom: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 12px;
    }
    .parse-stream-zone {
      width: 100%;
      margin-top: 0;
    }
    .parse-stream-zone[hidden] { display: none !important; }
    .parse-stream-head {
      font-size: 12px;
      font-weight: 800;
      color: var(--sub);
      letter-spacing: 0.04em;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .parse-stream-head .dot-live {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      animation: parsePulse 1.1s ease-in-out infinite;
    }
    @keyframes parsePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(0.85); }
    }
    .parse-stream-body {
      font-size: 13px;
      line-height: 1.76;
      color: #334155;
      min-height: 0;
      padding: 14px 16px;
      border-radius: 14px;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      border: 1px solid #e2e8f0;
    }
    .parse-stream-body p { margin: 0 0 10px; }
    .parse-stream-body p:last-child { margin-bottom: 0; }
    .parse-stream-body ul {
      margin: 6px 0 10px;
      padding-left: 1.2em;
    }
    .parse-stream-body li { margin-bottom: 6px; }
    .parse-caret {
      display: inline-block;
      width: 2px;
      height: 1em;
      margin-left: 2px;
      vertical-align: -0.12em;
      background: var(--brand);
      animation: parseCaretBlink 0.92s step-end infinite;
      opacity: 0;
      pointer-events: none;
    }
    .parse-caret.visible { opacity: 1; }
    @keyframes parseCaretBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .law-body { font-size: 14px; line-height: 1.75; color: #334155; }
    .law-body p { margin: 0 0 14px; }
    .law-body h3 {
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
      margin: 22px 0 10px;
    }
    .law-body .law-article-num {
      font-weight: 800;
      color: var(--brand-dark);
      margin-right: 6px;
    }
    .zfcgfl-law-root .law-ch-heading {
      font-size: 16px;
      font-weight: 800;
      color: var(--brand-dark);
      margin: 20px 0 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(226, 232, 240, 0.95);
    }
    .zfcgfl-law-root .law-ch-heading:first-child { margin-top: 4px; }
    .zfcgfl-law-root .law-p { margin: 0 0 12px; text-align: justify; }
    .zfcgfl-law-root .law-li {
      margin: 0 0 6px 1em;
      padding-left: 0.25em;
      color: #475569;
      text-align: justify;
    }
    .law-leading { font-size: 14px; line-height: 1.8; margin-bottom: 16px !important; }
    .law-disclaimer-text {
      font-size: 12px;
      color: #64748b;
      line-height: 1.65;
      margin-bottom: 16px !important;
    }
    .law-article-ol {
      padding-left: 2.25em;
      margin: 0 0 20px;
    }
    .law-article-ol > li {
      margin-bottom: 10px;
      padding-left: 4px;
    }
    .parse-stream-head .dot-live.idle {
      visibility: hidden;
      animation: none;
    }
    .parse-stream-body .parse-caret.streaming {
      display: inline-block;
      vertical-align: baseline;
      margin: 0;
    }
  </style>
</head>
<body>
  <header class="topbar"></header>
  <main class="page-main">
    <div class="back-row">
      <a class="back-link" href="./merged_home.html#nrNewsSection"><i class="fa-solid fa-arrow-left"></i> 返回政采资讯台</a>
    </div>
    <article class="law-card">
      <h1 class="law-title" id="lawTitle">法规详情</h1>
      <div class="law-meta-row">
        <span id="lawRevise"></span>
        <span id="lawBadge" class="law-badge valid"></span>
      </div>
      <div class="law-actions" id="lawParseRegion">
        <div class="parse-anchor">
          <button type="button" class="btn-parse" id="lawParseBtn">
            <i class="fa-solid fa-wand-magic-sparkles"></i> <span id="lawParseBtnLabel">法规解析</span>
          </button>
        </div>
        <div class="parse-stream-zone" id="parseStreamWrap" hidden>
          <div class="parse-stream-head"><span id="parseLiveDot" class="dot-live idle"></span><span id="parseStreamTitle">解析输出（流式生成）</span></div>
          <div class="parse-stream-body" id="parseStreamOut" aria-live="polite"></div>
        </div>
      </div>
      <div class="law-body" id="lawBody"></div>
    </article>
  </main>

  <script src="../assets/zfcgfl_law_embed.js"></script>
  <script src="../assets/law_detail_data.js"></script>
  <script>
    var LAW_META = {
      zfcgfl: { title: '中华人民共和国政府采购法', revised: '修订：2022-06-24', badge: 'valid', badgeText: '现行有效' },
      zfcgfl_ss: { title: '政府采购法实施条例', revised: '修订：2022-04-06', badge: 'valid', badgeText: '现行有效' },
      zfcg_zb: { title: '政府采购货物和服务招标投标管理办法', revised: '修订：2022-09-01', badge: 'updated', badgeText: '近期修订' },
      zfcg_fbz: { title: '政府采购非招标采购方式管理办法', revised: '修订：2021-08-30', badge: 'valid', badgeText: '现行有效' },
      zfcg_zj: { title: '政府采购评审专家管理办法', revised: '修订：2021-08-09', badge: 'valid', badgeText: '现行有效' },
      bid_law: { title: '中华人民共和国招标投标法', revised: '修订：2017-12-27', badge: 'valid', badgeText: '现行有效' }
    };

    var _lawStreamTimer = null;
    var _lawStreamIx = 0;
    var _lawStreamAccum = '';

    function getLawPageData() {
      return typeof window !== 'undefined' && window.GC_LAW_PAGE_DATA ? window.GC_LAW_PAGE_DATA : { bodies: {}, parseText: {} };
    }

    function escapeLawHtml(text) {
      var d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function plainToStreamHtml(acc) {
      var parts = String(acc || '').replace(/\r/g, '').split(/\n\n+/);
      var html = '';
      var i;
      for (i = 0; i < parts.length; i++) {
        var p = parts[i].trim();
        if (!p) continue;
        html += '<p>' + escapeLawHtml(p).replace(/\n/g, '<br>') + '</p>';
      }
      return html || '<p></p>';
    }

    function getLawId() {
      var q = new URLSearchParams(window.location.search || '');
      return (q.get('id') || '').trim() || 'zfcgfl';
    }

    function cancelLawStream() {
      if (_lawStreamTimer !== null) {
        clearInterval(_lawStreamTimer);
        _lawStreamTimer = null;
      }
    }

    function renderLaw() {
      var id = getLawId();
      var meta = LAW_META[id] || LAW_META.zfcgfl;
      var data = getLawPageData();
      document.title = meta.title + ' | 国采e购';
      document.getElementById('lawTitle').textContent = meta.title;
      document.getElementById('lawRevise').textContent = meta.revised;
      var b = document.getElementById('lawBadge');
      b.textContent = meta.badgeText;
      b.className = 'law-badge ' + (meta.badge === 'updated' ? 'updated' : 'valid');
      var bh = data.bodies[id];
      document.getElementById('lawBody').innerHTML = bh || '<p>暂无正文。</p>';
      var btn = document.getElementById('lawParseBtn');
      btn.onclick = function () { startLawParseStream(id); };
      btn.disabled = false;
      document.getElementById('lawParseBtnLabel').textContent = '法规解析';
      var ic = btn.querySelector('i');
      if (ic) ic.className = 'fa-solid fa-wand-magic-sparkles';
    }

    function startLawParseStream(lawId) {
      cancelLawStream();
      var data = getLawPageData();
      var txt = data.parseText[lawId] || data.parseText.default || '';
      var chars = Array.from(txt);

      var wrap = document.getElementById('parseStreamWrap');
      var out = document.getElementById('parseStreamOut');
      var btn = document.getElementById('lawParseBtn');
      var lbl = document.getElementById('lawParseBtnLabel');
      var headTitle = document.getElementById('parseStreamTitle');
      var liveDot = document.getElementById('parseLiveDot');
      var btnIcon = btn.querySelector('i');

      wrap.hidden = false;
      out.innerHTML = '';
      _lawStreamIx = 0;
      _lawStreamAccum = '';
      btn.disabled = true;
      lbl.textContent = '解析生成中…';
      if (btnIcon) btnIcon.className = 'fa-solid fa-spinner fa-spin';
      liveDot.classList.remove('idle');
      headTitle.textContent = '正在流式解析（生成中）';

      var tickMs = 16;
      _lawStreamTimer = setInterval(function () {
        if (_lawStreamIx >= chars.length) {
          cancelLawStream();
          out.innerHTML = plainToStreamHtml(_lawStreamAccum);
          btn.disabled = false;
          lbl.textContent = '法规解析';
          if (btnIcon) btnIcon.className = 'fa-solid fa-wand-magic-sparkles';
          headTitle.textContent = '解析完成';
          liveDot.classList.add('idle');
          return;
        }
        _lawStreamAccum += chars[_lawStreamIx++];
        out.innerHTML = plainToStreamHtml(_lawStreamAccum) + '<span class="parse-caret streaming visible" aria-hidden="true"></span>';
      }, tickMs);
    }

    renderLaw();
  </script>
  <script src="../assets/unified_topbar.js"></script>
</body>
</html>
